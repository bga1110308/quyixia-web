<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>順咖介紹 · 去一下</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --honey:#FFB84D;
  --amber:#EF9F27;
  --amber-deep:#BA7517;
  --amber-darker:#8B5A0F;
  --champagne:#FFF4DD;
  --champagne-soft:#FFFCF5;
  --forest:#2F6048;
  --forest-deep:#1F4A36;
  --mint:#5FB58E;
  --mint-pale:#E8F5EE;
  --border-mint:rgba(95,181,142,0.3);
  --ink:#3D2914;
  --ink-soft:#8B7355;
  --ink-light:#B8A485;
  --border:#FFE9B8;
  --border-soft:#F5EBD8;
  --warn:#E89544;
  --warn-pale:#FFF1E0;
  --danger:#D9534F;
  --danger-pale:#FCE8E7;
}
body{font-family:'Noto Sans TC','Source Han Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Segoe UI',sans-serif;background:var(--champagne-soft);color:var(--ink);line-height:1.55;}
.icon{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;fill:currentColor;}

/* 品牌字 */
.brand{font-weight:500;line-height:1;display:inline-flex;align-items:baseline;letter-spacing:-0.02em;}
.brand .qu,.brand .xia{color:var(--amber-darker);}
.brand .yi{color:var(--forest);}

.home-fab{position:fixed;top:14px;left:14px;width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid var(--border);color:var(--amber-deep);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;box-shadow:0 4px 14px rgba(186,117,23,0.15);transition:all 0.2s;text-decoration:none;}
.home-fab:hover{background:var(--champagne);transform:scale(1.05);border-color:var(--amber);}
.home-fab svg{width:18px;height:18px;fill:currentColor;}

/* === 頁頭 === */
.page-header{position:relative;padding:3rem 1.5rem 1.85rem;text-align:center;background:linear-gradient(135deg,var(--champagne) 0%,var(--champagne-soft) 60%,var(--mint-pale) 100%);overflow:hidden;}
.page-header::before{content:'';position:absolute;top:-80px;right:-100px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(239,159,39,0.18) 0%,transparent 70%);}
.page-header::after{content:'';position:absolute;bottom:-100px;left:-80px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(95,181,142,0.15) 0%,transparent 70%);}
.page-header > *{position:relative;z-index:1;}
.page-title{font-size:1.85rem;font-weight:600;color:var(--ink);letter-spacing:-0.5px;line-height:1.25;}
.page-sub{font-size:0.92rem;color:var(--ink-soft);margin-top:0.65rem;line-height:1.7;}
.total-count{display:inline-flex;align-items:center;gap:6px;margin-top:1rem;font-size:0.82rem;color:var(--amber-deep);background:#fff;padding:6px 14px;border-radius:99px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(186,117,23,0.06);}
.total-count .dot{width:7px;height:7px;border-radius:50%;background:var(--mint);animation:blink 1.5s infinite;box-shadow:0 0 0 3px rgba(95,181,142,0.2);}
.total-count strong{color:var(--amber-darker);font-weight:600;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* === Pool tabs (A/B 雙池分流) === */
.pool-tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);padding:0 1rem;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.pool-tabs::-webkit-scrollbar{display:none;}
.p-tab{padding:1rem 1.25rem;font-size:0.9rem;color:var(--ink-soft);font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap;display:inline-flex;align-items:center;gap:7px;}
.p-tab:hover{color:var(--amber-deep);}
.p-tab.on{color:var(--amber-darker);border-bottom-color:var(--amber);font-weight:600;}
.p-tab .ico{width:18px;height:18px;}
.p-tab .count{font-size:0.7rem;background:var(--champagne);color:var(--amber-deep);padding:2px 8px;border-radius:99px;font-weight:600;}
.p-tab.on .count{background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;}

/* === 篩選列 === */
.filter-bar{background:#fff;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);}
.filter-section{margin-bottom:1rem;}
.filter-section:last-child{margin-bottom:0;}
.filter-label{font-size:0.72rem;color:var(--ink-light);margin-bottom:8px;letter-spacing:1.5px;font-weight:600;text-transform:uppercase;}

.badge-filters{display:flex;gap:7px;flex-wrap:wrap;}
.bf{display:inline-flex;align-items:center;gap:5px;font-size:0.78rem;padding:6px 12px;border-radius:99px;cursor:pointer;border:1.5px solid transparent;transition:all 0.2s;font-weight:600;}
.bf svg{width:0.9em;height:0.9em;fill:currentColor;}
.bf-verified{background:var(--champagne);color:var(--amber-deep);border-color:var(--border);}
.bf-safe{background:var(--mint-pale);color:var(--forest);border-color:rgba(95,181,142,0.3);}
.bf-cpr{background:var(--danger-pale);color:var(--danger);border-color:rgba(217,83,79,0.2);}
.bf-cna{background:var(--warn-pale);color:var(--warn);border-color:rgba(232,149,68,0.25);}
.bf-senior{background:#FCE4F2;color:#A8367C;border-color:rgba(168,54,124,0.2);}
.bf.on{box-shadow:0 0 0 3px rgba(239,159,39,0.25);transform:translateY(-1px);}
.bf:hover{transform:translateY(-1px);}

.cat-filters{display:flex;gap:7px;flex-wrap:wrap;}
.cf{font-size:0.8rem;padding:6px 14px;border-radius:99px;background:#fff;color:var(--ink);border:1.5px solid var(--border);cursor:pointer;transition:all 0.2s;font-weight:500;}
.cf:hover{background:var(--champagne);border-color:var(--amber);}
.cf.on{background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(239,159,39,0.3);}

.sort-row{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.sort-group{display:flex;gap:8px;align-items:center;}
.sort-group .lbl{font-size:0.78rem;color:var(--ink-soft);font-weight:500;}
.sort-sel{padding:7px 32px 7px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:0.82rem;background:#fff;color:var(--ink);font-family:inherit;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='%238B7355'><path d='M7 10l5 5 5-5z'/></svg>");background-repeat:no-repeat;background-position:right 10px center;}
.sort-sel:focus{outline:none;border-color:var(--amber);}
.result-count{font-size:0.82rem;color:var(--ink-soft);}
.result-count strong{color:var(--amber-darker);font-weight:600;}

/* === 順咖卡片 === */
.staff-wrap{padding:1.5rem 1.5rem 3rem;max-width:1200px;margin:0 auto;}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}

.staff-card{position:relative;background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:20px 18px 18px;text-align:center;transition:all 0.25s;cursor:pointer;overflow:hidden;}
.staff-card::before{content:'';position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(239,159,39,0.08) 0%,transparent 70%);transition:all 0.3s;}
.staff-card:hover{transform:translateY(-4px);border-color:var(--amber);box-shadow:0 14px 32px rgba(239,159,39,0.18);}
.staff-card:hover::before{width:140px;height:140px;}

.online-mark{position:absolute;top:14px;right:14px;display:inline-flex;align-items:center;gap:4px;font-size:0.66rem;color:var(--forest);font-weight:600;z-index:1;background:var(--mint-pale);padding:3px 9px;border-radius:99px;}
.online-mark .dot{width:6px;height:6px;border-radius:50%;background:var(--mint);}
.online-mark.off{color:var(--ink-light);background:#F0EBE0;}
.online-mark.off .dot{background:var(--ink-light);}

/* 頭像 C 風格(白底金字 + 米金細邊) */
.avatar{position:relative;width:64px;height:64px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:1.4rem;color:var(--amber-deep);margin:0 auto 0.85rem;box-shadow:0 4px 14px rgba(186,117,23,0.18),inset 0 0 0 1.5px var(--border);z-index:1;}
/* 兌換「皇冠頭框」加值有效時:頭像加金框＋頂上小皇冠(純視覺,效期由後台 user_perks 決定) */
.avatar.crowned{box-shadow:0 6px 18px rgba(239,159,39,0.45),inset 0 0 0 2.5px var(--amber);}
.avatar .crown-topper{position:absolute;top:-13px;left:50%;transform:translateX(-50%);width:24px;height:24px;color:var(--amber);filter:drop-shadow(0 1px 2px rgba(186,117,23,0.45));z-index:2;}
.avatar .crown-topper svg{width:100%;height:100%;fill:currentColor;}

.staff-name{position:relative;font-weight:600;font-size:1rem;color:var(--ink);z-index:1;}
.staff-name .new{color:var(--forest);font-size:0.7rem;font-weight:600;margin-left:3px;background:var(--mint-pale);padding:1px 6px;border-radius:99px;}

.staff-rating{position:relative;font-size:0.82rem;color:var(--amber-deep);margin-top:5px;display:inline-flex;align-items:center;gap:4px;cursor:pointer;border-radius:99px;padding:3px 10px;transition:background 0.15s;z-index:1;font-weight:600;}
.staff-rating:hover{background:var(--champagne);}
.staff-rating svg{fill:var(--amber);}

.staff-done{position:relative;font-size:0.72rem;color:var(--ink-light);margin-top:3px;z-index:1;}

.staff-rate{position:relative;margin-top:8px;display:inline-flex;align-items:center;gap:4px;font-size:0.78rem;color:var(--forest);background:var(--mint-pale);padding:4px 10px;border-radius:99px;border:1px solid var(--border-mint);font-weight:600;z-index:1;}
.staff-rate .rate-label{font-size:0.66rem;color:var(--ink-soft);font-weight:500;background:transparent;border:none;padding:0;}
.staff-rate .rate-num{color:var(--forest-deep);font-weight:700;}
.staff-rate .rate-unit{font-size:0.66rem;color:var(--ink-soft);font-weight:500;}

.badge-row{position:relative;display:flex;justify-content:center;gap:4px;margin-top:10px;flex-wrap:wrap;z-index:1;}
.badge{font-size:0.62rem;padding:2px 7px;border-radius:99px;font-weight:600;display:inline-flex;align-items:center;gap:3px;}
.badge svg{width:0.85em;height:0.85em;fill:currentColor;}
.b-verified{background:var(--champagne);color:var(--amber-deep);}
.b-safe{background:var(--mint-pale);color:var(--forest);}
.b-cpr{background:var(--danger-pale);color:var(--danger);}
.b-cna{background:var(--warn-pale);color:var(--warn);}
.b-senior{background:#FCE4F2;color:#A8367C;}
.b-custom{background:var(--champagne-soft);color:var(--ink-soft);border:1px solid var(--border-soft);}
.b-ref{background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;}
.b-email{background:var(--info-pale);color:var(--info);}

.mini-tags{position:relative;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px;z-index:1;}
.mtag{font-size:0.68rem;background:var(--champagne-soft);color:var(--ink-soft);padding:3px 9px;border-radius:99px;border:1px solid var(--border-soft);}

.card-cta{position:relative;margin-top:1rem;background:#fff;border:1.5px solid var(--amber);color:var(--amber-deep);padding:9px 0;width:100%;border-radius:10px;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit;z-index:1;}
.card-cta:hover{background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(239,159,39,0.3);}

.no-result{text-align:center;padding:4rem 1rem;color:var(--ink-soft);font-size:0.92rem;}
.no-result-icon{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--champagne),var(--mint-pale));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.no-result-icon svg{width:36px;height:36px;fill:var(--amber);}
.no-result strong{display:block;color:var(--ink);font-size:1.05rem;margin-bottom:6px;font-weight:600;}

.footer{text-align:center;font-size:0.78rem;color:var(--ink-light);padding:1.75rem 2rem;background:#fff;border-top:1px solid var(--border);}

/* === 解鎖視窗(案家付點看順咖信任資訊),樣式沿用 12 順咖端那套 === */
.trust-unlock{display:inline-flex;align-items:center;margin-left:5px;padding:2px 11px;border-radius:99px;background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;border:none;font-size:0.7rem;font-weight:600;cursor:pointer;font-family:inherit;vertical-align:1px;}
.trust-unlock:hover{filter:brightness(1.05);}
.contact-modal-overlay{position:fixed;inset:0;background:rgba(61,41,20,0.55);display:none;align-items:flex-end;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.contact-modal-overlay.show{display:flex;animation:fade-in 0.2s;}
.contact-modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:1.65rem 1.5rem 2rem;box-shadow:0 -10px 40px rgba(0,0,0,0.25);animation:slide-up 0.3s cubic-bezier(0.2,0.9,0.3,1.2);}
.cm-handle{width:46px;height:5px;background:var(--border);border-radius:99px;margin:0 auto 1.1rem;}
.cm-title{font-size:1.1rem;font-weight:600;color:var(--ink);text-align:center;margin-bottom:5px;}
.cm-title strong{color:var(--forest);}
.cm-subtitle{font-size:0.82rem;color:var(--ink-soft);text-align:center;margin-bottom:1.35rem;line-height:1.65;}
.cm-cancel{width:100%;background:#fff;border:1.5px solid var(--border);color:var(--ink-soft);padding:0.85rem;border-radius:12px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:0.85rem;transition:all 0.2s;}
.cm-cancel:hover{background:var(--champagne-soft);border-color:var(--amber);color:var(--amber-deep);}
.ul-opt{display:flex;align-items:center;justify-content:space-between;width:100%;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:0.95rem 1.1rem;margin-bottom:0.7rem;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.ul-opt:hover{border-color:var(--forest);background:var(--champagne-soft);}
.ul-opt-main{font-size:0.92rem;font-weight:600;color:var(--ink);}
.ul-opt-cost{font-size:0.92rem;color:var(--forest);font-weight:700;white-space:nowrap;}
.ul-opt-month{border-color:rgba(95,181,142,0.5);}
.ul-topup{display:block;text-align:center;font-size:0.8rem;color:var(--amber-deep);margin:0.4rem 0 0.2rem;cursor:pointer;text-decoration:underline;}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
@keyframes slide-up{from{transform:translateY(100%);}to{transform:translateY(0);}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
<script src="qyx-draft-reminder.js"></script>
<script src="qyx-whoami.js"></script>
<script src="qyx-load-guard.js"></script>
</head>

  <symbol id="i-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></symbol>

</defs>
</svg>

<div class="page-header">
  <div class="page-title">順咖介紹</div>
  <div class="page-sub">看看誰能幫你 · 篩選你需要的條件</div>
  <div class="total-count">
    <span class="dot"></span>
    <span>本平台共 <strong id="total-num">47</strong> 位順咖 · 目前 <strong id="online-num">23</strong> 位在線</span>
  </div>
</div>

<div class="pool-tabs">
  <div class="p-tab on" data-pool="all" onclick="switchPool(this)">
    <svg class="ico"><use href="#i-people"/></svg>
    全部順咖 <span class="count">47</span>
  </div>
  <div class="p-tab" data-pool="general" onclick="switchPool(this)">
    <svg class="ico"><use href="#i-people"/></svg>
    一般跑腿 <span class="count">35</span>
  </div>
  <div class="p-tab" data-pool="care" onclick="switchPool(this)">
    <svg class="ico"><use href="#i-stethoscope"/></svg>
    照服員專區 <span class="count">12</span>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-section">
    <div class="filter-label">徽章篩選</div>
    <div class="badge-filters">
      <span class="bf bf-verified" data-badge="verified" onclick="toggleBadge(this)"><svg><use href="#i-check"/></svg>實名</span>
      <span class="bf bf-safe" data-badge="safe" onclick="toggleBadge(this)"><svg><use href="#i-shield"/></svg>良民</span>
      <span class="bf bf-cpr" data-badge="cpr" onclick="toggleBadge(this)"><svg><use href="#i-heart-cross"/></svg>急救</span>
      <span class="bf bf-cna" data-badge="cna" onclick="toggleBadge(this)"><svg><use href="#i-star"/></svg>照服員</span>
      <span class="bf bf-senior" data-badge="senior" onclick="toggleBadge(this)"><svg><use href="#i-crown"/></svg>資深照服</span>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-label">擅長類別</div>
    <div class="cat-filters">
      <span class="cf on" data-cat="all" onclick="toggleCat(this)">全部</span>
      <span class="cf" data-cat="errand" onclick="toggleCat(this)">代排 · 代購</span>
      <span class="cf" data-cat="pet" onclick="toggleCat(this)">寵物</span>
      <span class="cf" data-cat="clean" onclick="toggleCat(this)">打掃</span>
      <span class="cf" data-cat="companion" onclick="toggleCat(this)">陪伴 · 陪逛</span>
      <span class="cf" data-cat="game" onclick="toggleCat(this)">陪打遊戲</span>
      <span class="cf" data-cat="elder" onclick="toggleCat(this)">長輩照顧</span>
      <span class="cf" data-cat="kid" onclick="toggleCat(this)">兒童接送</span>
    </div>
  </div>

  <div class="filter-section">
    <div class="sort-row">
      <div class="sort-group">
        <span class="lbl">排序</span>
        <select class="sort-sel" id="sort-sel" onchange="renderStaff()">
          <option value="rating">評分高到低</option>
          <option value="rate-asc">期望時薪低到高</option>
          <option value="rate-desc">期望時薪高到低</option>
          <option value="online">在線狀態</option>
        </select>
      </div>
      <div class="result-count">符合條件:<strong id="count-num">47</strong> 位</div>
    </div>
  </div>
</div>

<div class="staff-wrap">
  <div class="staff-grid" id="staff-grid"></div>
  <div class="no-result" id="no-result" style="display:none;">
    <div class="no-result-icon"><svg><use href="#i-search"/></svg></div>
    <strong>沒有符合條件的順咖</strong>
    試試放寬篩選條件
  </div>
</div>

<div class="footer">
  順咖資料為平台認證資訊 · 點擊卡片查看完整介紹與接單時段
</div>

<!-- 解鎖順咖信任資訊:單次 or 月票,扣點走後台 redeem_info(p_as='client'),前端只呼叫不能繞 -->
<div class="contact-modal-overlay" id="unlock-modal" onclick="if(event.target===this)closeUnlockModal()">
  <div class="contact-modal">
    <div class="cm-handle"></div>
    <div class="cm-title">解鎖<strong>順咖信任資訊</strong></div>
    <div class="cm-subtitle">看這位順咖的信用分與等級<br>你目前案家點數:<strong id="ul-balance">0</strong> 點</div>
    <button class="ul-opt" onclick="doRedeem('single')">
      <span class="ul-opt-main">單次解鎖這位順咖</span>
      <span class="ul-opt-cost"><strong id="ul-cost-single">5</strong> 點</span>
    </button>
    <button class="ul-opt ul-opt-month" onclick="doRedeem('month')">
      <span class="ul-opt-main">買月票 · 30 天看全部順咖</span>
      <span class="ul-opt-cost"><strong id="ul-cost-month">50</strong> 點</span>
    </button>
    <a class="ul-topup" onclick="goBuyForUnlock()">點數不足?去儲值</a>
    <button class="cm-cancel" onclick="closeUnlockModal()">取消</button>
  </div>
</div>

<script>
/* 順咖名單改讀 Supabase 公開視圖 public_suncars */
var staffList = [];
var currentPool = 'all';
var currentCat = 'all';
var selectedBadges = [];
/* 精確信用分改由後台授權函式 get_suncar_credits 決定誰能看(管理員/推廣期/會員/已解鎖/本人)。
   creditMap = {順咖id: 精確信用分},只有授權看得到的才會在這個對照表裡;不在表裡就上鎖。 */
var creditMap = {};
var perkMap = {};   /* {順咖id: {crown_frame:true, referral_badge:true}} 目前有效的兌換加值,卡片用來畫皇冠頭框/推薦達人標章 */
/* 評價統計:reviewMap = {順咖id: {avg 平均星等, cnt 則數, enough 是否達3則門檻}}。
   一律走後台 get_review_stats_batch,只回彙總(平均+則數),不吐個別留言或誰寫的;不足3則 enough=false。
   評價是公開資訊(挑順咖看得到),不像信用分要付費解鎖。 */
var reviewMap = {};
/* 自訂證件徽章:customBadgeMap = {順咖id: [證件名稱,...]}。後台 get_suncar_custom_badges 只回
   已過審＋順咖選擇顯示的名稱,不吐檔案或其他個資。一位順咖可有多張,故存陣列。公開資訊不上鎖。 */
var customBadgeMap = {};
/* 會員編號:memberMap = {順咖id: 'U-...'}。撞名辨認用。public_suncars 不吐編號,案家又跟多數順咖沒訂單關係讀不到,
   所以走後台 get_suncar_member_nos(只回 active 順咖的編號)批次拿,前端不直接讀 users。 */
var memberMap = {};
var myId = null; /* 登入者自己的 id:用來擋「點自己卡片變成指定自己下單」 */

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function firstChar(name){ name=(name||'').trim(); if(!name) return '·'; var ch=Array.from(name); for(var i=0;i<ch.length;i++){ if(/[\p{L}\p{N}]/u.test(ch[i])) return ch[i]; } return ch[0]; }

/* 服務鍵 → 列表分類(寬鬆對應) */
var SVC2CAT = {
  'buy-food':'errand','buy-fresh':'errand','deliver':'errand','queue':'errand','micro':'errand',
  'pet':'pet',
  'home-help':'clean','furniture':'clean',
  'chat':'companion','stand-by':'companion','companion-elder':'companion','family-report':'companion',
  'sport':'game',
  'medical':'elder','shopping-elder':'elder','digital-help':'elder','body-care':'elder',
  'pick-kid':'kid','kid-care':'kid','teach':'kid'
};

function switchPool(el) {
  document.querySelectorAll('.p-tab').forEach(function(t){ t.classList.remove('on'); });
  el.classList.add('on');
  currentPool = el.getAttribute('data-pool');
  renderStaff();
}
function toggleBadge(el) {
  var b = el.getAttribute('data-badge');
  el.classList.toggle('on');
  if (selectedBadges.indexOf(b) > -1) selectedBadges = selectedBadges.filter(function(x){ return x !== b; });
  else selectedBadges.push(b);
  renderStaff();
}
function toggleCat(el) {
  document.querySelectorAll('.cf').forEach(function(c){ c.classList.remove('on'); });
  el.classList.add('on');
  currentCat = el.getAttribute('data-cat');
  renderStaff();
}

var badgeMap = {
  verified: {cls:'b-verified', icon:'i-check', name:'實名'},
  safe: {cls:'b-safe', icon:'i-shield', name:'良民'},
  cpr: {cls:'b-cpr', icon:'i-heart-cross', name:'急救'},
  cna: {cls:'b-cna', icon:'i-star', name:'照服員'},
  senior: {cls:'b-senior', icon:'i-crown', name:'資深照服'},
  email: {cls:'b-email', icon:'i-mail', name:'信箱'}
};

async function loadStaff() {
  var grid = document.getElementById('staff-grid');
  if (typeof window.sb === 'undefined') { grid.innerHTML = '<p style="grid-column:1/-1;color:var(--ink-soft);padding:1rem;">連線尚未載入</p>'; return; }
  var user = null;
  var sres = await sb.auth.getSession();
  if (sres.data && sres.data.session && sres.data.session.user) { user = sres.data.session.user; }
  else { var ures = await sb.auth.getUser(); user = (ures && ures.data) ? ures.data.user : null; }
  if (!user) { window.location.href = '13_login.html'; return; }
  myId = user.id; /* 記住自己,渲染卡片時擋「指定自己」 */

  /* 解鎖視窗要用的價目與案家點數餘額。
     「誰能看信用分」已改由後台函式 get_suncar_credits 決定,前端不再自己算 privilege/解鎖清單。 */
  var prof = await sb.from('users').select('client_points').eq('id', user.id).maybeSingle();
  var u = (prof && prof.data) ? prof.data : {};
  var cfg = await sb.from('app_config').select('price_client_single,price_client_month').eq('id', 1).maybeSingle();
  var cfgd = (cfg && cfg.data) ? cfg.data : {};
  window.UNLOCK = { single: (cfgd.price_client_single==null?5:cfgd.price_client_single), month: (cfgd.price_client_month==null?50:cfgd.price_client_month), points: (u.client_points||0), target: null };

  var res = await sb.from('public_suncars').select('*');
  if (res.error) { console.error(res.error); grid.innerHTML = '<p style="grid-column:1/-1;color:var(--ink-soft);padding:1rem;">讀取失敗:' + esc(res.error.message) + '</p>'; return; }

  staffList = (res.data || []).map(function(r){
    var p = r.profile || {};
    var services = Array.isArray(p.services) ? p.services : [];
    var cats = [];
    services.forEach(function(k){ var c = SVC2CAT[k]; if (c && cats.indexOf(c) === -1) cats.push(c); });
    /* 徽章要「過審」且「順咖選擇顯示(show_*,預設顯示)」才出現。順咖可在 07 把某張關掉不給案家看。 */
    var badges = [];
    if (r.is_realname && r.show_realname !== false) badges.push('verified');           /* 身分證過審 */
    if (r.has_caregiver_cert && r.show_caregiver !== false) badges.push('cna');        /* 照服員證過審 */
    if (r.has_good_conduct && r.show_good_conduct !== false) badges.push('safe');      /* 良民證過審 */
    if (r.has_cpr && r.show_cpr !== false) badges.push('cpr');
    if (r.is_email_verified) badges.push('email');                         /* CPR/AED 急救證過審 */
    var areas = Array.isArray(p.areas) ? p.areas : [];
    return {
      id: r.id,
      name: r.display_name || '順咖',
      avatar: r.avatar_url || '',
      pool: r.has_caregiver_cert ? 'care' : 'general',
      hourlyRate: r.expected_rate || null,
      online: p.acceptingOrders !== false,
      cats: cats,
      tags: areas.slice(0, 3),
      badges: badges
    };
  });

  var ids = staffList.map(function(s){ return s.id; });

  /* 精確信用分:改向後台授權函式拿。非授權者連數字都拿不到(後台根本不送,不是前端藏),堵住免費外洩。
     回傳只含「可看」的順咖,建成 creditMap 給卡片用;不在表裡的就上鎖。 */
  creditMap = {};
  if (ids.length) {
    var cr = await sb.rpc('get_suncar_credits', { p_targets: ids });
    if (cr && cr.data) cr.data.forEach(function(row){ creditMap[row.id] = row.credit_score; });
  }

  /* 兌換加值(皇冠頭框/推薦達人標章):批次查哪些順咖目前有效。
     走後台 get_active_suncar_perks(只回沒過期的、只回這兩種公開加值),前端不直接讀 user_perks。 */
  perkMap = {};
  if (ids.length) {
    var pr = await sb.rpc('get_active_suncar_perks', { p_targets: ids });
    if (pr && pr.data) pr.data.forEach(function(row){ (perkMap[row.user_id] = perkMap[row.user_id] || {})[row.perk] = true; });
  }

  /* 評價星等:一次批次拿全部順咖的平均星等與則數(案家評順咖 = client_reviews_suncar)。
     滿3則門檻在後台函式內擋,前端只負責顯示;不必逐位查,省掉幾十次後台往返。 */
  reviewMap = {};
  if (ids.length) {
    var rv = await sb.rpc('get_review_stats_batch', { p_targets: ids, p_mode: 'client_reviews_suncar' });
    if (rv && rv.data) rv.data.forEach(function(row){ reviewMap[row.reviewee_id] = { avg: row.overall_avg, cnt: row.cnt, enough: row.enough }; });
  }

  /* 自訂證件徽章:批次拿全部順咖已過審且選擇顯示的自訂證件名稱(後台只吐 user_id 與 name)。 */
  customBadgeMap = {};
  if (ids.length) {
    var cb = await sb.rpc('get_suncar_custom_badges', { p_targets: ids });
    if (cb && cb.data) cb.data.forEach(function(row){
      (customBadgeMap[row.user_id] = customBadgeMap[row.user_id] || []).push(row.name);
    });
  }

  /* 會員編號:批次拿(撞名辨認用)。函式沒建好或報錯時 memberMap 留空＝卡片不顯示編號,頁面照常。 */
  memberMap = {};
  if (ids.length) {
    var mn = await sb.rpc('get_suncar_member_nos', { p_targets: ids });
    if (mn && mn.data) mn.data.forEach(function(row){ memberMap[row.user_id] = row.member_no; });
  }

  renderStaff();
}

function renderStaff() {
  var filtered = staffList.filter(function(s){
    if (currentPool === 'general' && s.pool !== 'general') return false;
    if (currentPool === 'care' && s.pool !== 'care') return false;
    if (currentCat !== 'all' && s.cats.indexOf(currentCat) === -1) return false;
    if (selectedBadges.length > 0) {
      for (var i = 0; i < selectedBadges.length; i++) {
        if (s.badges.indexOf(selectedBadges[i]) === -1) return false;
      }
    }
    return true;
  });

  var sortBy = document.getElementById('sort-sel').value;
  filtered.sort(function(a, b){
    if (sortBy === 'rating') return ratingVal(b) - ratingVal(a); /* 評分高到低;未達3則門檻的沉到最後 */
    if (sortBy === 'rate-asc') return (a.hourlyRate||0) - (b.hourlyRate||0);
    if (sortBy === 'rate-desc') return (b.hourlyRate||0) - (a.hourlyRate||0);
    if (sortBy === 'online') return (b.online?1:0) - (a.online?1:0);
    return 0;
  });

  /* 三個分頁計數 */
  document.querySelectorAll('.p-tab').forEach(function(t){
    var pool = t.getAttribute('data-pool');
    var n = staffList.filter(function(s){ return pool === 'all' || s.pool === pool; }).length;
    var c = t.querySelector('.count'); if (c) c.textContent = n;
  });

  document.getElementById('count-num').textContent = filtered.length;
  var totalEl = document.getElementById('total-num'); if (totalEl) totalEl.textContent = staffList.length;
  var onlineEl = document.getElementById('online-num'); if (onlineEl) onlineEl.textContent = staffList.filter(function(s){ return s.online; }).length;
  var grid = document.getElementById('staff-grid');
  var nores = document.getElementById('no-result');

  if (filtered.length === 0) { grid.innerHTML = ''; nores.style.display = 'block'; return; }
  nores.style.display = 'none';

  grid.innerHTML = filtered.map(function(s){
    var badges = s.badges.map(function(b){ var bm = badgeMap[b]; return '<span class="badge '+bm.cls+'"><svg><use href="#'+bm.icon+'"/></svg>'+bm.name+'</span>'; }).join('');
    /* 自訂證件名稱徽章:過審才會在這裡(後台把關),純文字、無固定圖示 */
    var customNames = customBadgeMap[s.id] || [];
    badges += customNames.map(function(nm){ return '<span class="badge b-custom">'+esc(nm)+'</span>'; }).join('');
    /* 兌換加值:有效的「推薦達人標章」加進徽章列、「皇冠頭框」給頭像加金框。過期的後台不會回,自然消失 */
    var myPerks = perkMap[s.id] || {};
    var hasCrown = !!myPerks.crown_frame;
    if (myPerks.referral_badge) badges += '<span class="badge b-ref"><svg><use href="#i-star"/></svg>推薦達人</span>';
    var tags = s.tags.map(function(t){ return '<span class="mtag">'+esc(t)+'</span>'; }).join('');
    var onlineMark = s.online
      ? '<span class="online-mark"><span class="dot"></span>接單中</span>'
      : '<span class="online-mark off"><span class="dot"></span>暫停接單</span>';
    var avatarInner = s.avatar
      ? '<img src="'+esc(s.avatar)+'" alt="頭像" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">'
      : esc(firstChar(s.name));
    var rateHtml = s.hourlyRate
      ? '<span class="rate-label">期望時薪</span><span class="rate-num">$'+s.hourlyRate+'</span><span class="rate-unit">/時</span>'
      : '<span class="rate-label">期望時薪</span><span class="rate-num" style="font-size:0.95rem;">面議</span>';
    /* 評價星等:達3則顯示平均星等＋則數,不足顯示「尚無足夠評價」。評價公開,不上鎖。 */
    var rstat = reviewMap[s.id];
    var ratingHtml = (rstat && rstat.enough)
      ? '<div class="staff-rating"><svg class="icon"><use href="#i-star"/></svg>'+Number(rstat.avg).toFixed(1)+' <span style="color:var(--ink-light);font-weight:500;font-size:0.72rem;">('+rstat.cnt+' 則)</span></div>'
      : '<div class="staff-done" style="color:var(--ink-light);">尚無足夠評價</div>';
    /* 信用分:creditMap 有這位(＝後台授權看得到)就顯示「分數＋等級」,否則只給鎖頭＋解鎖鈕。
       解鎖鈕 stopPropagation 不觸發卡片跳轉 */
    var cscore = creditMap[s.id];
    var creditHtml = (cscore != null)
      ? '<div class="staff-done">信用分 '+cscore+'（'+creditBand(cscore)+'）</div>'
      : '<div class="staff-done">信用分 🔒 <button type="button" class="trust-unlock" onclick="event.stopPropagation(); openUnlockModal(\''+esc(s.id)+'\')">解鎖可看</button></div>';
    /* 自己的卡片:不能指定自己下單。點了只提醒,不跳轉(送出端 04 也有第二道防線) */
    var isMe = (s.id === myId);
    /* 點卡片本體=看介紹頁;按鈕才是指定下單(兩個動作拆開,2026/06/18) */
    var cardClick = isMe
      ? "alert('這是你自己的順咖名片，不能指定自己下單')"
      : "window.location.href='20_suncar_profile.html?id=" + encodeURIComponent(s.id) + "'";
    var ctaLabel = isMe ? '這是你的名片' : '指定他下單';
    /* 按鈕 stopPropagation 不觸發卡片跳轉,自己走指定下單 */
    var ctaClick = isMe
      ? "event.stopPropagation();"
      : "event.stopPropagation(); window.location.href='04_order_form.html?staff=" + encodeURIComponent(s.id) + "'";
    return '<div class="staff-card" onclick="'+cardClick+'">' +
      onlineMark +
      '<div class="avatar'+(hasCrown?' crowned':'')+'">'+(hasCrown?'<span class="crown-topper"><svg><use href="#i-crown"/></svg></span>':'')+avatarInner+'</div>' +
      '<div class="staff-name">'+esc(s.name)+'</div>' +
      (memberMap[s.id]?'<div style="font-size:0.66rem;color:var(--ink-light);margin-top:1px;letter-spacing:0.3px;">'+esc(memberMap[s.id])+'</div>':'') +
      ratingHtml +
      creditHtml +
      '<div class="staff-rate" title="順咖填的期望時薪,實際金額由案家出價">'+rateHtml+'</div>' +
      '<div class="badge-row">'+badges+'</div>' +
      '<div class="mini-tags">'+tags+'</div>' +
      '<button class="card-cta" onclick="'+ctaClick+'">'+ctaLabel+'</button>' +
    '</div>';
  }).join('');
}

/* 信用分等級:高 80 以上 / 中 50–79 / 低 50 以下(同 01 第七點規則) */
function creditBand(score){ var n = (score==null?100:score); if(n>=80) return '高'; if(n>=50) return '中'; return '低'; }

/* 排序用:達3則門檻才拿平均星等當分數,否則 -1,讓沒評價的沉到最後 */
function ratingVal(s){ var rv = reviewMap[s.id]; return (rv && rv.enough && rv.avg != null) ? Number(rv.avg) : -1; }

/* 解鎖視窗:帶入要解鎖的順咖 id,顯示案家點數餘額與兩種方案價格 */
function openUnlockModal(suncarId){
  var U = window.UNLOCK || { single:5, month:50, points:0 };
  U.target = suncarId;
  document.getElementById('ul-balance').textContent = U.points;
  document.getElementById('ul-cost-single').textContent = U.single;
  document.getElementById('ul-cost-month').textContent = U.month;
  document.getElementById('unlock-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeUnlockModal(){
  document.getElementById('unlock-modal').classList.remove('show');
  document.body.style.overflow = '';
}
/* 鎖頭旁「去儲值」:記住要加值的是案家池、回來回這頁,再導到買點數頁 */
function goBuyForUnlock(){
  try { sessionStorage.setItem('credits_pool','client'); sessionStorage.setItem('credits_returnTo','02_staff_list.html'); } catch(e){}
  window.location.href = '16_buy_credits.html';
}
/* 扣點解鎖:single 解這一位順咖、month 開 30 天看全部。扣點與發權限全在後台 redeem_info 做,前端只呼叫,守伺服器端驗紅線 */
async function doRedeem(kind){
  if (typeof window.sb === 'undefined') { alert('系統載入中,請稍候再試'); return; }
  var target = (kind === 'single') ? (window.UNLOCK && window.UNLOCK.target) : null;
  if (kind === 'single' && !target) { alert('找不到要解鎖的順咖,請重開卡片再試'); return; }
  var r = await sb.rpc('redeem_info', { p_kind: kind, p_as: 'client', p_target: target });
  if (r.error) {
    var msg = r.error.message || '解鎖失敗';
    if (msg.indexOf('點數不足') >= 0) { if (confirm(msg + '\n\n要去儲值嗎?')) goBuyForUnlock(); return; }
    alert('解鎖失敗:' + msg);
    return;
  }
  alert(kind === 'month' ? '已開通月票,30 天內可看全部順咖資訊' : '已解鎖這位順咖的資訊');
  location.reload(); /* 重整讓鎖頭變成已解鎖內容,單一來源不另外手動改畫面 */
}

document.addEventListener('DOMContentLoaded', function(){ qyxGuard(loadStaff, { color: '#EF9F27' }); }); /* 載入逾時保護 */
</script>
</body>
</html>
