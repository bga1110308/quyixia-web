<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>付款 · 去一下</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --honey:#FFB84D;
  --amber:#EF9F27;
  --amber-deep:#BA7517;
  --amber-darker:#8B5A0F;
  --champagne:#FFF4DD;
  --champagne-soft:#FFFCF5;
  --forest:#2F6048;
  --forest-deep:#1F4A36;
  --mint:#5FB58E;
  --mint-pale:#E8F5EE;
  --ink:#3D2914;
  --ink-soft:#8B7355;
  --ink-light:#B8A485;
  --border:#FFE9B8;
  --border-soft:#F5EBD8;
  --border-mint:rgba(95,181,142,0.3);
  --warn:#E89544;
  --warn-pale:#FFF1E0;
}
body{font-family:'Noto Sans TC','Source Han Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Segoe UI',sans-serif;background:linear-gradient(135deg,var(--champagne) 0%,var(--champagne-soft) 50%,var(--mint-pale) 100%);color:var(--ink);min-height:100vh;padding:1.25rem;line-height:1.6;}

.home-fab{position:fixed;top:14px;left:14px;width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid var(--border);color:var(--amber-deep);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;box-shadow:0 4px 14px rgba(186,117,23,0.15);transition:all 0.2s;text-decoration:none;}
.home-fab:hover{background:var(--champagne);transform:scale(1.05);border-color:var(--amber);}
.home-fab svg{width:18px;height:18px;fill:currentColor;}

.wrap{max-width:480px;margin:1rem auto 0;}

/* Demo 提示 */
.demo-banner{background:var(--warn-pale);border:1px solid var(--warn);border-radius:12px;padding:11px 13px;margin-bottom:1rem;font-size:0.8rem;color:#9c5e22;line-height:1.7;display:flex;gap:9px;align-items:flex-start;}
.demo-banner svg{width:18px;height:18px;fill:var(--warn);flex-shrink:0;margin-top:2px;}
.demo-banner strong{font-weight:700;}

/* 訂單摘要 */
.order-card{background:#fff;border:1.5px solid var(--border-soft);border-radius:16px;padding:1.35rem 1.4rem;margin-bottom:1rem;box-shadow:0 4px 14px rgba(186,117,23,0.06);}
.order-title{font-size:0.78rem;color:var(--ink-light);letter-spacing:1.5px;margin-bottom:0.95rem;display:flex;align-items:center;gap:8px;font-weight:600;}
.order-title::before{content:'';display:block;width:4px;height:16px;background:linear-gradient(180deg,var(--honey),var(--amber));border-radius:2px;}
.order-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:0.9rem;color:var(--ink);}
.order-row .label{color:var(--ink-soft);font-size:0.85rem;}
.order-row .val{font-weight:600;color:var(--ink);}
.order-row.highlight{padding-top:0.95rem;margin-top:0.5rem;border-top:1px dashed var(--border);}
.order-row.highlight .val{color:var(--amber-deep);font-size:1.1rem;font-weight:700;}
.bonus-tag{font-size:0.66rem;background:var(--mint-pale);color:var(--forest);border:1px solid var(--border-mint);padding:2px 8px;border-radius:99px;margin-left:6px;font-weight:600;}

/* 應付總額 */
.total-card{position:relative;background:linear-gradient(135deg,var(--amber-darker),var(--amber-deep) 50%,var(--amber) 100%);color:#fff;border-radius:18px;padding:1.25rem 1.5rem;margin-bottom:1.35rem;display:flex;justify-content:space-between;align-items:center;box-shadow:0 12px 32px rgba(186,117,23,0.3);overflow:hidden;}
.total-card::before{content:'';position:absolute;top:-50%;right:-15%;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.12);}
.total-card > *{position:relative;}
.total-card .lbl{font-size:0.88rem;opacity:0.92;font-weight:500;}
.total-card .price{font-size:1.9rem;font-weight:700;letter-spacing:-1.5px;}
.total-card .price .tw{font-size:0.92rem;opacity:0.88;margin-right:3px;font-weight:500;}

/* 區塊標題 */
.section-title{font-size:1rem;font-weight:600;color:var(--ink);margin:1.25rem 0 0.85rem;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';display:block;width:4px;height:18px;background:linear-gradient(180deg,var(--honey),var(--amber));border-radius:2px;}

/* 付款方式 */
.pay-methods{display:flex;flex-direction:column;gap:9px;margin-bottom:1.25rem;}
.pay-method{background:#fff;border:2px solid var(--border-soft);border-radius:14px;padding:1.05rem 1.15rem;cursor:pointer;display:flex;align-items:center;gap:13px;transition:all 0.2s;}
.pay-method:hover{border-color:var(--amber);background:var(--champagne-soft);}
.pay-method.selected{border-color:var(--amber);background:linear-gradient(135deg,var(--champagne),#fff 80%);box-shadow:0 6px 18px rgba(239,159,39,0.18);}
.pay-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.4rem;font-weight:700;}
.pay-info{flex:1;min-width:0;}
.pay-name{font-size:0.95rem;font-weight:600;color:var(--ink);}
.pay-desc{font-size:0.74rem;color:var(--ink-light);margin-top:2px;}
.pay-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;transition:all 0.2s;}
.pay-method.selected .pay-check{background:linear-gradient(135deg,var(--honey),var(--amber));border-color:transparent;box-shadow:0 3px 8px rgba(239,159,39,0.35);}
.pay-method.selected .pay-check svg{display:block;}
.pay-check svg{width:14px;height:14px;fill:#fff;display:none;}

/* Icon 配色 */
.pay-icon.apple{background:#000;color:#fff;}
.pay-icon.linepay{background:#06c755;color:#fff;font-size:0.85rem;}
.pay-icon.card{background:linear-gradient(135deg,#4f7cc8,#2a4d8c);color:#fff;font-size:1rem;}
.pay-icon.jko{background:#fd5e25;color:#fff;font-size:0.95rem;letter-spacing:-1px;}
.pay-icon.gpay{background:#fff;border:1.5px solid #e0e0e0;}

/* 信用卡欄位 */
.card-fields{display:none;background:var(--champagne-soft);border:1.5px solid var(--border);border-radius:14px;padding:1.15rem;margin-top:-2px;margin-bottom:1.25rem;}
.card-fields.show{display:block;animation:expandIn 0.25s ease;}
@keyframes expandIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.cf-field{margin-bottom:0.85rem;}
.cf-field:last-child{margin-bottom:0;}
.cf-field label{display:block;font-size:0.78rem;color:var(--ink);margin-bottom:5px;font-weight:600;}
.cf-field input{width:100%;padding:0.75rem 0.9rem;border:1.5px solid var(--border-soft);border-radius:10px;font-size:0.92rem;background:#fff;color:var(--ink);font-family:inherit;letter-spacing:1px;transition:all 0.2s;}
.cf-field input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(239,159,39,0.15);}
.cf-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}

/* 確認付款 */
.pay-btn{width:100%;background:linear-gradient(135deg,var(--honey) 0%,var(--amber) 60%,var(--amber-deep) 100%);color:#fff;border:none;padding:1.1rem;border-radius:14px;font-size:1.02rem;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 10px 28px rgba(239,159,39,0.35);transition:all 0.2s;}
.pay-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 14px 36px rgba(239,159,39,0.45);}
.pay-btn:active{transform:translateY(0);}
.pay-btn:disabled{background:#D8CFB8;cursor:not-allowed;box-shadow:none;}
.pay-btn svg{width:18px;height:18px;fill:currentColor;}

.back-link{text-align:center;margin-top:1rem;font-size:0.85rem;}
.back-link a{color:var(--amber-deep);text-decoration:underline;cursor:pointer;font-weight:500;}

.security-note{text-align:center;font-size:0.74rem;color:var(--ink-light);margin-top:0.95rem;line-height:1.65;display:inline-flex;align-items:center;justify-content:center;gap:5px;width:100%;}
.security-note svg{width:14px;height:14px;fill:var(--forest);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<defs>
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></symbol>
  <symbol id="i-lock" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6z"/></symbol>
  <symbol id="i-warn" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></symbol>
  <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></symbol>
</defs>
</svg>

<a href="16_buy_credits.html" class="home-fab" title="回上一頁"><svg><use href="#i-home"/></svg></a>

<div class="wrap">

  <div class="demo-banner">
    <svg><use href="#i-warn"/></svg>
    <span><strong>Demo 模式:</strong>本頁為展示用,按下「確認付款」不會真正扣款。正式上線將串接綠界 / 藍新金流,所有付款方式都會真實運作。</span>
  </div>

  <!-- 訂單摘要 -->
  <div class="order-card">
    <div class="order-title">訂單摘要</div>
    <div class="order-row">
      <span class="label">方案點數</span>
      <span class="val"><span id="sum-base-pts">0</span> 點</span>
    </div>
    <div class="order-row" id="bonus-row">
      <span class="label">加贈點數</span>
      <span class="val" style="color:var(--forest);">+<span id="sum-bonus">0</span> 點 <span class="bonus-tag">優惠</span></span>
    </div>
    <div class="order-row highlight">
      <span class="label">本次獲得</span>
      <span class="val"><span id="sum-total-pts">0</span> 點</span>
    </div>
  </div>

  <!-- 應付總額 -->
  <div class="total-card">
    <div class="lbl">應付金額</div>
    <div class="price"><span class="tw">NT$</span><span id="sum-price">0</span></div>
  </div>

  <!-- 付款方式 -->
  <div class="section-title">選擇付款方式</div>
  <div class="pay-methods">

    <div class="pay-method" data-method="apple" onclick="pickPay(this)">
      <div class="pay-icon apple"></div>
      <div class="pay-info">
        <div class="pay-name">Apple Pay</div>
        <div class="pay-desc">用 Touch ID / Face ID 一鍵付款</div>
      </div>
      <div class="pay-check"><svg><use href="#i-check"/></svg></div>
    </div>

    <div class="pay-method" data-method="linepay" onclick="pickPay(this)">
      <div class="pay-icon linepay">LINE</div>
      <div class="pay-info">
        <div class="pay-name">LINE Pay</div>
        <div class="pay-desc">用你的 LINE 帳號付款</div>
      </div>
      <div class="pay-check"><svg><use href="#i-check"/></svg></div>
    </div>

    <div class="pay-method" data-method="card" onclick="pickPay(this)">
      <div class="pay-icon card">VISA</div>
      <div class="pay-info">
        <div class="pay-name">信用卡 / 金融卡</div>
        <div class="pay-desc">VISA、Mastercard、JCB</div>
      </div>
      <div class="pay-check"><svg><use href="#i-check"/></svg></div>
    </div>

    <div class="pay-method" data-method="jko" onclick="pickPay(this)">
      <div class="pay-icon jko">JKO</div>
      <div class="pay-info">
        <div class="pay-name">街口支付</div>
        <div class="pay-desc">JKO Pay 一鍵付款</div>
      </div>
      <div class="pay-check"><svg><use href="#i-check"/></svg></div>
    </div>

    <div class="pay-method" data-method="gpay" onclick="pickPay(this)">
      <div class="pay-icon gpay">
        <svg viewBox="0 0 24 24" style="width:28px;height:28px;"><path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      </div>
      <div class="pay-info">
        <div class="pay-name">Google Pay</div>
        <div class="pay-desc">用你的 Google 帳號付款</div>
      </div>
      <div class="pay-check"><svg><use href="#i-check"/></svg></div>
    </div>

  </div>

  <!-- 信用卡欄位 -->
  <div class="card-fields" id="card-fields">
    <div class="cf-field">
      <label>卡號</label>
      <input type="text" id="card-num" placeholder="1234 5678 9012 3456" maxlength="19" inputmode="numeric">
    </div>
    <div class="cf-row">
      <div class="cf-field">
        <label>到期日</label>
        <input type="text" id="card-exp" placeholder="MM/YY" maxlength="5">
      </div>
      <div class="cf-field">
        <label>安全碼 CVV</label>
        <input type="text" id="card-cvv" placeholder="123" maxlength="4" inputmode="numeric">
      </div>
    </div>
  </div>

  <!-- 確認付款 -->
  <button class="pay-btn" id="pay-btn" onclick="confirmPay()" disabled>
    <svg><use href="#i-lock"/></svg>
    <span>確認付款 <span style="opacity:0.88;font-weight:500;">NT$<span id="btn-price">0</span></span></span>
  </button>

  <div class="security-note">
    <svg><use href="#i-shield"/></svg>
    交易加密 256-bit SSL 安全傳輸
  </div>

  <div class="back-link">
    <a onclick="window.location.href='16_buy_credits.html'">← 取消,回上一頁</a>
  </div>

</div>

<script>
var currentPlan = null;
var currentMethod = null;

function loadPlan() {
  try {
    var raw = sessionStorage.getItem('pendingPlan');
    if (!raw) {
      alert('找不到加值方案資料,將回到加值頁');
      window.location.href = '16_buy_credits.html';
      return;
    }
    currentPlan = JSON.parse(raw);
  } catch(e) {
    window.location.href = '16_buy_credits.html';
    return;
  }
  var base = currentPlan.received - currentPlan.bonus;
  document.getElementById('sum-base-pts').textContent = base;
  document.getElementById('sum-bonus').textContent = currentPlan.bonus;
  document.getElementById('sum-total-pts').textContent = currentPlan.received;
  document.getElementById('sum-price').textContent = currentPlan.price;
  document.getElementById('btn-price').textContent = currentPlan.price;
  if (currentPlan.bonus === 0) {
    document.getElementById('bonus-row').style.display = 'none';
  }
}

function pickPay(el) {
  document.querySelectorAll('.pay-method').forEach(function(m){ m.classList.remove('selected'); });
  el.classList.add('selected');
  currentMethod = el.getAttribute('data-method');
  var cf = document.getElementById('card-fields');
  if (currentMethod === 'card') cf.classList.add('show');
  else cf.classList.remove('show');
  /* 解除確認按鈕的 disabled */
  document.getElementById('pay-btn').disabled = false;
}

/* 信用卡卡號自動加空格 */
document.getElementById('card-num').addEventListener('input', function(e){
  var v = e.target.value.replace(/\s/g,'').replace(/\D/g,'');
  v = v.replace(/(.{4})/g,'$1 ').trim();
  e.target.value = v;
});

/* 到期日自動加 / */
document.getElementById('card-exp').addEventListener('input', function(e){
  var v = e.target.value.replace(/\D/g,'');
  if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2,4);
  e.target.value = v;
});

async function confirmPay() {
  if (!currentPlan) return;

  if (!currentMethod) {
    alert('請先選擇付款方式');
    document.querySelector('.pay-methods').scrollIntoView({behavior:'smooth', block:'center'});
    return;
  }

  if (currentMethod === 'card') {
    var num = document.getElementById('card-num').value.replace(/\s/g,'');
    var exp = document.getElementById('card-exp').value;
    var cvv = document.getElementById('card-cvv').value;
    if (num.length < 13) {
      alert('請輸入正確的卡號');
      document.getElementById('card-num').focus();
      return;
    }
    if (!/^\d{2}\/\d{2}$/.test(exp)) {
      alert('請輸入到期日(MM/YY)');
      document.getElementById('card-exp').focus();
      return;
    }
    if (cvv.length < 3) {
      alert('請輸入安全碼');
      document.getElementById('card-cvv').focus();
      return;
    }
  }

  var methodName = {
    apple:'Apple Pay', linepay:'LINE Pay', card:'信用卡', jko:'街口支付', gpay:'Google Pay'
  }[currentMethod];

  if (!confirm('【Demo 模擬付款】\n\n付款方式:' + methodName + '\n實得點數:' + currentPlan.received + ' 點\n應付金額:NT$ ' + currentPlan.price + '\n\n按下確定後將模擬付款成功(實際不會扣款)')) return;

  if (typeof window.sb === 'undefined') { alert('系統未就緒,請重新整理頁面'); return; }

  var btn = document.getElementById('pay-btn');
  btn.disabled = true;

  try {
    var ures = await sb.auth.getUser();
    var user = (ures && ures.data) ? ures.data.user : null;
    if (!user) { window.location.href = '13_login.html'; return; }

    var isSuncar = (currentPlan.pool === 'suncar');
    var col = isSuncar ? 'suncar_points' : 'client_points';
    var poolName = isSuncar ? '順咖' : '案家';

    /* 讀目前餘額,加上實得點數 */
    var pr = await sb.from('users').select(col).eq('id', user.id).maybeSingle();
    var cur = (pr.data && pr.data[col] != null) ? pr.data[col] : 0;
    var newBal = cur + currentPlan.received;

    /* 更新餘額 */
    var upd = {};
    upd[col] = newBal;
    var ru = await sb.from('users').update(upd).eq('id', user.id);
    if (ru.error) { alert('加值失敗:' + ru.error.message); btn.disabled = false; return; }

    /* 寫點數明細(只進不改) */
    var rt = await sb.from('point_transactions').insert({
      user_id: user.id,
      pool: isSuncar ? 'suncar' : 'client',
      change: currentPlan.received,
      reason: '點數加值',
      order_id: null
    });
    if (rt.error) console.error('point_transactions:', rt.error);

    try { sessionStorage.removeItem('pendingPlan'); } catch(e){}

    alert('儲值成功!' + poolName + '點數共獲得 ' + currentPlan.received + ' 點');

    /* 有 returnTo(下單途中來加值):回原頁繼續完成訂單;否則回 16 顯示成功 */
    var back = currentPlan.returnTo || '';
    if (back) {
      try { sessionStorage.removeItem('credits_returnTo'); } catch(e){}
      var sep = back.indexOf('?') >= 0 ? '&' : '?';
      window.location.href = back + sep + 'paid=1';
      return;
    }
    window.location.href = '16_buy_credits.html?success=1&pool=' + (isSuncar ? 'suncar' : 'client') + '&add=' + currentPlan.received;
  } catch(e) {
    console.error(e);
    alert('加值時發生錯誤,請稍後再試');
    btn.disabled = false;
  }
}

loadPlan();
</script>
</body>
</html>
