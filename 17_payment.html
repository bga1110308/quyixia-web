<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>付款 · 去一下</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
--gold:#EF9F27;--gold-dark:#BA7517;--gold-deeper:#633806;--gold-pale:#FAEEDA;
--cream:#fdf6ec;--green:#4a8c6a;--green-light:#d4ede1;--green-pale:#eaf5ef;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,var(--gold-pale) 0%,#fdf6ec 50%,var(--green-pale) 100%);color:#2a1f10;min-height:100vh;padding:1.25rem;}

.home-fab{position:fixed;top:14px;left:14px;width:42px;height:42px;border-radius:50%;background:#fff;border:1.5px solid #c9a96e;color:var(--gold-deeper);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;box-shadow:0 2px 8px rgba(99,56,6,0.1);transition:all 0.15s;text-decoration:none;}
.home-fab:hover{background:var(--gold);color:#fff;border-color:var(--gold);transform:scale(1.05);}
.home-fab svg{width:18px;height:18px;fill:currentColor;}

.wrap{max-width:480px;margin:1rem auto 0;}

/* === demo 提示 === */
.demo-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:10px 12px;margin-bottom:1rem;font-size:0.78rem;color:#7a5c00;line-height:1.6;display:flex;gap:8px;align-items:flex-start;}
.demo-banner svg{width:16px;height:16px;fill:#c9762f;flex-shrink:0;margin-top:2px;}

/* === 訂單摘要 === */
.order-card{background:#fff;border:0.5px solid #e8d8be;border-radius:14px;padding:1.25rem 1.35rem;margin-bottom:1rem;box-shadow:0 4px 14px rgba(99,56,6,0.06);}
.order-title{font-size:0.78rem;color:#9a7a50;letter-spacing:1px;margin-bottom:0.85rem;display:flex;align-items:center;gap:8px;}
.order-title::before{content:'';display:block;width:3px;height:14px;background:var(--gold-dark);border-radius:2px;}
.order-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:0.88rem;color:#5a3e1b;}
.order-row .label{color:#9a7a50;font-size:0.82rem;}
.order-row .val{font-weight:500;color:var(--gold-deeper);}
.order-row.highlight{padding-top:0.85rem;margin-top:0.5rem;border-top:1px dashed #e8d8be;}
.order-row.highlight .val{color:var(--gold-dark);font-size:1.05rem;}
.order-row .bonus-tag{font-size:0.68rem;background:var(--green-pale);color:var(--green);padding:2px 7px;border-radius:99px;margin-left:6px;font-weight:500;}

.total-card{background:linear-gradient(135deg,var(--gold-deeper) 0%,var(--gold-dark) 100%);color:#fff;border-radius:14px;padding:1.1rem 1.35rem;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center;}
.total-card .lbl{font-size:0.85rem;opacity:0.9;}
.total-card .price{font-size:1.7rem;font-weight:500;letter-spacing:-1px;}
.total-card .price .tw{font-size:0.85rem;opacity:0.85;margin-right:2px;font-weight:400;}

/* === 付款方式 === */
.section-title{font-size:0.95rem;font-weight:500;color:var(--gold-deeper);margin:1.25rem 0 0.75rem;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';display:block;width:3px;height:15px;background:var(--gold-dark);border-radius:2px;}

.pay-methods{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem;}
.pay-method{background:#fff;border:1.5px solid #e8d8be;border-radius:12px;padding:1rem 1.1rem;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.15s;}
.pay-method:hover{border-color:var(--gold-dark);background:var(--gold-pale);}
.pay-method.selected{border-color:var(--gold-dark);background:var(--gold-pale);box-shadow:0 4px 12px rgba(186,117,23,0.12);}
.pay-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.4rem;font-weight:600;}
.pay-info{flex:1;}
.pay-name{font-size:0.92rem;font-weight:500;color:var(--gold-deeper);}
.pay-desc{font-size:0.72rem;color:#9a7a50;margin-top:2px;}
.pay-check{width:22px;height:22px;border-radius:50%;border:2px solid #d4c8a8;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;}
.pay-method.selected .pay-check{background:var(--gold-dark);border-color:var(--gold-dark);}
.pay-method.selected .pay-check svg{display:block;}
.pay-check svg{width:13px;height:13px;fill:#fff;display:none;}

/* 各付款方式 icon 配色 */
.pay-icon.apple{background:#000;color:#fff;}
.pay-icon.linepay{background:#06c755;color:#fff;}
.pay-icon.card{background:linear-gradient(135deg,#4f7cc8 0%,#2a4d8c 100%);color:#fff;font-size:1.1rem;}
.pay-icon.jko{background:#fd5e25;color:#fff;font-weight:700;letter-spacing:-1px;}
.pay-icon.gpay{background:#fff;border:1.5px solid #e0e0e0;}

/* === 信用卡欄位 === */
.card-fields{display:none;background:var(--cream);border:0.5px solid #e8d8be;border-radius:10px;padding:1rem;margin-top:-2px;margin-bottom:1.25rem;}
.card-fields.show{display:block;}
.cf-field{margin-bottom:0.7rem;}
.cf-field label{display:block;font-size:0.74rem;color:#7a5c3a;margin-bottom:4px;}
.cf-field input{width:100%;padding:0.6rem 0.75rem;border:1.5px solid #c9a96e;border-radius:8px;font-size:0.88rem;background:#fff;color:var(--gold-deeper);font-family:inherit;letter-spacing:1px;}
.cf-field input:focus{outline:none;border-color:var(--gold-dark);}
.cf-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* === 確認付款按鈕 === */
.pay-btn{width:100%;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);color:#fff;border:none;padding:1rem;border-radius:12px;font-size:1rem;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 16px rgba(186,117,23,0.25);transition:all 0.15s;}
.pay-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 20px rgba(186,117,23,0.3);}
.pay-btn:active{transform:translateY(0);}
.pay-btn:disabled{background:#d4c8a8;cursor:not-allowed;box-shadow:none;}
.pay-btn svg{width:18px;height:18px;fill:currentColor;}

.back-link{text-align:center;margin-top:1rem;font-size:0.82rem;}
.back-link a{color:var(--gold-dark);text-decoration:underline;cursor:pointer;}

.security-note{text-align:center;font-size:0.7rem;color:#9a7a50;margin-top:0.85rem;line-height:1.6;}
.security-note svg{width:12px;height:12px;fill:currentColor;vertical-align:-2px;}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<defs>
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></symbol>
  <symbol id="i-lock" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6z"/></symbol>
  <symbol id="i-warn" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></symbol>
  <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></symbol>
</defs>
</svg>

<a href="16_buy_credits.html" class="home-fab" title="回上一頁"><svg><use href="#i-home"/></svg></a>

<div class="wrap">

  <div class="demo-banner">
    <svg><use href="#i-warn"/></svg>
    <span><strong>Demo 模式</strong>：本頁為展示用，按下「確認付款」不會真正扣款。正式上線將串接綠界/藍新金流，所有付款方式都會真實運作。</span>
  </div>

  <!-- 訂單摘要 -->
  <div class="order-card">
    <div class="order-title">訂單摘要</div>
    <div class="order-row">
      <span class="label">方案點數</span>
      <span class="val"><span id="sum-base-pts">0</span> 點</span>
    </div>
    <div class="order-row" id="bonus-row">
      <span class="label">加贈點數</span>
      <span class="val" style="color:var(--green);">+<span id="sum-bonus">0</span> 點 <span class="bonus-tag">優惠</span></span>
    </div>
    <div class="order-row highlight">
      <span class="label">本次獲得</span>
      <span class="val"><span id="sum-total-pts">0</span> 點</span>
    </div>
  </div>

  <!-- 應付總額 -->
  <div class="total-card">
    <div class="lbl">應付金額</div>
    <div class="price"><span class="tw">NT$</span><span id="sum-price">0</span></div>
  </div>

  <!-- 付款方式 -->
  <div class="section-title">選擇付款方式</div>
  <div class="pay-methods">

    <div class="pay-method" data-method="apple" onclick="pickPay(this)">
      <div class="pay-icon apple"></div>
      <div class="pay-info">
        <div class="pay-name">Apple Pay</div>
        <div class="pay-desc">用 Touch ID / Face ID 一鍵付款</div>
      </div>
      <div class="pay-check"><svg><use href="#i-check"/></svg></div>
    </div>

    <div class="pay-method" data-method="linepay" onclick="pickPay(this)">
      <div class="pay-icon linepay">LINE</div>
      <div class="pay-info">
        <div class="pay-name">LINE Pay</div>
        <div class="pay-desc">用你的 LINE 帳號付款</div>
      </div>
      <div class="pay-check"><svg><use href="#i-check"/></svg></div>
    </div>

    <div class="pay-method selected" data-method="card" onclick="pickPay(this)">
      <div class="pay-icon card">VISA</div>
      <div class="pay-info">
        <div class="pay-name">信用卡 / 金融卡</div>
        <div class="pay-desc">VISA、Mastercard、JCB</div>
      </div>
      <div class="pay-check"><svg><use href="#i-check"/></svg></div>
    </div>

    <div class="pay-method" data-method="jko" onclick="pickPay(this)">
      <div class="pay-icon jko">JKO</div>
      <div class="pay-info">
        <div class="pay-name">街口支付</div>
        <div class="pay-desc">JKO Pay 一鍵付款</div>
      </div>
      <div class="pay-check"><svg><use href="#i-check"/></svg></div>
    </div>

    <div class="pay-method" data-method="gpay" onclick="pickPay(this)">
      <div class="pay-icon gpay">
        <svg viewBox="0 0 24 24" style="width:28px;height:28px;"><path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      </div>
      <div class="pay-info">
        <div class="pay-name">Google Pay</div>
        <div class="pay-desc">用你的 Google 帳號付款</div>
      </div>
      <div class="pay-check"><svg><use href="#i-check"/></svg></div>
    </div>

  </div>

  <!-- 信用卡欄位（僅當選信用卡時顯示） -->
  <div class="card-fields show" id="card-fields">
    <div class="cf-field">
      <label>卡號</label>
      <input type="text" id="card-num" placeholder="1234 5678 9012 3456" maxlength="19" inputmode="numeric">
    </div>
    <div class="cf-row">
      <div class="cf-field">
        <label>到期日</label>
        <input type="text" id="card-exp" placeholder="MM/YY" maxlength="5">
      </div>
      <div class="cf-field">
        <label>安全碼 CVV</label>
        <input type="text" id="card-cvv" placeholder="123" maxlength="4" inputmode="numeric">
      </div>
    </div>
  </div>

  <!-- 確認付款 -->
  <button class="pay-btn" onclick="confirmPay()">
    <svg><use href="#i-lock"/></svg>
    <span>確認付款 <span style="opacity:0.85;font-weight:400;">NT$<span id="btn-price">0</span></span></span>
  </button>

  <div class="security-note">
    <svg><use href="#i-shield"/></svg>
    交易加密 256-bit SSL 安全傳輸
  </div>

  <div class="back-link">
    <a onclick="window.location.href='16_buy_credits.html'">← 取消，回上一頁</a>
  </div>

</div>

<script>
var currentPlan = null;
var currentMethod = 'card';

/* 讀取選好的方案 */
function loadPlan() {
  try {
    var raw = sessionStorage.getItem('pendingPlan');
    if (!raw) {
      alert('找不到加值方案資料，將回到加值頁');
      window.location.href = '16_buy_credits.html';
      return;
    }
    currentPlan = JSON.parse(raw);
  } catch(e) {
    window.location.href = '16_buy_credits.html';
    return;
  }
  var base = currentPlan.pts - currentPlan.bonus;
  document.getElementById('sum-base-pts').textContent = base;
  document.getElementById('sum-bonus').textContent = currentPlan.bonus;
  document.getElementById('sum-total-pts').textContent = currentPlan.pts;
  document.getElementById('sum-price').textContent = currentPlan.price;
  document.getElementById('btn-price').textContent = currentPlan.price;
  if (currentPlan.bonus === 0) {
    document.getElementById('bonus-row').style.display = 'none';
  }
}

function pickPay(el) {
  document.querySelectorAll('.pay-method').forEach(function(m){ m.classList.remove('selected'); });
  el.classList.add('selected');
  currentMethod = el.getAttribute('data-method');
  /* 只有信用卡顯示欄位 */
  var cf = document.getElementById('card-fields');
  if (currentMethod === 'card') cf.classList.add('show');
  else cf.classList.remove('show');
}

/* 信用卡卡號自動加空格 */
document.getElementById('card-num').addEventListener('input', function(e){
  var v = e.target.value.replace(/\s/g,'').replace(/\D/g,'');
  v = v.replace(/(.{4})/g,'$1 ').trim();
  e.target.value = v;
});

/* 到期日自動加 / */
document.getElementById('card-exp').addEventListener('input', function(e){
  var v = e.target.value.replace(/\D/g,'');
  if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2,4);
  e.target.value = v;
});

function confirmPay() {
  if (!currentPlan) return;

  /* 若選信用卡，做最簡單的格式檢查（demo 用） */
  if (currentMethod === 'card') {
    var num = document.getElementById('card-num').value.replace(/\s/g,'');
    var exp = document.getElementById('card-exp').value;
    var cvv = document.getElementById('card-cvv').value;
    if (num.length < 13) {
      alert('請輸入正確的卡號');
      document.getElementById('card-num').focus();
      return;
    }
    if (!/^\d{2}\/\d{2}$/.test(exp)) {
      alert('請輸入到期日（MM/YY）');
      document.getElementById('card-exp').focus();
      return;
    }
    if (cvv.length < 3) {
      alert('請輸入安全碼');
      document.getElementById('card-cvv').focus();
      return;
    }
  }

  var methodName = {
    apple:'Apple Pay', linepay:'LINE Pay', card:'信用卡', jko:'街口支付', gpay:'Google Pay'
  }[currentMethod];

  /* Demo 模擬付款 */
  if (!confirm('【Demo 模擬付款】\n\n付款方式：' + methodName + '\n本次獲得：' + currentPlan.pts + ' 點\n應付金額：NT$ ' + currentPlan.price + '\n\n按下確定後將模擬付款成功（實際不會扣款）')) return;

  /* 加點 */
  try {
    var cur = parseInt(sessionStorage.getItem('userPoints') || '0', 10);
    if (isNaN(cur)) cur = 0;
    sessionStorage.setItem('userPoints', String(cur + currentPlan.pts));
    sessionStorage.removeItem('pendingPlan');
  } catch(e){}

  /* 跳回 16，帶 success 參數 */
  window.location.href = '16_buy_credits.html?success=1&add=' + currentPlan.pts;
}

loadPlan();
</script>
</body>
</html>
