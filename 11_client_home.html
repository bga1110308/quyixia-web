<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的首頁 · 去一下</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --honey:#FFB84D;
  --amber:#EF9F27;
  --amber-deep:#BA7517;
  --amber-darker:#8B5A0F;
  --champagne:#FFF4DD;
  --champagne-soft:#FFFCF5;
  --forest:#2F6048;
  --mint:#5FB58E;
  --mint-pale:#E8F5EE;
  --ink:#3D2914;
  --ink-soft:#8B7355;
  --ink-light:#B8A485;
  --border:#FFE9B8;
  --border-soft:#F5EBD8;
  --warn:#E89544;
  --warn-pale:#FFF1E0;
  --danger:#D9534F;
  --danger-pale:#FCE8E7;
  --line-green:#06C755;
}
body{font-family:'Noto Sans TC','Source Han Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Segoe UI',sans-serif;background:var(--champagne-soft);color:var(--ink);line-height:1.55;}
.icon{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;fill:currentColor;}

/* 品牌字 */
.brand{font-weight:500;line-height:1;display:inline-flex;align-items:baseline;letter-spacing:-0.02em;}
.brand .qu,.brand .xia{color:var(--amber-darker);}
.brand .yi{color:var(--forest);}

.home-fab{position:fixed;top:14px;left:14px;width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid var(--border);color:var(--amber-deep);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;box-shadow:0 4px 14px rgba(186,117,23,0.15);transition:all 0.2s;text-decoration:none;}
.home-fab:hover{background:var(--champagne);transform:scale(1.05);border-color:var(--amber);}
.home-fab svg{width:18px;height:18px;fill:currentColor;}

/* === 身份識別條 === */
.role-strip{display:flex;align-items:center;gap:8px;padding:10px 1.25rem 10px 4rem;background:#fff;border-bottom:1px solid var(--border);font-size:0.82rem;color:var(--ink-soft);}
.role-strip svg{width:16px;height:16px;fill:var(--amber-deep);}
.role-label{font-weight:500;color:var(--ink);}
.role-switch-link{margin-left:auto;font-size:0.74rem;color:var(--forest);text-decoration:none;background:var(--mint-pale);padding:4px 10px;border-radius:99px;border:1px solid rgba(95,181,142,0.25);font-weight:500;}
.role-switch-link:hover{background:var(--mint);color:#fff;}

/* === HERO === */
.hero{background:linear-gradient(135deg,var(--champagne) 0%,var(--champagne-soft) 55%,var(--mint-pale) 100%);padding:1.75rem 1.25rem 1.5rem;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-80px;right:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(239,159,39,0.18) 0%,transparent 70%);pointer-events:none;}
.hero::after{content:'';position:absolute;bottom:-100px;left:-80px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(95,181,142,0.15) 0%,transparent 70%);pointer-events:none;}
.hero-inner{position:relative;max-width:720px;margin:0 auto;}

.hero-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}

/* 頭像 C 風格 */
.h-avatar{position:relative;width:62px;height:62px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:1.6rem;color:var(--amber-deep);flex-shrink:0;box-shadow:0 4px 14px rgba(186,117,23,0.2),inset 0 0 0 1.5px var(--border);}
.h-avatar::after{content:'✓';position:absolute;bottom:-3px;right:-3px;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--honey),var(--amber));border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.7rem;font-weight:700;box-shadow:0 2px 6px rgba(239,159,39,0.4);}

.h-info{flex:1;min-width:0;}
.h-greeting{font-size:0.74rem;color:var(--ink-light);font-weight:500;}
.h-name{font-size:1.3rem;font-weight:600;color:var(--amber-darker);margin:2px 0 6px;letter-spacing:-0.3px;}
.h-badges{display:flex;gap:5px;flex-wrap:wrap;}
.bm{font-size:0.66rem;padding:3px 8px;border-radius:99px;font-weight:600;display:inline-flex;align-items:center;gap:3px;}
.bm svg{width:0.9em;height:0.9em;fill:currentColor;}
.b-verified{background:var(--mint-pale);color:var(--forest);}
.b-phone{background:var(--champagne);color:var(--amber-deep);}
.bm-unverified{background:#F0EBE0;color:var(--ink-light);cursor:pointer;border:1px dashed var(--ink-light);}
.bm-unverified:hover{background:var(--warn-pale);color:var(--warn);border-color:var(--warn);}

/* 皇冠按鈕(11 級制) */
.crown-btn{position:relative;display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:99px;font-weight:600;font-size:0.85rem;cursor:pointer;text-decoration:none;flex-shrink:0;transition:all 0.2s;border:1.5px solid transparent;}
.crown-btn:hover{transform:translateY(-2px);}
.crown-svg{width:1.05em;height:1.05em;fill:currentColor;}
.crown-count{font-weight:700;}
.crown-tooltip{position:absolute;bottom:-32px;right:0;background:rgba(61,41,20,0.92);color:#fff;font-size:0.68rem;padding:5px 9px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:all 0.2s;font-weight:500;}
.crown-btn:hover .crown-tooltip{opacity:1;bottom:-36px;}

/* LV 0:灰底未啟動 */
.crown-btn.lv0{background:#F0EBE0;color:var(--ink-light);border-color:var(--border);}
/* LV 1:淺金 */
.crown-btn.lv1{background:var(--champagne);color:var(--amber-deep);border-color:var(--border);}
/* LV 2:金 */
.crown-btn.lv2{background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;box-shadow:0 4px 12px rgba(239,159,39,0.3);}
/* LV 3:深金 */
.crown-btn.lv3{background:linear-gradient(135deg,var(--amber),var(--amber-deep));color:#fff;box-shadow:0 4px 14px rgba(186,117,23,0.4);}
/* LV 4 王者系列:漸層 + 動畫 */
.crown-btn.lv4{color:#fff;font-weight:700;box-shadow:0 6px 18px rgba(239,159,39,0.5);position:relative;}
.crown-btn.lv4::before{content:'';position:absolute;inset:-2px;border-radius:99px;background:linear-gradient(45deg,var(--honey),#FFD700,var(--amber),var(--honey));z-index:-1;animation:crownGlow 3s linear infinite;background-size:300% 300%;}
@keyframes crownGlow{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.crown-btn.lv4.k1{background:linear-gradient(135deg,#FFD700,var(--amber));}
.crown-btn.lv4.k2{background:linear-gradient(135deg,#FFE066,#FFA500);}
.crown-btn.lv4.k3{background:linear-gradient(135deg,#FFEC8B,#FF8C00);}
.crown-btn.lv4.k4{background:linear-gradient(135deg,#FFF0A8,#FF7B00);}
.crown-btn.lv4.k5{background:linear-gradient(135deg,#FFF4C0,#FF6A00);}
.crown-btn.lv4.k6{background:linear-gradient(135deg,#FFD700,#E94B00);}
.crown-btn.lv4.k7{background:linear-gradient(135deg,#FFD700,#D40000);animation:k7Pulse 2s ease-in-out infinite;}
@keyframes k7Pulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.15);}}

.edit-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:99px;background:#fff;border:1.5px solid var(--border);color:var(--ink-soft);font-size:0.78rem;font-weight:500;font-family:inherit;cursor:pointer;transition:all 0.2s;}
.edit-btn:hover{border-color:var(--amber);color:var(--amber-deep);background:var(--champagne);}
.edit-btn svg{width:0.95em;height:0.95em;fill:currentColor;}

/* 雙重身份切換 */
.role-switch{display:none;margin-top:1rem;background:#fff;border:1px solid var(--border);border-radius:99px;padding:4px;gap:4px;}
.role-switch.show{display:inline-flex;}
.rs-pill{flex:1;padding:8px 14px;font-size:0.85rem;font-weight:500;color:var(--ink-soft);background:transparent;border:none;border-radius:99px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:all 0.2s;}
.rs-pill:hover{color:var(--amber-deep);}
.rs-pill.on{background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;font-weight:600;box-shadow:0 3px 10px rgba(239,159,39,0.3);}
.rs-pill svg{width:1em;height:1em;fill:currentColor;}

/* === 主要內容 === */
.wrap{max-width:720px;margin:0 auto;padding:1.25rem 1.25rem 3rem;}

/* 找順咖大按鈕 */
.find-staff-cta{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,var(--honey) 0%,var(--amber) 100%);color:#fff;text-decoration:none;padding:1.1rem 1.25rem;border-radius:20px;box-shadow:0 8px 24px rgba(239,159,39,0.35);margin-bottom:1.5rem;transition:all 0.25s;position:relative;overflow:hidden;}
.find-staff-cta::before{content:'';position:absolute;top:-50px;right:-50px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,0.15);transition:all 0.3s;}
.find-staff-cta:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(239,159,39,0.45);}
.find-staff-cta:hover::before{width:220px;height:220px;}
.fs-cta-icon{position:relative;width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);flex-shrink:0;}
.fs-cta-icon svg{width:26px;height:26px;fill:#fff;}
.fs-cta-text{position:relative;flex:1;}
.fs-cta-title{font-size:1.15rem;font-weight:700;letter-spacing:-0.3px;}
.fs-cta-sub{font-size:0.78rem;opacity:0.9;margin-top:3px;}
.fs-cta-arrow{position:relative;font-size:1.4rem;font-weight:300;}

/* 區塊標題 */
.sec-h{display:flex;align-items:center;justify-content:space-between;margin:1.5rem 0 0.85rem;}
.sec-title{font-size:1rem;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px;}
.sec-title::before{content:'';width:4px;height:18px;background:linear-gradient(180deg,var(--honey),var(--amber));border-radius:2px;}
.sec-action{font-size:0.78rem;color:var(--amber-deep);text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;gap:3px;font-weight:500;}
.sec-action svg{width:1em;height:1em;fill:currentColor;}
.sec-action:hover{color:var(--amber-darker);}

/* === 數據概覽 === */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:14px 8px;text-align:center;transition:all 0.2s;}
.stat-card.clickable{cursor:pointer;}
.stat-card.clickable:hover{transform:translateY(-2px);border-color:var(--amber);box-shadow:0 6px 18px rgba(239,159,39,0.15);}
.stat-num{font-size:1.4rem;font-weight:700;color:var(--ink-soft);letter-spacing:-0.5px;}
.stat-num.has-active{color:var(--amber-deep);}
.stat-num.has-done{color:var(--forest);}
.stat-label{font-size:0.72rem;color:var(--ink-light);margin-top:3px;font-weight:500;}

/* === 訂單卡片 === */
.order-card{background:#fff;border:1.5px solid var(--border);border-radius:18px;padding:1rem 1.1rem;margin-bottom:10px;cursor:pointer;transition:all 0.2s;}
.order-card:hover{border-color:var(--amber);transform:translateY(-2px);box-shadow:0 6px 18px rgba(239,159,39,0.12);}
.order-card.active-order{border-color:var(--amber);background:linear-gradient(135deg,var(--champagne-soft),#fff);}
.order-card.matching{border-color:rgba(95,181,142,0.4);background:linear-gradient(135deg,var(--mint-pale),#fff 60%);}
.order-card.done-order{opacity:0.95;}

.oc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.oc-id-row{font-size:0.7rem;color:var(--ink-light);margin-bottom:3px;}
.oc-id{color:var(--amber-deep);font-weight:600;}
.oc-title{font-size:1rem;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.pool-chip{font-size:0.62rem;padding:2px 7px;border-radius:99px;font-weight:600;}
.pool-A{background:var(--mint-pale);color:var(--forest);}
.pool-B{background:var(--warn-pale);color:var(--warn);}

.status-tag{font-size:0.7rem;padding:4px 10px;border-radius:99px;font-weight:600;display:inline-flex;align-items:center;gap:4px;flex-shrink:0;}
.status-tag svg{width:0.85em;height:0.85em;fill:currentColor;}
.s-active{background:rgba(239,159,39,0.15);color:var(--amber-deep);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
.s-matching{background:var(--mint-pale);color:var(--forest);}
.s-done{background:#F0EBE0;color:var(--ink-soft);}

.oc-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:0.75rem;color:var(--ink-soft);margin-bottom:10px;}
.oc-meta-item{display:inline-flex;align-items:center;gap:3px;}
.oc-meta-item svg{width:0.85em;height:0.85em;fill:currentColor;}

.oc-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px dashed var(--border);}
.oc-staff{display:flex;align-items:center;gap:7px;font-size:0.82rem;color:var(--ink);font-weight:500;}
.oc-staff-avatar{width:28px;height:28px;border-radius:50%;background:#fff;color:var(--amber-deep);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.8rem;box-shadow:0 2px 6px rgba(186,117,23,0.15),inset 0 0 0 1px var(--border);}
.oc-price-label{font-size:0.7rem;color:var(--ink-light);margin-right:4px;}
.oc-price{font-size:1.05rem;font-weight:700;color:var(--amber-deep);}

/* 聯絡按鈕(進行中訂單) */
.contact-row{display:flex;gap:8px;margin-top:0.85rem;padding-top:0.85rem;border-top:1px dashed var(--border);}
.contact-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;border-radius:12px;font-size:0.84rem;font-weight:600;text-decoration:none;transition:all 0.2s;font-family:inherit;border:none;cursor:pointer;}
.contact-btn.call{background:linear-gradient(135deg,var(--mint),var(--forest));color:#fff;box-shadow:0 4px 12px rgba(47,96,72,0.25);}
.contact-btn.line{background:var(--line-green);color:#fff;box-shadow:0 4px 12px rgba(6,199,85,0.25);}
.contact-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.2);}
.contact-icon{font-size:1em;}

/* === 篩選 === */
.filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:0.85rem;-webkit-overflow-scrolling:touch;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-tag{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;background:#fff;border:1.5px solid var(--border);border-radius:99px;font-size:0.82rem;color:var(--ink-soft);cursor:pointer;flex-shrink:0;font-weight:500;transition:all 0.2s;}
.filter-tag:hover{background:var(--champagne);}
.filter-tag.on{background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(239,159,39,0.3);}
.filter-tag .cnt{font-size:0.66rem;background:rgba(255,255,255,0.4);padding:1px 6px;border-radius:99px;font-weight:600;}
.filter-tag:not(.on) .cnt{background:var(--champagne);color:var(--amber-deep);}

/* === 空狀態 === */
.empty{text-align:center;padding:3rem 1rem;}
.empty-ico{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--champagne),var(--mint-pale));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.empty-ico svg{width:32px;height:32px;fill:var(--amber);}
.empty-title{font-size:1rem;color:var(--ink);font-weight:600;}
.empty-desc{font-size:0.82rem;color:var(--ink-soft);margin-top:5px;}
.empty-cta{display:inline-block;margin-top:1rem;padding:0.7rem 1.4rem;background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;text-decoration:none;border-radius:99px;font-size:0.88rem;font-weight:600;box-shadow:0 4px 14px rgba(239,159,39,0.3);}

/* === 快速動作 === */
.quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.qa-btn{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:14px 12px;text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px;transition:all 0.2s;}
.qa-btn:hover{transform:translateY(-2px);border-color:var(--amber);box-shadow:0 6px 18px rgba(239,159,39,0.12);}
.qa-ico{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--champagne),#fff);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--amber-deep);flex-shrink:0;}
.qa-ico.green{background:linear-gradient(135deg,var(--mint-pale),#fff);border-color:rgba(95,181,142,0.3);color:var(--forest);}
.qa-ico.blue{background:linear-gradient(135deg,#E8F1F8,#fff);border-color:rgba(74,144,200,0.3);color:#4A90C8;}
.qa-ico svg{width:18px;height:18px;fill:currentColor;}
.qa-title{font-size:0.88rem;font-weight:600;color:var(--ink);}
.qa-desc{font-size:0.7rem;color:var(--ink-light);margin-top:2px;}

/* === 招募 CTA === */
.recruit-cta{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--forest),#1F4A36);color:#fff;border-radius:18px;padding:1rem 1.1rem;margin-top:1.5rem;position:relative;overflow:hidden;}
.recruit-cta::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(95,181,142,0.3) 0%,transparent 70%);}
.rc-ico{position:relative;width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);flex-shrink:0;}
.rc-ico svg{width:20px;height:20px;fill:var(--honey);}
.rc-text{position:relative;flex:1;}
.rc-title{font-size:0.95rem;font-weight:600;}
.rc-desc{font-size:0.74rem;opacity:0.85;margin-top:2px;line-height:1.55;}
.rc-btn{position:relative;background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;padding:7px 16px;border-radius:99px;text-decoration:none;font-size:0.82rem;font-weight:600;flex-shrink:0;transition:all 0.2s;}
.rc-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(239,159,39,0.4);}

@media (max-width:480px){
  .role-strip{font-size:0.75rem;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .quick-actions{grid-template-columns:1fr;}
  .h-name{font-size:1.15rem;}
  .find-staff-cta{padding:1rem;gap:10px;}
  .fs-cta-title{font-size:1.05rem;}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
<script src="qyx-load-guard.js"></script>
<script src="qyx-consent-guard.js"></script>
</head>

<script>
/* === 接 Supabase:讀登入者真實資料與訂單 === */
(function(){
  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function firstChar(name){ name=(name||'').trim(); if(!name) return '·'; var chars=Array.from(name); for(var i=0;i<chars.length;i++){ if(/[\p{L}\p{N}]/u.test(chars[i])) return chars[i]; } return chars[0]; }
  function greeting(){ var h=new Date().getHours(); if(h<5)return '嗨,夜深了'; if(h<11)return '嗨,早安'; if(h<14)return '嗨,午安'; if(h<18)return '嗨,午後好'; return '嗨,晚安'; }

  /* 訂單狀態對照:04_order_form 寫入 orders.status 時請沿用這四個值 */
  var STATUS = {
    matching:  { label:'媒合中', cls:'s-matching', icon:'#i-clock', group:'matching' },
    accepted:  { label:'待服務', cls:'s-matching', icon:'#i-clock', group:'active' },
    active:    { label:'服務中', cls:'s-active',   icon:'#i-radio', group:'active' },
    await_confirm: { label:'等待你確認', cls:'s-active', icon:'#i-clock', group:'active' },
    done:      { label:'已完成', cls:'s-done',     icon:'#i-check', group:'done' },
    cancelled: { label:'已取消', cls:'s-done',     icon:'#i-check', group:'done' }
  };
  function poolChip(pool){ return pool==='B' ? '<span class="pool-chip pool-B">照服員</span>' : '<span class="pool-chip pool-A">一般</span>'; }
  function shortNo(no){ if(!no) return ''; var m=String(no).match(/(\d{4})$/); return m ? '#'+m[1] : '#'+String(no).slice(-4); }
  function fmtDate(ts){ if(!ts) return ''; var d=new Date(ts); return d.getFullYear()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
  function hoursText(min){ if(!min) return ''; return (Math.round(min/60*10)/10)+' 小時'; }

  function buildCard(o, staffName){
    var st = STATUS[o.status] || STATUS.matching;
    // 只有「媒合中、待服務」可由案家取消;服務中/已完成不給取消,要走後台
    var canCancel = (o.status === 'matching' || o.status === 'accepted');
    var loc = [o.service_district, o.service_address].filter(Boolean).join(' · ');
    var metaTime = hoursText(o.duration_minutes);
    var priceLabel = st.group==='done' ? '已付' : (st.group==='matching' ? '願付' : '總計');
    return ''+
      '<div class="order-card '+(st.group==='active'?'active-order':st.group==='matching'?'matching':'done-order')+'" data-status="'+st.group+'" onclick="window.location.href=\'10_order_detail.html?id='+esc(o.id)+'\'">'+
        '<div class="oc-top">'+
          '<div style="flex:1;min-width:0;">'+
            '<div class="oc-id-row"><span class="oc-id">'+esc(shortNo(o.order_no))+'</span> · '+esc(fmtDate(o.service_time))+'</div>'+
            '<div class="oc-title">'+esc(o.service_type||'服務')+poolChip(o.pool)+'</div>'+
          '</div>'+
          '<span class="status-tag '+st.cls+'"><svg><use href="'+st.icon+'"/></svg>'+st.label+'</span>'+
        '</div>'+
        '<div class="oc-meta">'+
          (loc ? '<span class="oc-meta-item"><svg><use href="#i-pin"/></svg>'+esc(loc)+'</span>' : '')+
          (metaTime ? '<span class="oc-meta-item"><svg><use href="#i-clock"/></svg>'+esc(metaTime)+'</span>' : '')+
        '</div>'+
        '<div class="oc-bottom">'+
          (staffName
            ? '<div class="oc-staff"><div class="oc-staff-avatar">'+esc(firstChar(staffName))+'</div><span>'+esc(staffName)+'</span></div>'
            : '<div style="font-size:0.74rem;color:var(--ink-light);">'+(st.group==='matching'?'媒合中,等待順咖接單':'')+'</div>')+
          '<div><span class="oc-price-label">'+priceLabel+'</span><span class="oc-price">$ '+esc(o.amount==null?'-':o.amount)+'</span></div>'+
        '</div>'+
        (canCancel ? '<div style="margin-top:10px;text-align:right;"><button onclick="event.stopPropagation(); window.cancelClientOrder(\''+esc(o.id)+'\', \''+esc(o.status)+'\')" style="background:#fff;border:1.5px solid var(--danger);color:var(--danger);font-family:inherit;font-size:0.78rem;font-weight:600;padding:6px 14px;border-radius:99px;cursor:pointer;">取消訂單</button></div>' : '')+
      '</div>';
  }

  var _clientUserId = null;

  /* 案家取消自己的訂單:軟取消,status 改 cancelled(不是真刪除,後台仍查得到)。
     條件帶 client_id=本人 且 status 在 媒合中/待服務,服務中/已完成不給取消。
     取消成功後重整,因為已被濾掉所以不再出現。 */
  window.cancelClientOrder = async function(orderId, status){
    if(!_clientUserId){ alert('請重新整理頁面後再試'); return; }
    // 待服務(已有順咖接單)後取消會被記錄,影響取消率;媒合中取消不計次
    var msg = (status === 'accepted')
      ? '這筆已有順咖接單。\n取消會被記錄為一次取消,影響你的取消率。\n確定要取消嗎?'
      : '確定要取消這筆訂單嗎?\n取消後你和順咖都不會再看到這筆。';
    if(!confirm(msg)) return;
    var res = await sb.from('orders')
      .update({ status: 'cancelled' })
      .eq('id', orderId).eq('client_id', _clientUserId).in('status', ['matching','accepted'])
      .select('id');
    if(res.error){ alert('取消失敗:' + res.error.message); return; }
    if(!res.data || !res.data.length){ alert('這筆狀態已改變,無法取消,請重新整理。'); location.reload(); return; }
    alert('已取消這筆訂單。');
    location.reload();
  };

  async function init(){
    if(typeof window.sb === 'undefined'){ console.error('supabase-init.js 未載入'); return; }
    // 守門:先讀本機 session(LINE 內建瀏覽器較可靠),getUser 只當備援。
    // 不要只用 getUser,它在 webview 常回 null,會跟 13 互踢成無窮迴圈。
    var user = null;
    var sres = await sb.auth.getSession();
    if(sres.data && sres.data.session && sres.data.session.user){
      user = sres.data.session.user;
    } else {
      var ures = await sb.auth.getUser();
      user = (ures && ures.data) ? ures.data.user : null;
    }
    if(!user){ window.location.href = '13_login.html'; return; }
    _clientUserId = user.id; // 存本人 id,取消訂單時用來限定只能取消自己的單

    /* 本人 users */
    var prof = await sb.from('users').select('display_name,member_no,client_points,phone,is_verified,is_realname,role_detail').eq('id', user.id).maybeSingle();
    var u = prof.data || {};
    var name = u.display_name || (u.role_detail && u.role_detail.real_name) || '會員';
    $('h-name').textContent = name;
    var _avurl = u.role_detail && u.role_detail.avatar_url; if(_avurl){ $('h-avatar').innerHTML = '<img src="'+esc(_avurl)+'" alt="頭像" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">'; } else { $('h-avatar').textContent = firstChar(name); }
    $('h-greeting').textContent = greeting();
    $('stat-points').textContent = (u.client_points||0) + ' 點';
    $('h-member').textContent = u.member_no ? ('會員編號 '+u.member_no) : '';

    /* 皇冠等級:人頭數 = referred_by = 我 的帳號數(註冊就算),純裝飾 */
    var hc = await sb.from('users').select('id', { count: 'exact', head: true }).eq('referred_by', user.id);
    renderCrown(hc.count || 0);

    var badges = '';
    if(u.is_realname || u.is_verified){ badges += '<span class="bm b-verified"><svg><use href="#i-check"/></svg>實名</span>'; }
    if(u.phone){ badges += '<span class="bm b-phone"><svg><use href="#i-phone"/></svg>手機已驗</span>'; }
    var hasEmail = u.role_detail && u.role_detail.email;
    badges += hasEmail
      ? '<span class="bm b-verified"><svg><use href="#i-mail"/></svg>信箱已留</span>'
      : '<span class="bm bm-unverified" onclick="window.location.href=\'07_verification.html\'"><svg><use href="#i-mail"/></svg>信箱未驗</span>';
    $('h-badges').innerHTML = badges;

    /* 角色狀態 */
    var roles = await sb.from('user_roles').select('role,status').eq('user_id', user.id);
    var rlist = roles.data || [];
    var clientRole = rlist.find(function(r){ return r.role==='client'; });
    var suncarRole = rlist.find(function(r){ return r.role==='suncar'; });
    var statusMap = { active:'已啟用', pending:'審核中', suspended:'已停用', rejected:'未通過' };
    if(clientRole){ $('role-status').textContent = '案家 · '+(statusMap[clientRole.status]||clientRole.status); }
    if(suncarRole){
      $('role-switch-link').style.display = '';
      var rc = $('recruit-cta'); if(rc){ rc.style.display = 'none'; }
    }

    /* 本人訂單 */
    var ores = await sb.from('orders').select('id,order_no,status,pool,service_type,service_district,service_address,service_time,duration_minutes,amount,suncar_id').eq('client_id', user.id).order('created_at',{ascending:false});
    // 濾掉已取消的單:案家畫面與所有計數都不顯示 cancelled(只有後台查得到)
    var orders = (ores.data || []).filter(function(o){ return o.status !== 'cancelled'; });

    var suncarIds = orders.map(function(o){ return o.suncar_id; }).filter(Boolean);
    var nameById = {};
    if(suncarIds.length){
      var sres = await sb.from('users').select('id,display_name').in('id', suncarIds);
      (sres.data||[]).forEach(function(s){ nameById[s.id] = s.display_name; });
    }

    var cnt = { matching:0, active:0, done:0 };
    orders.forEach(function(o){ var g=(STATUS[o.status]||{}).group; if(g==='matching')cnt.matching++; else if(g==='active')cnt.active++; else if(g==='done')cnt.done++; });
    $('stat-matching').textContent = cnt.matching;
    $('stat-active').textContent = cnt.active;
    $('stat-done').textContent = cnt.done;
    $('cnt-all').textContent = orders.length;
    $('cnt-matching').textContent = cnt.matching;
    $('cnt-active').textContent = cnt.active;
    $('cnt-done').textContent = cnt.done;

    // 取消率:分子=待服務後自己取消的次數(取消紀錄表),分母=分子+目前已被接走的單(待服務/服務中/已完成)
    var cancRes = await sb.from('order_cancellations').select('id').eq('client_id', user.id).eq('canceller_role', 'client');
    var cancCnt = (cancRes.data || []).length;
    var committedCnt = orders.filter(function(o){ return o.status==='accepted'||o.status==='active'||o.status==='await_confirm'||o.status==='done'; }).length;
    var cancDenom = cancCnt + committedCnt;
    var cancRate = cancDenom > 0 ? Math.round(cancCnt / cancDenom * 100) : 0;
    $('cancel-rate').textContent = cancRate + '%';
    $('cancel-cnt').textContent = cancCnt;
    $('cancel-stat').style.display = '';

    var activeOrders = orders.filter(function(o){ var g=(STATUS[o.status]||{}).group; return g==='active'||g==='matching'; });
    if(activeOrders.length){
      $('active-list').innerHTML = activeOrders.map(function(o){ return buildCard(o, nameById[o.suncar_id]); }).join('');
      $('active-section').style.display = '';
    }

    var listEl = $('history-list');
    if(orders.length){
      listEl.innerHTML = orders.map(function(o){ return buildCard(o, nameById[o.suncar_id]); }).join('');
      $('empty-state').style.display = 'none';
    } else {
      listEl.innerHTML = '';
      $('empty-state').style.display = '';
    }
  }

  document.addEventListener('DOMContentLoaded', function(){ qyxGuard(init, { color: '#EF9F27' }); }); /* 載入逾時保護:8 秒沒載完或載入出錯就顯示重試 */
  document.addEventListener('DOMContentLoaded', function(){ qyxConsentGate({ color: '#EF9F27' }); }); /* 條款有更新時擋下,要求重新閱讀並同意 */
})();

/* 皇冠等級 11 級制 — 與 crown_all_levels.html 對齊
 * 依推薦人數決定等級。推薦人數由 init 帶入。
 * 推薦資料目前尚未建表,init 先帶 0(顯示 LV 0);06_referral 接後端後改帶真實人數即可。 */
var crownLevels = [
  { cls: 'lv0',    min: 0,  label: 'LV 0 未啟動' },
  { cls: 'lv1',    min: 2,  label: 'LV 1 入門' },
  { cls: 'lv2',    min: 4,  label: 'LV 2 小有名氣' },
  { cls: 'lv3',    min: 7,  label: 'LV 3 推薦達人' },
  { cls: 'lv4 k1', min: 12, label: '王者 I' },
  { cls: 'lv4 k2', min: 17, label: '王者 II' },
  { cls: 'lv4 k3', min: 22, label: '王者 III' },
  { cls: 'lv4 k4', min: 27, label: '王者 IV' },
  { cls: 'lv4 k5', min: 35, label: '王者 V' },
  { cls: 'lv4 k6', min: 45, label: '王者 VI' },
  { cls: 'lv4 k7', min: 58, label: '王者 VII 完全體' }
];

function renderCrown(count) {
  count = count || 0;
  var lv = crownLevels[0];
  for (var i = 0; i < crownLevels.length; i++) { if (count >= crownLevels[i].min) lv = crownLevels[i]; }
  var btn = document.getElementById('crown-btn');
  if (!btn) return;
  btn.className = 'crown-btn ' + lv.cls;
  btn.href = 'crown_all_levels.html?count=' + count;
  document.getElementById('crown-count').textContent = count;
  btn.querySelector('.crown-tooltip').textContent = count === 0
    ? '尚未開始推薦 · 點看等級'
    : '已推薦 ' + count + ' 人 · 點看等級';
}

/* === 訂單篩選 === */
function filterToggle(el) {
  el.closest('.filter-bar').querySelectorAll('.filter-tag').forEach(function(t){ t.classList.remove('on'); });
  el.classList.add('on');

  var filter = el.getAttribute('data-filter');
  var list = document.getElementById('history-list');
  var cards = list.querySelectorAll('.order-card');

  cards.forEach(function(c){
    if (filter === 'all') {
      c.style.display = '';
    } else {
      var status = c.getAttribute('data-status');
      c.style.display = (status === filter) ? '' : 'none';
    }
  });
}

function filterTo(status) {
  var btn = document.querySelector('.filter-tag[data-filter="'+status+'"]');
  if (btn) {
    btn.click();
    btn.scrollIntoView({behavior:'smooth', block:'start'});
  }
}
</script>
