<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打賞平台 · 種子收集庫 · 去一下</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --honey:#FFB84D;--amber:#EF9F27;--amber-deep:#BA7517;--amber-darker:#8B5A0F;
  --champagne:#FFF4DD;--champagne-soft:#FFFCF5;--cream:#FAEEDA;
  --forest:#2F6048;--forest-deep:#1F4A36;--mint:#5FB58E;--mint-pale:#E8F5EE;
  --border-mint:rgba(95,181,142,0.3);
  --ink:#3D2914;--ink-soft:#8B7355;--ink-light:#B8A485;
  --border:#FFE9B8;--border-soft:#F5EBD8;
  --warn:#E89544;--warn-pale:#FFF1E0;--danger:#D9534F;--danger-pale:#FCE8E7;
  --info:#3A7CB8;--info-pale:#E8F1F8;--gold:#E0A93C;--gold-soft:#FFF6E0;
}
body{font-family:'Noto Sans TC','Source Han Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Segoe UI',sans-serif;
  background:var(--champagne-soft);color:var(--ink);min-height:100vh;line-height:1.6;}
/* 順咖端改綠色點綴 */
body.suncar{background:#F2F7F4;}

.brand{font-weight:500;line-height:1;display:inline-flex;align-items:baseline;letter-spacing:-0.02em;}
.brand .qu,.brand .xia{color:var(--amber-darker);}
.brand .yi{color:var(--forest);}

.home-fab{position:fixed;top:14px;left:14px;width:44px;height:44px;border-radius:50%;
  background:#fff;border:1px solid var(--border);color:var(--amber-deep);
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;
  box-shadow:0 4px 14px rgba(186,117,23,0.15);transition:all 0.2s;text-decoration:none;}
.home-fab:hover{background:var(--champagne);transform:scale(1.05);border-color:var(--amber);}
.home-fab svg{width:18px;height:18px;fill:currentColor;}
body.suncar .home-fab{border-color:var(--border-mint);color:var(--forest);box-shadow:0 4px 14px rgba(47,96,72,0.15);}
body.suncar .home-fab:hover{background:var(--mint-pale);border-color:var(--mint);}

.wrap{max-width:560px;margin:0 auto;padding:1.5rem 1.25rem 3rem;}

/* 主視覺卡 */
.hero{position:relative;color:#fff;border-radius:22px;overflow:hidden;
  background:linear-gradient(135deg,var(--honey) 0%,var(--amber) 50%,var(--amber-deep) 100%);
  padding:1.7rem 1.5rem 1.5rem;box-shadow:0 14px 40px rgba(186,117,23,0.3);margin-top:2.5rem;}
body.suncar .hero{background:linear-gradient(135deg,var(--mint) 0%,var(--forest) 70%,var(--forest-deep) 100%);
  box-shadow:0 14px 40px rgba(47,96,72,0.3);}
.hero::before{content:'';position:absolute;top:-40%;right:-12%;width:210px;height:210px;border-radius:50%;background:rgba(255,255,255,0.13);}
.hero::after{content:'';position:absolute;bottom:-55%;left:-12%;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.09);}
.hero > *{position:relative;z-index:1;}
.hero-title{font-size:1.45rem;font-weight:700;letter-spacing:-0.3px;}
.hero-sub{font-size:0.86rem;opacity:0.95;margin-top:0.5rem;line-height:1.7;}
.hero-bal{margin-top:1.1rem;font-size:0.82rem;opacity:0.95;}
.hero-bal b{font-size:1.05rem;font-weight:700;}

/* 打賞鈕 */
.donate-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
  background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;border:none;
  padding:1.1rem;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;
  font-family:inherit;box-shadow:0 8px 24px rgba(239,159,39,0.35);transition:all 0.2s;margin-top:1.25rem;}
.donate-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(239,159,39,0.45);}
.donate-btn:disabled{opacity:0.55;cursor:not-allowed;transform:none;box-shadow:none;}
body.suncar .donate-btn{background:linear-gradient(135deg,var(--mint),var(--forest));box-shadow:0 8px 24px rgba(47,96,72,0.3);}
.donate-note{font-size:0.76rem;color:var(--ink-soft);text-align:center;margin-top:0.7rem;line-height:1.6;}

/* 進度 */
.prog-card{background:#fff;border:1.5px solid var(--border-soft);border-radius:18px;padding:1.25rem;margin-top:1.25rem;box-shadow:0 2px 8px rgba(186,117,23,0.04);}
.prog-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:0.7rem;}
.prog-name{font-size:0.98rem;font-weight:700;color:var(--ink);}
.prog-cnt{font-size:0.85rem;color:var(--ink-soft);font-weight:600;}
.prog-cnt b{color:var(--amber-deep);font-size:1.05rem;}
body.suncar .prog-cnt b{color:var(--forest);}
.prog-bar{height:10px;border-radius:99px;background:var(--champagne);overflow:hidden;}
body.suncar .prog-bar{background:var(--mint-pale);}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--honey),var(--amber));transition:width 0.4s;}
body.suncar .prog-fill{background:linear-gradient(90deg,var(--mint),var(--forest));}
.prog-gold{font-size:0.78rem;color:var(--gold);font-weight:600;margin-top:0.6rem;display:flex;align-items:center;gap:5px;}

/* 制霸橫幅 */
.champ-banner{display:none;margin-top:1rem;padding:1rem 1.1rem;border-radius:16px;
  background:linear-gradient(135deg,var(--gold-soft),#FFEFC2);border:1.5px solid var(--gold);
  color:var(--amber-darker);font-weight:700;font-size:0.95rem;text-align:center;
  box-shadow:0 6px 18px rgba(224,169,60,0.25);}
.champ-banner.show{display:block;}

/* 圖鑑格子 */
.dex-title{font-size:0.95rem;font-weight:600;color:var(--ink);margin:1.6rem 0 0.9rem;display:flex;align-items:center;gap:8px;}
.dex-title::before{content:'';display:block;width:4px;height:18px;background:linear-gradient(180deg,var(--honey),var(--amber));border-radius:2px;}
body.suncar .dex-title::before{background:linear-gradient(180deg,var(--mint),var(--forest));}
.dex-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(min-width:480px){.dex-grid{grid-template-columns:repeat(5,1fr);}}
.cell{aspect-ratio:1/1;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  border:1.5px solid var(--border-soft);background:var(--champagne-soft);padding:4px;text-align:center;position:relative;}
.cell .emj{font-size:1.7rem;line-height:1;}
.cell .nm{font-size:0.62rem;color:var(--ink-soft);font-weight:600;line-height:1.15;}
.cell .xn{position:absolute;top:4px;right:5px;font-size:0.58rem;color:var(--ink-light);font-weight:600;}
/* 未收集:暗格 */
.cell.locked{background:#F3EEE3;border-style:dashed;border-color:var(--border-soft);}
.cell.locked .emj{filter:grayscale(1);opacity:0.32;}
.cell.locked .nm{color:var(--ink-light);}
/* 已收集 */
.cell.got{background:#fff;border-color:var(--border);box-shadow:0 2px 8px rgba(186,117,23,0.06);}
/* 金種子 */
.cell.gold{border-color:var(--gold);background:var(--gold-soft);}
.cell.gold.locked{background:#F6EFDD;border-color:rgba(224,169,60,0.45);}
.cell.gold .nm{color:var(--gold);}

/* 揭曉彈窗 */
.reveal-mask{position:fixed;inset:0;background:rgba(61,41,20,0.5);z-index:9999;display:none;align-items:center;justify-content:center;padding:1.5rem;}
.reveal-mask.show{display:flex;}
.reveal-box{background:#fff;border-radius:24px;padding:2rem 1.75rem 1.6rem;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(186,117,23,0.3);}
.reveal-box.gold{background:linear-gradient(160deg,#fff,var(--gold-soft));}
.reveal-emj{font-size:4.5rem;line-height:1;animation:pop 0.5s ease;}
@keyframes pop{0%{transform:scale(0.3) rotate(-15deg);opacity:0;}60%{transform:scale(1.15) rotate(5deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.reveal-tag{display:inline-block;margin-top:0.9rem;font-size:0.72rem;font-weight:700;padding:3px 12px;border-radius:99px;}
.reveal-tag.new{background:var(--mint-pale);color:var(--forest);}
.reveal-tag.dup{background:var(--champagne);color:var(--amber-deep);}
.reveal-tag.gold{background:var(--gold);color:#fff;}
.reveal-name{font-size:1.5rem;font-weight:700;color:var(--ink);margin-top:0.7rem;}
.reveal-desc{font-size:0.84rem;color:var(--ink-soft);margin-top:0.5rem;line-height:1.6;}
.reveal-close{margin-top:1.3rem;width:100%;background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;border:none;
  padding:0.9rem;border-radius:14px;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:inherit;}
body.suncar .reveal-close{background:linear-gradient(135deg,var(--mint),var(--forest));}

.foot-hint{font-size:0.74rem;color:var(--ink-light);text-align:center;margin-top:1.6rem;line-height:1.7;}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<defs>
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
  <symbol id="i-seed" viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3C19 20 22 3 22 3c-1 2-8 2.25-13 3.25S2 11.5 2 13.5 3.75 17.25 3.75 17.25C7 8 17 8 17 8z"/></symbol>
</defs>
</svg>

<a href="11_client_home.html" class="home-fab" id="home-fab" title="回首頁"><svg><use href="#i-home"/></svg></a>

<div class="wrap">

  <div class="hero">
    <div class="hero-title">打賞平台 · 集種子</div>
    <div class="hero-sub">想支持平台繼續走下去? 打賞 30 點,隨機收到一顆種子。集滿整個收集庫,就拿到「制霸徽章」。</div>
    <div class="hero-bal">目前可用<span id="pool-label">點數</span>: <b id="bal">--</b> 點</div>
    <button class="donate-btn" id="donate-btn" onclick="doDonate()">
      <svg style="width:1.1em;height:1.1em;fill:currentColor;"><use href="#i-seed"/></svg>
      打賞 30 點 · 抽一顆種子
    </button>
    <div class="donate-note" id="donate-note">點數從你的帳戶扣除,打賞後立即掉一顆種子進收集庫</div>
  </div>

  <div class="prog-card">
    <div class="prog-top">
      <div class="prog-name">30 點種子收集庫</div>
      <div class="prog-cnt"><b id="got-cnt">0</b> / <span id="tot-cnt">0</span> 種</div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-gold">✨ 金種子 <span id="gold-cnt">0</span> / <span id="gold-tot">0</span>(超難掉,集滿全靠它)</div>
    <div class="champ-banner" id="champ"><svg style="width:1.05em;height:1.05em;fill:var(--gold);vertical-align:-0.15em;"><use href="#i-seed"/></svg> 制霸! 你已集滿 30 點種子庫,拿到制霸徽章</div>
  </div>

  <div class="dex-title">種子圖鑑</div>
  <div class="dex-grid" id="dex"></div>

  <div class="foot-hint">收集庫目前只有你自己看得到。之後會開放在你的名片上秀給別人看。</div>
</div>

<div class="reveal-mask" id="reveal" onclick="if(event.target===this)closeReveal()">
  <div class="reveal-box" id="reveal-box">
    <div class="reveal-emj" id="rv-emj">🌱</div>
    <div><span class="reveal-tag" id="rv-tag">新種子</span></div>
    <div class="reveal-name" id="rv-name">種子</div>
    <div class="reveal-desc" id="rv-desc"></div>
    <button class="reveal-close" onclick="closeReveal()">收下</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
<script src="qyx-load-guard.js"></script>
<script>
/* 種子打賞收集庫(最小驗證版)
   pool 由進來的網址參數 as 決定:案家(client)扣 client_points、順咖(suncar)扣 suncar_points,
   收集庫依雙池分開(符合點數雙池完全分開的紅線)。本版只做 30 點一個級距。 */
var POOL = (new URLSearchParams(location.search).get('as') === 'suncar') ? 'suncar' : 'client';
var TIER = 30;
var _busy = false;

function setupTheme(){
  if(POOL === 'suncar'){
    document.body.classList.add('suncar');
    document.getElementById('home-fab').setAttribute('href','12_staff_home.html');
    document.getElementById('pool-label').textContent = '順咖點數';
  } else {
    document.getElementById('home-fab').setAttribute('href','11_client_home.html');
    document.getElementById('pool-label').textContent = '案家點數';
  }
}

async function init(){
  if(typeof window.sb === 'undefined'){ console.error('supabase-init.js 未載入'); return; }
  setupTheme();
  var s = await sb.auth.getSession();
  var user = s && s.data && s.data.session ? s.data.session.user : null;
  if(!user){ location.href = '13_login.html'; return; }
  await loadAll(user.id);
}

/* 一次抓:餘額、整份圖鑑、我的收集,畫出來 */
async function loadAll(uid){
  var col = (POOL === 'client') ? 'client_points' : 'suncar_points';
  var ur = await sb.from('users').select(col).eq('id', uid).maybeSingle();
  var bal = (ur && ur.data && ur.data[col] != null) ? ur.data[col] : 0;
  document.getElementById('bal').textContent = bal;
  var btn = document.getElementById('donate-btn');
  if(bal < 30){
    btn.disabled = true;
    document.getElementById('donate-note').innerHTML = '點數不足 30 點。<a href="16_buy_credits.html" onclick="try{sessionStorage.setItem(\'credits_pool\',\''+POOL+'\');}catch(e){}" style="color:inherit;font-weight:700;text-decoration:underline;">先去儲值</a>再回來打賞';
  } else {
    btn.disabled = false;
  }

  var cat = await sb.from('seed_catalog').select('id,name,emoji,rarity,sort').eq('tier', TIER).order('sort');
  var seeds = (cat && cat.data) ? cat.data : [];
  var mine = await sb.from('user_seeds').select('seed_id,cnt').eq('pool', POOL);
  var owned = {};
  if(mine && mine.data){ mine.data.forEach(function(r){ owned[r.seed_id] = r.cnt; }); }

  renderDex(seeds, owned);
}

function renderDex(seeds, owned){
  var got = 0, total = seeds.length, goldGot = 0, goldTot = 0;
  var html = '';
  seeds.forEach(function(s){
    var isGold = (s.rarity === 'gold');
    if(isGold) goldTot++;
    var have = owned[s.id] || 0;
    var hasIt = have > 0;
    if(hasIt){ got++; if(isGold) goldGot++; }
    var cls = 'cell' + (isGold ? ' gold' : '') + (hasIt ? ' got' : ' locked');
    var emj = hasIt ? s.emoji : (isGold ? '✨' : '❔');
    var nm  = hasIt ? esc(s.name) : '？？？';
    var xn  = (hasIt && have > 1) ? '<span class="xn">×'+have+'</span>' : '';
    html += '<div class="'+cls+'">'+xn+'<div class="emj">'+emj+'</div><div class="nm">'+nm+'</div></div>';
  });
  document.getElementById('dex').innerHTML = html;
  document.getElementById('got-cnt').textContent = got;
  document.getElementById('tot-cnt').textContent = total;
  document.getElementById('gold-cnt').textContent = goldGot;
  document.getElementById('gold-tot').textContent = goldTot;
  document.getElementById('prog-fill').style.width = (total ? Math.round(got/total*100) : 0) + '%';
  document.getElementById('champ').classList.toggle('show', total > 0 && got >= total);
}

async function doDonate(){
  if(_busy) return;
  if(!confirm('確定打賞 30 點? 會從你的點數扣 30 點,隨機掉一顆種子。')) return;
  _busy = true;
  var btn = document.getElementById('donate-btn');
  btn.disabled = true;
  var r = await sb.rpc('donate_seed', { p_pool: POOL, p_tier: TIER, p_amount: 30 });
  _busy = false;
  if(r.error){ alert('打賞失敗,請稍後再試。'); btn.disabled = false; return; }
  var d = r.data || {};
  if(!d.ok){
    if(d.reason === 'insufficient'){
      alert('點數不足,先去儲值再回來打賞。');
      try{ sessionStorage.setItem('credits_pool', POOL); }catch(e){}
      location.href = '16_buy_credits.html';
      return;
    }
    if(d.reason === 'no_seed'){ alert('種子資料還沒建好,已把點數退回。'); }
    else if(d.reason === 'not_login'){ location.href = '13_login.html'; return; }
    else { alert('打賞失敗,請稍後再試。'); }
    btn.disabled = false;
    return;
  }
  showReveal(d);
  var s = await sb.auth.getSession();
  var user = s && s.data && s.data.session ? s.data.session.user : null;
  if(user) await loadAll(user.id);
}

function showReveal(d){
  var box = document.getElementById('reveal-box');
  var isGold = (d.rarity === 'gold');
  box.classList.toggle('gold', isGold);
  document.getElementById('rv-emj').textContent = d.emoji || '🌱';
  document.getElementById('rv-name').textContent = d.name || '種子';
  var tag = document.getElementById('rv-tag');
  if(isGold){ tag.className = 'reveal-tag gold'; tag.textContent = '✨ 金種子!'; }
  else if(d.is_new){ tag.className = 'reveal-tag new'; tag.textContent = '新種子!'; }
  else { tag.className = 'reveal-tag dup'; tag.textContent = '又掉一顆'; }
  var desc = '已收集 ' + (d.collected || 0) + ' / ' + (d.total || 0) + ' 種';
  if(d.tier_complete) desc = '🏆 集滿了! 你制霸了這一池';
  document.getElementById('rv-desc').textContent = desc;
  document.getElementById('reveal').classList.add('show');
}
function closeReveal(){ document.getElementById('reveal').classList.remove('show'); }

function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
  return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }

document.addEventListener('DOMContentLoaded', function(){
  qyxGuard(init, { color: (POOL === 'suncar' ? '#5FB58E' : '#EF9F27') });
});
</script>
</body>
</html>
