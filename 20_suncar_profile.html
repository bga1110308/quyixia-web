<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>順咖介紹 · 去一下</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --honey:#FFB84D;--amber:#EF9F27;--amber-deep:#BA7517;--amber-darker:#8B5A0F;
  --champagne:#FFF4DD;--champagne-soft:#FFFCF5;--cream:#FAEEDA;
  --forest:#2F6048;--forest-deep:#1F4A36;--mint:#5FB58E;--mint-pale:#E8F5EE;--border-mint:rgba(95,181,142,0.3);
  --ink:#3D2914;--ink-soft:#8B7355;--ink-light:#B8A485;
  --border:#FFE9B8;--border-soft:#F5EBD8;
  --warn:#E89544;--warn-pale:#FFF1E0;--danger:#D9534F;--danger-pale:#FCE8E7;--info:#3A7CB8;--info-pale:#E8F1F8;
  --gold:#E0A93C;--gold-soft:#FFF6E0;
}
body{font-family:'Noto Sans TC','Source Han Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Segoe UI',sans-serif;background:var(--champagne-soft);color:var(--ink);line-height:1.55;padding-bottom:90px;}
.icon{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;fill:currentColor;}

.home-fab{position:fixed;top:14px;left:14px;width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid var(--border-mint);color:var(--forest);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;box-shadow:0 4px 14px rgba(47,96,72,0.15);transition:all 0.2s;text-decoration:none;}
.home-fab:hover{background:var(--mint-pale);transform:scale(1.05);border-color:var(--mint);}
.home-fab svg{width:18px;height:18px;fill:currentColor;}

.wrap{max-width:480px;margin:0 auto;padding:0 1.1rem;}

/* 頁頭 */
.profile-head{position:relative;text-align:center;padding:3.2rem 1.25rem 1.6rem;background:linear-gradient(135deg,var(--champagne) 0%,var(--champagne-soft) 60%,var(--mint-pale) 100%);overflow:hidden;}
.profile-head::before{content:'';position:absolute;top:-80px;right:-90px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(95,181,142,0.18) 0%,transparent 70%);}
.profile-head > *{position:relative;z-index:1;}
.pf-avatar{position:relative;width:84px;height:84px;border-radius:50%;background:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:2.1rem;color:var(--forest);box-shadow:0 4px 14px rgba(47,96,72,0.2),inset 0 0 0 1.5px var(--border-mint);overflow:hidden;}
.pf-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pf-avatar.crowned{box-shadow:0 4px 14px rgba(224,169,60,0.35),inset 0 0 0 2px var(--gold);}
.crown-topper{position:absolute;top:-16px;left:50%;transform:translateX(-50%);color:var(--gold);}
.crown-topper svg{width:24px;height:24px;fill:currentColor;}
.pf-name{font-size:1.5rem;font-weight:600;color:var(--ink);margin-top:0.7rem;letter-spacing:-0.3px;}
.pf-member{font-size:0.72rem;color:var(--ink-light);margin-top:2px;letter-spacing:0.3px;}
.pf-meta-row{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:0.6rem;flex-wrap:wrap;}
.pf-pool{font-size:0.72rem;font-weight:600;padding:3px 12px;border-radius:99px;}
.pf-pool.a{background:var(--mint-pale);color:var(--forest);}
.pf-pool.b{background:var(--warn-pale);color:var(--warn);}
.pf-online{display:inline-flex;align-items:center;gap:5px;font-size:0.74rem;color:var(--ink-soft);}
.pf-online .dot{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 0 3px rgba(95,181,142,0.2);}
.pf-online.off .dot{background:var(--ink-light);box-shadow:0 0 0 3px rgba(184,164,133,0.2);}

/* 徽章列 */
.badge-row{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:0.9rem;}
.bm{font-size:0.7rem;padding:4px 10px;border-radius:99px;font-weight:600;display:inline-flex;align-items:center;gap:4px;}
.bm svg{width:0.9em;height:0.9em;fill:currentColor;}
.b-verified,.b-safe{background:var(--mint-pale);color:var(--forest);}
.b-cna{background:var(--warn-pale);color:var(--warn);}
.b-cpr{background:var(--danger-pale);color:var(--danger);}
.b-email{background:var(--champagne);color:var(--amber-deep);}
.b-custom{background:var(--info-pale);color:var(--info);}
.b-ref{background:#FCE4F2;color:#A8367C;}

/* 數據三格 */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:1.2rem 0 0.4rem;}
.stat-box{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:0.9rem 0.5rem;text-align:center;box-shadow:0 2px 8px rgba(186,117,23,0.04);}
.stat-box .lbl{font-size:0.68rem;color:var(--ink-light);font-weight:600;margin-bottom:4px;}
.stat-box .val{font-size:1.05rem;font-weight:700;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:3px;}
.stat-box .val svg{width:0.95em;height:0.95em;fill:var(--mint);}
.stat-box .sub{font-size:0.66rem;color:var(--ink-soft);font-weight:500;margin-top:1px;}
.trust-unlock{background:none;border:none;color:var(--forest);font-size:0.72rem;font-weight:600;cursor:pointer;text-decoration:underline;font-family:inherit;padding:0;}

/* 區塊卡 */
.section-card{background:#fff;border:1.5px solid var(--border);border-radius:18px;padding:1.2rem;margin-top:1rem;box-shadow:0 2px 8px rgba(186,117,23,0.04);}
.sec-title{font-size:0.92rem;font-weight:600;color:var(--ink);margin-bottom:0.9rem;display:flex;align-items:center;gap:8px;}
.sec-title::before{content:'';display:block;width:4px;height:17px;background:linear-gradient(180deg,var(--mint),var(--forest));border-radius:2px;}
.sec-title svg{width:15px;height:15px;fill:var(--forest);}
.bio-text{font-size:0.9rem;color:var(--ink);line-height:1.75;white-space:pre-wrap;}

/* 生活照 */
.gallery{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.gallery::-webkit-scrollbar{height:6px;}
.gallery::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.gallery img{width:130px;height:130px;object-fit:cover;border-radius:14px;flex-shrink:0;border:1px solid var(--border-soft);cursor:pointer;}

/* chips */
.chip-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.chip{font-size:0.78rem;padding:6px 13px;border-radius:99px;background:var(--champagne-soft);color:var(--ink);border:1.5px solid var(--border);font-weight:500;}
.chip.area{border-color:var(--border-mint);background:var(--mint-pale);color:var(--forest);}
.sub-label{font-size:0.72rem;color:var(--ink-light);font-weight:600;margin:0.2rem 0 0.5rem;letter-spacing:0.5px;}
.sub-label:not(:first-child){margin-top:1rem;}

/* 種子庫 */
.seed-prog{font-size:0.78rem;color:var(--ink-soft);font-weight:600;margin-bottom:0.8rem;}
.seed-prog b{color:var(--forest);}
.dex-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px 8px;}
.cell{display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;}
.seedwrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;}
/* 種子畫面:與順咖自己的種子庫(19)同一套畫法,圖一律來自 seed_catalog.art.img。
   已收集→顯真圖;未收集→同張圖轉灰剪影＋?(不洩漏圖案,也不會被當壞圖) */
.seed-img{width:100%;height:100%;object-fit:contain;display:block;}
.seed-sil{position:relative;display:block;width:100%;height:100%;}
.seed-sil .seed-img{filter:brightness(0) saturate(0) invert(0.72);opacity:0.92;}
.seed-sil .q{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:1.25rem;text-shadow:0 1px 2px rgba(0,0,0,0.4);pointer-events:none;}
.emj-fallback{font-size:1.5rem;line-height:1;}
.q-fallback{font-size:1.35rem;font-weight:700;color:var(--ink-light);}
.cell .nm{font-size:0.6rem;color:var(--ink-soft);line-height:1.3;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cell .xn{font-size:0.6rem;color:var(--forest);font-weight:700;}

/* 匿名評價 */
.rv-item{padding:0.8rem 0;border-bottom:1px solid var(--border-soft);}
.rv-item:last-child{border-bottom:none;}
.rv-stars{color:var(--amber);font-size:0.82rem;letter-spacing:1px;}
.rv-date{font-size:0.66rem;color:var(--ink-light);float:right;font-weight:500;margin-top:3px;}
.rv-comment{font-size:0.85rem;color:var(--ink);line-height:1.6;margin-top:4px;}
.rv-locked{font-size:0.72rem;color:var(--amber-deep);cursor:pointer;text-decoration:underline;}

.empty-note{font-size:0.82rem;color:var(--ink-light);text-align:center;padding:1.5rem 1rem;}

/* 底部 CTA */
.cta-bar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,252,245,0.96);backdrop-filter:blur(6px);border-top:1px solid var(--border);padding:0.8rem 1.1rem calc(0.8rem + env(safe-area-inset-bottom));z-index:40;}
.cta-inner{max-width:480px;margin:0 auto;}
.cta-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:linear-gradient(135deg,var(--mint),var(--forest));color:#fff;border:none;padding:1rem;border-radius:14px;font-size:1.02rem;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 8px 24px rgba(47,96,72,0.3);transition:all 0.2s;text-decoration:none;}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(47,96,72,0.4);}
.cta-btn svg{width:1.1em;height:1.1em;fill:currentColor;}
.cta-hint{font-size:0.68rem;color:var(--ink-light);text-align:center;margin-top:6px;}

/* 解鎖視窗(沿用 02 的 redeem_info 流程) */
.modal-overlay{position:fixed;inset:0;background:rgba(61,41,20,0.5);z-index:9999;display:none;align-items:center;justify-content:center;padding:1.5rem;}
.modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:22px;padding:1.6rem 1.4rem;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(186,117,23,0.3);}
.modal-box h3{font-size:1.1rem;color:var(--ink);text-align:center;margin-bottom:0.4rem;}
.modal-box .ul-bal{font-size:0.8rem;color:var(--ink-soft);text-align:center;margin-bottom:1.1rem;}
.modal-box .ul-bal b{color:var(--forest);}
.ul-opt{display:flex;justify-content:space-between;align-items:center;width:100%;background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:0.9rem 1.1rem;margin-bottom:0.7rem;font-size:0.92rem;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.ul-opt:hover{border-color:var(--mint);background:var(--mint-pale);}
.ul-opt-month{border-color:var(--mint);background:var(--mint-pale);}
.ul-opt .cost{color:var(--forest);}
.ul-topup{display:block;text-align:center;font-size:0.78rem;color:var(--forest);margin:0.3rem 0 0.8rem;cursor:pointer;text-decoration:underline;}
.cm-cancel{width:100%;background:none;border:none;color:var(--ink-soft);font-size:0.85rem;cursor:pointer;font-family:inherit;padding:0.4rem;}

.load-note{text-align:center;color:var(--ink-soft);padding:3rem 1rem;font-size:0.9rem;}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* 順咖介紹頁(案家點 02 名片進來看)。資料來源:
   public_suncars(徽章/期望時薪/信箱) + get_suncar_profile(自介/生活照/服務區域類型,跨權限)
   + get_user_seeds(種子庫,跨權限,守雙池+隱藏開關) + 既有評價/信用分/編號/加值函式。
   只呈現,不外送個資;信用分精確值仍走後台付費判斷。 */

var TARGET = new URLSearchParams(location.search).get('id') || '';

/* 服務類型代碼→中文(對照 15 編輯頁的服務清單,改清單時兩邊一起改) */
var SVC_LABEL = {
  'buy-food':'買便當/飲料/超商代購','buy-fresh':'生鮮採買/代買藥(非處方)/寵物用品',
  'deliver':'代送文件/鑰匙/包裹','queue':'代排隊(掛號/領號/政府機關)',
  'home-help':'倒垃圾/換燈泡/收包裹/澆花','furniture':'組裝家具/搬小東西',
  'stand-by':'顧店/帶東西/拍照','pick-kid':'接小孩下課/遛狗',
  'companion-elder':'陪同散步/陪聊/關懷探視','medical':'陪診/代領慢箋/陪同就醫',
  'shopping-elder':'陪同採買/協助領藥/買菜','digital-help':'教手機/LINE/視訊/協助繳費',
  'family-report':'到家拍照回報長輩狀況','body-care':'身體照顧(洗澡/翻身/服藥提醒)',
  'teach':'教電腦/英文/手機','repair':'修腳踏車/家用維修',
  'micro':'貼海報/跑銀行/送件','review-doc':'看履歷/文件初校',
  'chat':'陪聊天/陪吃飯/陪逛街','sport':'陪運動/陪打遊戲',
  'pet':'遛狗/餵貓/寵物照顧','kid-care':'陪寫作業/臨時托接/才藝陪同'
};


function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function firstChar(name){ var n=(name||'').trim(); return n ? n.charAt(0) : '順'; }
function creditBand(score){ var n=(score==null?100:score); if(n>=80)return '高'; if(n>=50)return '中'; return '低'; }

async function init(){
  if(typeof window.sb==='undefined'){ showError('連線尚未載入'); return; }
  var s = await sb.auth.getSession();
  var user = s && s.data && s.data.session ? s.data.session.user : null;
  if(!user){ location.href='13_login.html'; return; }
  if(!TARGET){ showError('沒有指定要看哪位順咖'); return; }

  /* 解鎖視窗要用的價目與案家點數餘額(同 02) */
  var meRes = await sb.from('users').select('client_points').eq('id', user.id).maybeSingle();
  var me = (meRes && meRes.data) ? meRes.data : {};
  var cfgRes = await sb.from('app_config').select('price_client_single,price_client_month').eq('id',1).maybeSingle();
  var cfg = (cfgRes && cfgRes.data) ? cfgRes.data : {};
  window.UNLOCK = { single:(cfg.price_client_single==null?5:cfg.price_client_single), month:(cfg.price_client_month==null?50:cfg.price_client_month), points:(me.client_points||0), target:TARGET };

  /* 公開視圖:這位順咖的基本欄位 */
  var sunRes = await sb.from('public_suncars').select('*').eq('id', TARGET).maybeSingle();
  if(sunRes.error || !sunRes.data){ showError('找不到這位順咖,可能已停用'); return; }
  var sun = sunRes.data;

  /* 其餘資料一次平行抓 */
  var ids = [TARGET];
  var results = await Promise.all([
    sb.rpc('get_suncar_profile', { p_target: TARGET }),
    sb.rpc('get_review_stats_batch', { p_targets: ids, p_mode: 'client_reviews_suncar' }),
    sb.rpc('get_suncar_credits', { p_targets: ids }),
    sb.rpc('get_suncar_custom_badges', { p_targets: ids }),
    sb.rpc('get_suncar_member_nos', { p_targets: ids }),
    sb.rpc('get_active_suncar_perks', { p_targets: ids }),
    sb.rpc('get_user_seeds', { p_target: TARGET, p_pool: 'suncar' }),
    sb.rpc('get_public_reviews', { p_reviewee: TARGET, p_mode: 'client_reviews_suncar' }),
    sb.rpc('get_suncar_email_verified', { p_targets: ids }),
    /* 種子真圖一律從 seed_catalog 取(與 19 圖鑑同一個來源,日後換圖兩邊一起變,不會不同步) */
    sb.from('seed_catalog').select('id,art').eq('pool', 'suncar')
  ]);

  /* 把 seed_catalog 的 art 依 seed_id 併進 get_user_seeds 的收集結果 */
  var artById = {};
  ((results[9] && results[9].data) ? results[9].data : []).forEach(function(c){ artById[c.id] = c.art; });

  var data = {
    sun: sun,
    profile: pickOne(results[0]),
    review: pickOne(results[1]),
    credit: pickOne(results[2]),
    customs: (results[3] && results[3].data) ? results[3].data : [],
    member: pickOne(results[4]),
    perks: (results[5] && results[5].data) ? results[5].data : [],
    seeds: ((results[6] && results[6].data) ? results[6].data : []).map(function(s){ s.art = artById[s.seed_id]; return s; }),
    publicReviews: (results[7] && results[7].data) ? results[7].data : [],
    /* 信箱已驗證:後台只回 id,有回到本人就代表已驗證(走 auth.users.email_confirmed_at,案家無權直接讀) */
    emailVerified: !!(results[8] && results[8].data && results[8].data.length)
  };
  render(data);
}

function pickOne(res){ return (res && res.data && res.data.length) ? res.data[0] : null; }

function render(d){
  var sun = d.sun;
  var prof = d.profile || {};
  var isCna = !!sun.has_caregiver_cert;
  var perkMap = {};
  d.perks.forEach(function(p){ perkMap[p.perk]=true; });
  var hasCrown = !!perkMap.crown_frame;

  var html = '';

  /* 頁頭 */
  var avatarInner = sun.avatar_url
    ? '<img src="'+esc(sun.avatar_url)+'" alt="頭像">'
    : esc(firstChar(sun.display_name));
  var online = !(sun.profile && sun.profile.acceptingOrders === false);
  html += '<div class="profile-head">';
  html += '<div class="pf-avatar'+(isCna?' cna':'')+(hasCrown?' crowned':'')+'">'+(hasCrown?'<span class="crown-topper"><svg><use href="#i-crown"/></svg></span>':'')+avatarInner+'</div>';
  html += '<div class="pf-name">'+esc(sun.display_name||'順咖')+'</div>';
  if(d.member && d.member.member_no) html += '<div class="pf-member">'+esc(d.member.member_no)+'</div>';
  html += '<div class="pf-meta-row">';
  html += '<span class="pf-pool '+(isCna?'b':'a')+'">'+(isCna?'照服員池':'一般池')+'</span>';
  html += '<span class="pf-online'+(online?'':' off')+'"><span class="dot"></span>'+(online?'目前可接單':'暫不接單')+'</span>';
  html += '</div>';

  /* 徽章列 */
  var badges = '';
  if(sun.is_realname && sun.show_realname!==false) badges += badge('b-verified','i-check','實名');
  if(sun.has_caregiver_cert && sun.show_caregiver!==false) badges += badge('b-cna','i-star','照服員');
  if(sun.has_good_conduct && sun.show_good_conduct!==false) badges += badge('b-safe','i-shield','良民');
  if(sun.has_cpr && sun.show_cpr!==false) badges += badge('b-cpr','i-heart-cross','急救');
  if(d.emailVerified) badges += badge('b-email','i-mail','信箱');
  if(perkMap.referral_badge) badges += badge('b-ref','i-star','推薦達人');
  d.customs.forEach(function(c){ badges += '<span class="bm b-custom">'+esc(c.name)+'</span>'; });
  if(badges) html += '<div class="badge-row">'+badges+'</div>';
  html += '</div>'; /* /profile-head */

  html += '<div class="wrap">';

  /* 數據三格:評價 / 信用分 / 期望時薪 */
  html += '<div class="stat-row">';
  var rv = d.review;
  var ratingVal = (rv && rv.enough) ? '<svg><use href="#i-star"/></svg>'+Number(rv.overall_avg).toFixed(1) : '—';
  var ratingSub = (rv && rv.enough) ? rv.cnt+' 則評價' : '尚無足夠評價';
  html += '<div class="stat-box"><div class="lbl">評價</div><div class="val">'+ratingVal+'</div><div class="sub">'+ratingSub+'</div></div>';
  var cs = d.credit;
  if(cs && cs.credit_score!=null){
    html += '<div class="stat-box"><div class="lbl">信用分</div><div class="val">'+cs.credit_score+'</div><div class="sub">'+creditBand(cs.credit_score)+'</div></div>';
  } else {
    html += '<div class="stat-box"><div class="lbl">信用分</div><div class="val">🔒</div><div class="sub"><button class="trust-unlock" onclick="openUnlockModal()">解鎖可看</button></div></div>';
  }
  var rate = sun.expected_rate ? '$'+sun.expected_rate : '面議';
  html += '<div class="stat-box"><div class="lbl">期望時薪</div><div class="val">'+rate+'</div><div class="sub">'+(sun.expected_rate?'/ 小時':'可議')+'</div></div>';
  html += '</div>';

  /* 自我介紹 */
  if(prof.bio){
    html += card('i-user','自我介紹','<div class="bio-text">'+esc(prof.bio)+'</div>');
  }

  /* 生活照 */
  var photos = Array.isArray(prof.photos) ? prof.photos : [];
  if(photos.length){
    var imgs = photos.map(function(u){ return '<img src="'+esc(u)+'" alt="生活照" onclick="openPhoto(\''+esc(u)+'\')">'; }).join('');
    html += card('i-photo','生活照','<div class="gallery">'+imgs+'</div>');
  }

  /* 服務資訊 */
  var areas = Array.isArray(prof.areas) ? prof.areas : [];
  var svcs = Array.isArray(prof.services) ? prof.services : [];
  var transport = Array.isArray(prof.transport) ? prof.transport : [];
  if(areas.length || svcs.length || transport.length){
    var body = '';
    if(areas.length){
      body += '<div class="sub-label">服務區域</div><div class="chip-wrap">'+areas.map(function(a){ return '<span class="chip area">'+esc(a)+'</span>'; }).join('')+'</div>';
    }
    if(svcs.length){
      body += '<div class="sub-label">服務類型</div><div class="chip-wrap">'+svcs.map(function(k){ return '<span class="chip">'+esc(SVC_LABEL[k]||k)+'</span>'; }).join('')+'</div>';
    }
    if(transport.length){
      body += '<div class="sub-label">交通方式</div><div class="chip-wrap">'+transport.map(function(t){ return '<span class="chip">'+esc(t)+'</span>'; }).join('')+'</div>';
    }
    html += card('i-map','服務資訊',body);
  }

  /* 種子庫(suncar 池)。隱藏或無圖鑑時 get_user_seeds 回空,整塊不顯示 */
  if(d.seeds.length){
    html += card('i-seed','種子庫', renderSeedbox(d.seeds));
  }

  /* 匿名評價留言 */
  if(d.publicReviews.length){
    html += card('i-chat','其他案家的評價', renderPublicReviews(d.publicReviews));
  }

  html += '</div>'; /* /wrap */

  /* 底部指定下單 */
  html += '<div class="cta-bar"><div class="cta-inner">'
        + '<a class="cta-btn" href="04_order_form.html?staff='+encodeURIComponent(TARGET)+'"><svg><use href="#i-star"/></svg>指定他下單</a>'
        + '<div class="cta-hint">指定下單會優先保留給這位順咖,逾時或他未接才開放其他人</div>'
        + '</div></div>';

  document.getElementById('page-body').innerHTML = html;
}

function badge(cls,icon,name){ return '<span class="bm '+cls+'"><svg><use href="#'+icon+'"/></svg>'+name+'</span>'; }
function card(icon,title,body){
  return '<div class="section-card"><div class="sec-title"><svg><use href="#'+icon+'"/></svg>'+title+'</div>'+body+'</div>';
}

function renderSeedbox(seeds){
  var got=0, total=seeds.length, cells='';
  seeds.forEach(function(s){
    var have = s.cnt || 0;
    var hasIt = have > 0;
    if(hasIt) got++;
    var nm = hasIt ? esc(s.name) : '？？？';
    var xn = (have>1) ? ' <span class="xn">×'+have+'</span>' : '';
    cells += '<div class="cell'+(hasIt?' got':'')+'">'
           +   '<div class="seedwrap">'+seedCellArt(s, hasIt)+'</div>'
           +   '<div class="nm">'+nm+xn+'</div>'
           + '</div>';
  });
  return '<div class="seed-prog">已收集 <b>'+got+'</b> / '+total+' 種</div><div class="dex-grid">'+cells+'</div>';
}

/* 一顆種子的畫面:與順咖自己的種子庫(19 的 seedMarkup)同一套規則,圖來自 seed_catalog.art.img。
   已收集→顯真圖;未收集→同張圖轉灰剪影＋?;沒圖才退回表情符號(理論上順咖池都有圖) */
function seedCellArt(s, got){
  var art = s.art || {};
  if(typeof art === 'string'){ try{ art = JSON.parse(art); }catch(e){ art = {}; } }
  if(got){
    if(art && art.img){ return '<img class="seed-img" loading="lazy" decoding="async" src="'+esc(art.img)+'" alt="">'; }
    return '<span class="emj-fallback">'+esc(s.emoji||'🌱')+'</span>';
  }
  if(art && art.img){
    return '<span class="seed-sil"><img class="seed-img" loading="lazy" decoding="async" src="'+esc(art.img)+'" alt=""><span class="q">?</span></span>';
  }
  return '<span class="q-fallback">?</span>';
}

function renderPublicReviews(rows){
  return rows.map(function(r){
    var stars = avgStars(r.ratings);
    var date = r.created_at ? String(r.created_at).slice(0,10) : '';
    var comment = r.comment ? esc(r.comment) + (r.truncated ? ' <span class="rv-locked" onclick="openUnlockModal()">…解鎖看完整</span>' : '') : '<span style="color:var(--ink-light);">(無文字評價)</span>';
    return '<div class="rv-item"><span class="rv-date">'+esc(date)+'</span><div class="rv-stars">'+stars+'</div><div class="rv-comment">'+comment+'</div></div>';
  }).join('');
}

/* ratings 是 {項目:分數} 的 jsonb,取平均換成星星 */
function avgStars(ratings){
  if(!ratings || typeof ratings!=='object') return '★★★★★';
  var vals=[]; for(var k in ratings){ if(typeof ratings[k]==='number') vals.push(ratings[k]); }
  if(!vals.length) return '★★★★★';
  var avg = Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);
  avg = Math.max(1, Math.min(5, avg));
  return '★★★★★'.slice(0,avg) + '☆☆☆☆☆'.slice(0,5-avg);
}

function openPhoto(url){ window.open(url, '_blank'); }
function showError(msg){ document.getElementById('page-body').innerHTML = '<div class="load-note">'+esc(msg)+'</div>'; }

/* === 解鎖視窗(沿用 02 的 redeem_info 流程) === */
function openUnlockModal(){
  var U = window.UNLOCK || { single:5, month:50, points:0, target:TARGET };
  document.getElementById('ul-balance').textContent = U.points;
  document.getElementById('ul-cost-single').textContent = U.single;
  document.getElementById('ul-cost-month').textContent = U.month;
  document.getElementById('unlock-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeUnlockModal(){
  document.getElementById('unlock-modal').classList.remove('show');
  document.body.style.overflow = '';
}
function goBuyForUnlock(){
  try { sessionStorage.setItem('credits_pool','client'); sessionStorage.setItem('credits_returnTo','20_suncar_profile.html?id='+encodeURIComponent(TARGET)); } catch(e){}
  location.href = '16_buy_credits.html';
}
async function doRedeem(kind){
  if(typeof window.sb==='undefined'){ alert('系統載入中,請稍候再試'); return; }
  var target = (kind==='single') ? TARGET : null;
  var r = await sb.rpc('redeem_info', { p_kind:kind, p_as:'client', p_target:target });
  if(r.error){
    var msg = r.error.message || '解鎖失敗';
    if(msg.indexOf('點數不足')>=0){ if(confirm(msg+'\n\n要去儲值嗎?')) goBuyForUnlock(); return; }
    alert('解鎖失敗:'+msg); return;
  }
  alert(kind==='month' ? '已開通月票,30 天內可看全部順咖資訊' : '已解鎖這位順咖的資訊');
  location.reload();
}
