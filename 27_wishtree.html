<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心願樹 · 去一下</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --honey:#FFB84D;--amber:#EF9F27;--amber-deep:#BA7517;--amber-darker:#8B5A0F;
  --champagne:#FFF4DD;--champagne-soft:#FFFCF5;--cream:#FAEEDA;
  --forest:#2F6048;--forest-deep:#1F4A36;--mint:#5FB58E;--mint-pale:#E8F5EE;
  --border-mint:rgba(95,181,142,0.3);
  --ink:#3D2914;--ink-soft:#8B7355;--ink-light:#B8A485;
  --border:#FFE9B8;--border-soft:#F5EBD8;
  --warn:#E89544;--warn-pale:#FFF1E0;--danger:#D9534F;--danger-pale:#FCE8E7;
  --wood:#6B4A22;--wood-soft:#8A6233;
}
body{font-family:'Noto Sans TC','Source Han Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Segoe UI',sans-serif;
  background:var(--champagne-soft);color:var(--ink);min-height:100vh;line-height:1.6;}
body.suncar{background:#F2F7F4;}
.hand{font-family:'LXGW WenKai TC','Noto Sans TC',cursive;}

.home-fab{position:fixed;top:14px;left:14px;width:44px;height:44px;border-radius:50%;
  background:#fff;border:1px solid var(--border);color:var(--amber-deep);
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:60;
  box-shadow:0 4px 14px rgba(186,117,23,0.15);transition:all 0.2s;text-decoration:none;}
.home-fab:hover{background:var(--champagne);transform:scale(1.05);border-color:var(--amber);}
.home-fab svg{width:20px;height:20px;fill:currentColor;}

.wrap{max-width:600px;margin:0 auto;padding:1.2rem 0.9rem 3rem;}

/* 樹場景 */
.scene{position:relative;width:100%;max-width:560px;margin:2.4rem auto 0;}
.scene-img{width:100%;display:block;border-radius:18px;}
.scene-cap{text-align:center;font-size:0.82rem;color:var(--ink-soft);margin-top:0.5rem;line-height:1.7;}
.scene-cap b{color:var(--forest);}

/* 有心願的木牌:在背景空白木牌上直接寫前 4 字(手寫體),點開看全文卡片 */
.tag{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:2;
  display:flex;align-items:center;justify-content:center;text-align:center;
  transition:transform 0.18s ease;}
.tag .pv{color:#6B4A22;font-size:clamp(8px,1.7vw,13px);line-height:1.14;
  max-width:78%;max-height:84%;overflow:hidden;word-break:break-all;pointer-events:none;}
.tag:hover{transform:translate(-50%,-50%) scale(1.2);z-index:20;}
.tag .tip{position:absolute;bottom:118%;left:50%;transform:translateX(-50%);width:150px;
  background:rgba(61,41,20,0.94);color:#fff;border-radius:9px;padding:7px 9px;font-size:0.72rem;
  line-height:1.5;opacity:0;visibility:hidden;transition:opacity 0.16s;z-index:30;pointer-events:none;
  text-align:center;font-family:'Noto Sans TC',sans-serif;}
.tag:hover .tip{opacity:1;visibility:visible;}

.stat-bar{text-align:center;margin-top:0.9rem;font-size:0.9rem;color:var(--ink-soft);}
.stat-bar b{color:var(--forest);font-size:1.05rem;}

.card{background:#fff;border:1.5px solid var(--border-soft);border-radius:18px;padding:1.25rem;margin-top:1.25rem;box-shadow:0 2px 8px rgba(186,117,23,0.04);}
body.suncar .card{border-color:var(--border-mint);}
.card-title{font-size:1.02rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px;margin-bottom:0.85rem;}

.field-label{font-size:0.84rem;font-weight:600;color:var(--ink-soft);margin-bottom:0.35rem;display:block;}
.text-input,.text-area{width:100%;border:1.5px solid var(--border-soft);border-radius:12px;
  padding:0.7rem 0.85rem;font-size:0.95rem;font-family:inherit;color:var(--ink);background:var(--champagne-soft);}
.text-input:focus,.text-area:focus{outline:none;border-color:var(--amber);background:#fff;}
body.suncar .text-input:focus,body.suncar .text-area:focus{border-color:var(--mint);}
.text-area{resize:vertical;min-height:84px;line-height:1.6;}
.char-count{font-size:0.76rem;color:var(--ink-light);text-align:right;margin-top:0.25rem;}
.pii-warn{display:flex;gap:8px;align-items:flex-start;background:var(--warn-pale);border:1px solid #F3D8AE;
  border-radius:12px;padding:0.7rem 0.85rem;margin-top:0.8rem;font-size:0.8rem;color:var(--amber-darker);line-height:1.6;}
.submit-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:linear-gradient(135deg,var(--mint),var(--forest));color:#fff;border:none;
  padding:0.95rem;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;
  font-family:inherit;box-shadow:0 8px 24px rgba(47,96,72,0.25);transition:all 0.2s;margin-top:0.9rem;}
.submit-btn:hover{transform:translateY(-2px);}
.submit-btn:disabled{opacity:0.55;cursor:not-allowed;transform:none;box-shadow:none;}
.form-note{font-size:0.78rem;color:var(--ink-soft);text-align:center;margin-top:0.6rem;line-height:1.6;}
.form-msg{font-size:0.85rem;text-align:center;margin-top:0.7rem;min-height:1.2em;}
.form-msg.ok{color:var(--forest);}
.form-msg.err{color:var(--danger);}

.closed-banner{background:#E8F1F8;border:1px solid #C5DBEE;border-radius:14px;
  padding:1rem;text-align:center;color:#3A7CB8;font-size:0.9rem;margin-top:1.25rem;line-height:1.7;}

/* 放大木牌彈窗 */
.modal-mask{position:fixed;inset:0;background:rgba(40,28,14,0.62);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:100;padding:1.2rem;}
.modal-mask.show{display:flex;}
.tagcard{position:relative;width:300px;max-width:82vw;animation:pop 0.32s cubic-bezier(.2,1.1,.3,1);}
@keyframes pop{0%{transform:scale(0.4);opacity:0;}100%{transform:scale(1);opacity:1;}}
.tagcard img{width:100%;display:block;filter:drop-shadow(0 16px 30px rgba(0,0,0,0.4));}
.tagcard .txt{position:absolute;left:18%;right:18%;top:51%;bottom:18%;display:flex;
  align-items:center;justify-content:center;text-align:center;}
.tagcard .txt .wish{color:var(--wood);font-size:1.5rem;line-height:1.5;word-break:break-word;}
.tagcard .by{position:absolute;right:20%;bottom:14%;color:var(--wood-soft);font-size:0.92rem;
  white-space:nowrap;}
.modal-close{position:absolute;top:-44px;right:0;background:rgba(255,255,255,0.9);border:none;
  width:36px;height:36px;border-radius:50%;font-size:1.1rem;cursor:pointer;color:var(--ink);}
.tag-actions{display:flex;gap:12px;justify-content:center;margin-top:1.1rem;}
.bless-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--mint);
  color:var(--forest);border-radius:99px;padding:0.55rem 1.3rem;font-size:0.95rem;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all 0.18s;}
.bless-btn:hover{background:var(--mint-pale);transform:translateY(-1px);}
.bless-btn.done{background:var(--mint-pale);cursor:default;}
.report-link{display:block;margin:0.7rem auto 0;background:none;border:none;color:#fff;opacity:0.85;
  font-size:0.82rem;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px;}

.wall-toggle{display:block;width:100%;margin-top:1rem;background:#fff;border:1.5px solid var(--border-soft);
  color:var(--ink-soft);border-radius:12px;padding:0.75rem;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:inherit;}
.wall-toggle:hover{background:var(--champagne);}
.wish-row{border:1.5px solid var(--border-soft);border-radius:12px;padding:0.8rem 0.95rem;margin-top:0.7rem;background:var(--champagne-soft);}
.wish-row .by{font-size:0.76rem;color:var(--ink-soft);font-weight:600;margin-bottom:0.25rem;}
.wish-row .tx{font-size:0.92rem;color:var(--ink);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.empty{text-align:center;color:var(--ink-soft);font-size:0.9rem;padding:1rem 0;}
</style>
</head>
<body>
<a href="11_client_home.html" class="home-fab" id="home-fab" title="回首頁">
  <svg viewBox="0 0 24 24"><path d="M12 3 2 12h3v8h6v-5h2v5h6v-8h3L12 3z"/></svg>
</a>

<div class="wrap">

  <!-- 大樹場景:心願寫在空白木牌上 -->
  <div class="scene" id="scene">
    <img class="scene-img" src="wish/tree.webp" alt="心願樹">
    <!-- 心願由 JS 寫上木牌 -->
  </div>
  <div class="scene-cap">滑鼠移到木牌上會放大、看一眼內容；<b>點一下</b>看完整心願 🌿</div>
  <div class="stat-bar">已掛上 <b id="stat-wishes">0</b> 個心願 · 累積 <b id="stat-bless">0</b> 份祝福</div>

  <div class="closed-banner" id="closed-banner" style="display:none;">
    心願樹目前暫時休息中，請稍後再來 🌙
  </div>

  <!-- 寫心願 -->
  <div class="card" id="write-card" style="display:none;">
    <div class="card-title">✍️ 寫下你的心願</div>
    <label class="field-label" for="w-nick">想用什麼名字（可留空＝匿名朋友）</label>
    <input class="text-input" id="w-nick" type="text" maxlength="20" placeholder="匿名朋友">
    <label class="field-label" for="w-content" style="margin-top:0.8rem;">你的心願</label>
    <textarea class="text-area" id="w-content" maxlength="200" placeholder="例如：希望家裡的長輩平安健康，每天都有好胃口。"></textarea>
    <div class="char-count"><span id="char-now">0</span> / 200</div>
    <div class="pii-warn"><span>⚠️</span>
      <span>為了你的安全，<b>請勿留電話、地址、身分證、LINE ID 等個人資料</b>。心願會公開掛在樹上給大家看，系統會自動擋掉像電話的內容。</span></div>
    <button class="submit-btn" id="submit-btn" onclick="submitWish()">掛上心願樹 🌱</button>
    <div class="form-note">每人每天可以掛 1 個心願</div>
    <div class="form-msg" id="form-msg"></div>
  </div>

  <div class="card" id="login-card" style="display:none;">
    <div class="card-title">✍️ 寫下你的心願</div>
    <p style="font-size:0.92rem;color:var(--ink-soft);line-height:1.8;">想掛上心願、或為別人的心願祝福，請先登入。</p>
    <button class="submit-btn" onclick="location.href='13_login.html'">前往登入</button>
  </div>

  <!-- 完整清單(收合) -->
  <button class="wall-toggle" id="wall-toggle" onclick="toggleWall()">📜 看所有心願清單</button>
  <div class="card" id="wall-card" style="display:none;">
    <div class="card-title">🌿 所有心願</div>
    <div id="wall-list"><div class="empty">載入中…</div></div>
  </div>

</div>

<!-- 放大木牌彈窗 -->
<div class="modal-mask" id="tag-modal" onclick="closeTag(event)">
  <div class="tagcard" id="tagcard" onclick="event.stopPropagation();">
    <button class="modal-close" onclick="closeTag(event,true)">✕</button>
    <img id="mc-img" src="" alt="">
    <div class="txt">
      <div class="wish hand" id="mc-wish"></div>
    </div>
    <div class="by hand" id="mc-by"></div>
  </div>
  <div style="position:absolute;left:0;right:0;bottom:7%;text-align:center;" id="mc-controls"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
<script src="qyx-load-guard.js"></script>
<script>
/* 心願樹·空白木牌直接寫字版
   背景 wish/tree.webp = 空白心願樹(木牌是空的)。真心願直接寫在木牌上,不疊任何圖→100% 對齊。
   TAGS = 從圖偵測出的每個空白木牌的位置與大小(中心x%,中心y%,寬%,高%)。
   有寫到的木牌顯示心願預覽,滑鼠移上去放大、冒出小框;點下去整張木牌放大,手寫體(Ma Shan Zheng)顯示全文。
   沒寫到的木牌就留空(背景本來就有空白木牌)。
   看樹不需登入;寫心願/祝福要登入。個資擋與每天 1 則在後台 post_wish。 */
var POOL = (new URLSearchParams(location.search).get('as') === 'suncar') ? 'suncar' : 'client';
var _uid = null, _wishes = [];

/* 空白木牌位置:中心x%, 中心y%, 寬%, 高%(相對場景);由樹圖偵測得到 */
var TAGS = [
  [26.1,21.1,5.1,10.1],[41.1,14.6,5.1,10.4],[52.8,14.8,5.1,10.4],[67.1,20.4,5.6,10.4],
  [11.9,27.5,5.1,9.9],[45.7,28.9,5.6,10.1],[60.1,28.4,4.8,10.1],[81.8,28.3,4.8,10.4],
  [34.2,34.0,5.1,10.1],[53.3,36.4,5.1,9.9],[71.2,34.6,5.6,10.4],[13.5,44.9,4.8,9.6],
  [25.0,40.7,5.1,9.9],[41.4,43.8,5.1,9.9],[65.0,47.5,5.1,9.6],[22.6,56.2,4.8,9.3],
  [32.5,56.2,5.1,9.9],[76.9,50.0,4.3,9.6]
];
/* 放大彈窗用的木牌底圖(空白款,文字區方正的優先,句子才好讀) */
var MODAL_SHAPES = ['rounded','square','scallop','circle'];

var DEMO = [
  {id:-1,nickname:'阿美',content:'希望媽媽的膝蓋早日康復，能再一起去散步。',blessings:12,blessed:false},
  {id:-2,nickname:'匿名朋友',content:'願每一位辛苦的順咖都被溫柔對待。',blessings:8,blessed:false},
  {id:-3,nickname:'小柏',content:'希望爸爸戒菸成功，健健康康。',blessings:5,blessed:false},
  {id:-4,nickname:'阿姨',content:'家人平安，今年順順利利。',blessings:15,blessed:false},
  {id:-5,nickname:'匿名朋友',content:'希望找到合拍的照顧夥伴，長輩開心。',blessings:3,blessed:false},
  {id:-6,nickname:'阿宏',content:'願奶奶天天有好胃口，笑口常開。',blessings:9,blessed:false}
];

function setupTheme(){
  if(POOL === 'suncar'){
    document.body.classList.add('suncar');
    document.getElementById('home-fab').setAttribute('href','12_staff_home.html');
  } else {
    document.getElementById('home-fab').setAttribute('href','11_client_home.html');
  }
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
/* 顯示名字:沒填或預設「匿名朋友」一律顯示「匿名」 */
function displayName(nm){ nm = (nm && String(nm).trim()) || ''; return (nm==='' || nm==='匿名朋友') ? '匿名' : nm; }
function modalShape(w,i){
  var n = (typeof w.id==='number' && w.id>0) ? w.id : i;
  return MODAL_SHAPES[Math.abs(n) % MODAL_SHAPES.length];
}

/* 把心願寫上空白木牌 */
function renderTree(){
  var scene = document.getElementById('scene');
  scene.querySelectorAll('.tag').forEach(function(e){ e.remove(); });
  var n = Math.min(_wishes.length, TAGS.length);
  for(var i=0;i<n;i++){
    var w = _wishes[i], t = TAGS[i];
    var el = document.createElement('div');
    el.className = 'tag';
    el.style.left = t[0] + '%';
    el.style.top  = t[1] + '%';
    el.style.width = t[2] + '%';
    el.style.height = t[3] + '%';
    el.innerHTML =
      '<div class="pv hand">'+esc((w.content||'').slice(0,4))+'</div>' +
      '<div class="tip">'+esc((w.content||'').slice(0,30))+((w.content||'').length>30?'…':'')+'<br>— '+esc(displayName(w.nickname))+'</div>';
    (function(idx){ el.addEventListener('click', function(){ openTag(idx); }); })(i);
    scene.appendChild(el);
  }
}

async function init(){
  if(typeof window.sb === 'undefined'){ console.error('supabase-init.js 未載入'); return; }
  setupTheme();

  var on = true;
  try{ var r = await sb.rpc('wish_tree_on'); on = (r && r.data === true); }catch(e){ on = false; }

  var s = await sb.auth.getSession();
  var user = s && s.data && s.data.session ? s.data.session.user : null;
  _uid = user ? user.id : null;

  if(!on){ document.getElementById('closed-banner').style.display = 'block'; }
  else if(_uid){ document.getElementById('write-card').style.display = 'block'; await prefillNick(); }
  else { document.getElementById('login-card').style.display = 'block'; }

  await loadStats();
  await loadTree();
}

async function prefillNick(){
  try{
    var u = await sb.from('users').select('display_name').eq('id', _uid).maybeSingle();
    var nm = u && u.data ? u.data.display_name : '';
    if(nm && nm !== '未命名') document.getElementById('w-nick').value = nm;
  }catch(e){}
}

async function loadStats(){
  try{
    var r = await sb.rpc('get_wish_stats');
    var d = r && r.data ? r.data : {};
    document.getElementById('stat-wishes').textContent = d.wishes || 0;
    document.getElementById('stat-bless').textContent = d.blessings || 0;
  }catch(e){}
}

async function loadTree(){
  var rows = [];
  try{
    var r = await sb.rpc('list_wishes', { p_limit: TAGS.length, p_offset: 0 });
    rows = (r && r.data) ? r.data : [];
  }catch(e){}
  _wishes = (rows.length > 0) ? rows : DEMO.slice();
  if(rows.length === 0){
    document.getElementById('stat-wishes').textContent = DEMO.length;
    document.getElementById('stat-bless').textContent = DEMO.reduce(function(a,b){return a+b.blessings;},0);
  }
  renderTree();
}

/* 點木牌→放大成手寫卡片 */
/* 願望字級參考種子卡片地名:短句大、長句自動縮(放得下又不爆框) */
function wishFontSize(s){
  var n = (s||'').length;
  if(n <= 8) return '1.9rem';
  if(n <= 16) return '1.5rem';
  if(n <= 30) return '1.18rem';
  if(n <= 60) return '0.98rem';
  return '0.84rem';
}
function openTag(i){
  var w = _wishes[i]; if(!w) return;
  document.getElementById('mc-img').src = 'wish/tag_' + modalShape(w,i) + '.webp';
  var wishEl = document.getElementById('mc-wish');
  wishEl.textContent = w.content || '';
  wishEl.style.fontSize = wishFontSize(w.content);
  document.getElementById('mc-by').textContent = displayName(w.nickname);
  renderControls(w);
  document.getElementById('tag-modal').classList.add('show');
}
function renderControls(w){
  var box = document.getElementById('mc-controls');
  var demo = (typeof w.id==='number' && w.id < 0);
  var blessed = w.blessed === true;
  box.innerHTML =
    '<div class="tag-actions">' +
      '<button class="bless-btn'+(blessed?' done':'')+'" id="mc-bless" '+(blessed?'disabled':'')+'>🙏 祝福 <b>'+(w.blessings||0)+'</b></button>' +
    '</div>' +
    (demo ? '' : '<button class="report-link" id="mc-report">檢舉這則心願</button>');
  var bb = document.getElementById('mc-bless');
  if(bb) bb.addEventListener('click', function(){ doBless(w, bb); });
  var rp = document.getElementById('mc-report');
  if(rp) rp.addEventListener('click', function(){ doReport(w, rp); });
}
function closeTag(e, force){
  if(force || e.target.id === 'tag-modal'){ document.getElementById('tag-modal').classList.remove('show'); }
}

async function doBless(w, btn){
  if(!_uid){ location.href = '13_login.html'; return; }
  if(typeof w.id !== 'number' || w.id < 0){
    w.blessings = (w.blessings||0)+1; w.blessed = true; renderControls(w); bumpBlessStat(); return;
  }
  if(btn.classList.contains('done')) return;
  var r = await sb.rpc('bless_wish', { p_wish_id: w.id });
  var d = r && r.data ? r.data : {};
  if(d.ok){
    w.blessings = d.blessings; if(!d.already){ w.blessed = true; bumpBlessStat(); }
    renderControls(w);
  }
}
function bumpBlessStat(){
  var el = document.getElementById('stat-bless');
  el.textContent = (parseInt(el.textContent,10)||0) + 1;
}
async function doReport(w, btn){
  if(!_uid){ location.href = '13_login.html'; return; }
  if(!confirm('確定要檢舉這則心願嗎？\n（內容不當或疑似留個資，平台會盡快查核）')) return;
  await sb.rpc('report_wish', { p_wish_id: w.id, p_reason: '使用者檢舉' });
  btn.textContent = '已檢舉，謝謝你'; btn.disabled = true;
}

var _wallLoaded = false;
async function toggleWall(){
  var card = document.getElementById('wall-card');
  var open = card.style.display === 'block';
  card.style.display = open ? 'none' : 'block';
  document.getElementById('wall-toggle').textContent = open ? '📜 看所有心願清單' : '收起清單';
  if(!open && !_wallLoaded){ await loadWall(); _wallLoaded = true; }
}
async function loadWall(){
  var box = document.getElementById('wall-list');
  var rows = [];
  try{ var r = await sb.rpc('list_wishes', { p_limit: 50, p_offset: 0 }); rows = (r && r.data)?r.data:[]; }catch(e){}
  if(rows.length === 0){ box.innerHTML = '<div class="empty">還沒有人掛心願，來當第一個吧 🌱</div>'; return; }
  box.innerHTML = '';
  rows.forEach(function(w){
    var d = document.createElement('div'); d.className = 'wish-row';
    d.innerHTML = '<div class="by">'+esc(w.nickname||'匿名朋友')+'</div><div class="tx">'+esc(w.content)+'</div>';
    box.appendChild(d);
  });
}

var _wc = null;
function bindCharCount(){
  _wc = document.getElementById('w-content'); if(!_wc) return;
  _wc.addEventListener('input', function(){ document.getElementById('char-now').textContent = _wc.value.length; });
}

async function submitWish(){
  var btn = document.getElementById('submit-btn'), msg = document.getElementById('form-msg');
  msg.className = 'form-msg';
  var content = (document.getElementById('w-content').value||'').trim();
  var nick = (document.getElementById('w-nick').value||'').trim();
  if(content.length < 2){ msg.className='form-msg err'; msg.textContent='心願至少寫 2 個字喔'; return; }
  btn.disabled = true;
  var r = await sb.rpc('post_wish', { p_content: content, p_nickname: nick });
  btn.disabled = false;
  var d = r && r.data ? r.data : {};
  if(r && r.error){ msg.className='form-msg err'; msg.textContent='送出失敗，請稍後再試'; return; }
  if(d.ok){
    msg.className='form-msg ok'; msg.textContent='心願已掛上樹，謝謝你 🌱';
    document.getElementById('w-content').value=''; document.getElementById('char-now').textContent='0';
    _wallLoaded = false;
    await loadStats(); await loadTree();
  } else {
    var map = { not_logged_in:'請先登入再掛心願', closed:'心願樹目前休息中', empty:'心願不能空白喔',
      too_long:'心願太長了，請縮短一點（最多 200 字）',
      pii:'內容裡好像有電話、身分證或聯絡方式，為了你的安全請拿掉再送出',
      daily_limit:'今天已經掛過心願囉，明天再來 🌙' };
    msg.className='form-msg err'; msg.textContent = map[d.reason] || '送出失敗，請稍後再試';
  }
}

bindCharCount();
qyxGuard(init, { color: (POOL === 'suncar' ? '#5FB58E' : '#EF9F27') });
</script>
</body>
</html>
