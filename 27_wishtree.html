<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心願樹 · 去一下</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --honey:#FFB84D;--amber:#EF9F27;--amber-deep:#BA7517;--amber-darker:#8B5A0F;
  --champagne:#FFF4DD;--champagne-soft:#FFFCF5;--cream:#FAEEDA;
  --forest:#2F6048;--forest-deep:#1F4A36;--mint:#5FB58E;--mint-pale:#E8F5EE;
  --border-mint:rgba(95,181,142,0.3);
  --ink:#3D2914;--ink-soft:#8B7355;--ink-light:#B8A485;
  --border:#FFE9B8;--border-soft:#F5EBD8;
  --warn:#E89544;--warn-pale:#FFF1E0;--danger:#D9534F;--danger-pale:#FCE8E7;
  --info:#3A7CB8;--info-pale:#E8F1F8;--gold:#E0A93C;--gold-soft:#FFF6E0;
}
body{font-family:'Noto Sans TC','Source Han Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Segoe UI',sans-serif;
  background:var(--champagne-soft);color:var(--ink);min-height:100vh;line-height:1.6;}
body.suncar{background:#F2F7F4;}

.brand{font-weight:500;line-height:1;display:inline-flex;align-items:baseline;letter-spacing:-0.02em;}
.brand .qu,.brand .xia{color:var(--amber-darker);}
.brand .yi{color:var(--forest);}

.home-fab{position:fixed;top:14px;left:14px;width:44px;height:44px;border-radius:50%;
  background:#fff;border:1px solid var(--border);color:var(--amber-deep);
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;
  box-shadow:0 4px 14px rgba(186,117,23,0.15);transition:all 0.2s;text-decoration:none;}
.home-fab:hover{background:var(--champagne);transform:scale(1.05);border-color:var(--amber);}
.home-fab svg{width:20px;height:20px;fill:currentColor;}
body.suncar .home-fab{border-color:var(--border-mint);color:var(--forest);box-shadow:0 4px 14px rgba(47,96,72,0.15);}
body.suncar .home-fab:hover{background:var(--mint-pale);border-color:var(--mint);}

.wrap{max-width:560px;margin:0 auto;padding:1.5rem 1.25rem 3rem;}

/* 主視覺·樹 */
.hero{position:relative;color:#fff;border-radius:22px;overflow:hidden;
  background:linear-gradient(135deg,var(--mint) 0%,var(--forest) 70%,var(--forest-deep) 100%);
  padding:1.7rem 1.5rem 1.5rem;box-shadow:0 14px 40px rgba(47,96,72,0.3);margin-top:2.5rem;text-align:center;}
.hero::before{content:'';position:absolute;top:-40%;right:-12%;width:210px;height:210px;border-radius:50%;background:rgba(255,255,255,0.10);}
.hero > *{position:relative;z-index:1;}
.hero-title{font-size:1.5rem;font-weight:700;letter-spacing:-0.3px;}
.hero-sub{font-size:0.85rem;opacity:0.95;margin-top:0.5rem;line-height:1.7;}
.tree-stage{margin:1.1rem auto 0.6rem;width:200px;height:160px;position:relative;}
.tree-emoji{font-size:90px;line-height:1;filter:drop-shadow(0 6px 10px rgba(0,0,0,0.18));}
.blossoms{position:absolute;inset:0;pointer-events:none;}
.blossoms span{position:absolute;font-size:18px;animation:sway 3s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-4px) rotate(4deg);}}
.tree-stat{font-size:0.86rem;opacity:0.96;margin-top:0.3rem;}
.tree-stat b{font-size:1.05rem;font-weight:700;}

/* 卡片通用 */
.card{background:#fff;border:1.5px solid var(--border-soft);border-radius:18px;padding:1.25rem;margin-top:1.25rem;box-shadow:0 2px 8px rgba(186,117,23,0.04);}
body.suncar .card{border-color:var(--border-mint);}
.card-title{font-size:1.02rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px;margin-bottom:0.85rem;}

/* 寫心願 */
.field-label{font-size:0.84rem;font-weight:600;color:var(--ink-soft);margin-bottom:0.35rem;display:block;}
.text-input,.text-area{width:100%;border:1.5px solid var(--border-soft);border-radius:12px;
  padding:0.7rem 0.85rem;font-size:0.95rem;font-family:inherit;color:var(--ink);background:var(--champagne-soft);}
.text-input:focus,.text-area:focus{outline:none;border-color:var(--amber);background:#fff;}
body.suncar .text-input:focus,body.suncar .text-area:focus{border-color:var(--mint);}
.text-area{resize:vertical;min-height:90px;line-height:1.6;}
.char-count{font-size:0.76rem;color:var(--ink-light);text-align:right;margin-top:0.25rem;}
.pii-warn{display:flex;gap:8px;align-items:flex-start;background:var(--warn-pale);border:1px solid #F3D8AE;
  border-radius:12px;padding:0.7rem 0.85rem;margin-top:0.8rem;font-size:0.8rem;color:var(--amber-darker);line-height:1.6;}
.submit-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:linear-gradient(135deg,var(--mint),var(--forest));color:#fff;border:none;
  padding:0.95rem;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;
  font-family:inherit;box-shadow:0 8px 24px rgba(47,96,72,0.25);transition:all 0.2s;margin-top:0.9rem;}
.submit-btn:hover{transform:translateY(-2px);}
.submit-btn:disabled{opacity:0.55;cursor:not-allowed;transform:none;box-shadow:none;}
.form-note{font-size:0.78rem;color:var(--ink-soft);text-align:center;margin-top:0.6rem;line-height:1.6;}
.form-msg{font-size:0.85rem;text-align:center;margin-top:0.7rem;line-height:1.6;min-height:1.2em;}
.form-msg.ok{color:var(--forest);}
.form-msg.err{color:var(--danger);}

/* 每日精選 */
.feat{background:linear-gradient(135deg,var(--gold-soft),#FFFDF6);border:1.5px solid var(--border);
  border-radius:18px;padding:1.3rem;margin-top:1.25rem;box-shadow:0 4px 16px rgba(224,169,60,0.12);text-align:center;}
.feat-tag{display:inline-block;font-size:0.74rem;font-weight:700;color:var(--amber-darker);
  background:#fff;border:1px solid var(--border);border-radius:99px;padding:3px 12px;margin-bottom:0.7rem;}
.feat-content{font-size:1.08rem;font-weight:600;color:var(--ink);line-height:1.8;}
.feat-by{font-size:0.82rem;color:var(--ink-soft);margin-top:0.7rem;}

/* 心願牆 */
.wish-item{border:1.5px solid var(--border-soft);border-radius:14px;padding:0.95rem 1rem;margin-top:0.8rem;background:var(--champagne-soft);}
body.suncar .wish-item{border-color:var(--border-mint);background:#fff;}
.wish-by{font-size:0.78rem;color:var(--ink-soft);font-weight:600;margin-bottom:0.35rem;}
.wish-text{font-size:0.95rem;color:var(--ink);line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.wish-actions{display:flex;align-items:center;gap:10px;margin-top:0.7rem;}
.bless-btn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--mint);
  color:var(--forest);border-radius:99px;padding:0.4rem 0.95rem;font-size:0.85rem;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all 0.18s;}
.bless-btn:hover{background:var(--mint-pale);transform:translateY(-1px);}
.bless-btn.done{background:var(--mint-pale);border-color:var(--mint);color:var(--forest-deep);cursor:default;}
.bless-btn:disabled{cursor:default;}
.report-btn{margin-left:auto;background:none;border:none;color:var(--ink-light);font-size:0.78rem;
  cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px;}
.report-btn:hover{color:var(--danger);}
.empty{text-align:center;color:var(--ink-soft);font-size:0.9rem;padding:1.5rem 0;}
.more-btn{display:block;width:100%;margin-top:1rem;background:#fff;border:1.5px solid var(--border-soft);
  color:var(--ink-soft);border-radius:12px;padding:0.75rem;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:inherit;}
.more-btn:hover{background:var(--champagne);}

.closed-banner{background:var(--info-pale);border:1px solid #C5DBEE;border-radius:14px;
  padding:1rem;text-align:center;color:var(--info);font-size:0.9rem;margin-top:1.25rem;line-height:1.7;}
</style>
</head>
<body>
<a href="11_client_home.html" class="home-fab" id="home-fab" title="回首頁">
  <svg viewBox="0 0 24 24"><path d="M12 3 2 12h3v8h6v-5h2v5h6v-8h3L12 3z"/></svg>
</a>

<div class="wrap">

  <!-- 主視覺·心願樹 -->
  <div class="hero">
    <div class="hero-title">🌳 心願樹</div>
    <div class="hero-sub">把想說的、想完成的心願掛上樹<br>每一份祝福，都讓這棵樹更茂盛</div>
    <div class="tree-stage">
      <div class="tree-emoji">🌳</div>
      <div class="blossoms" id="blossoms"></div>
    </div>
    <div class="tree-stat">已掛上 <b id="stat-wishes">0</b> 個心願 · 累積 <b id="stat-bless">0</b> 份祝福</div>
  </div>

  <!-- 活動關閉時顯示 -->
  <div class="closed-banner" id="closed-banner" style="display:none;">
    心願樹目前暫時休息中，請稍後再來 🌙
  </div>

  <!-- 寫心願 -->
  <div class="card" id="write-card" style="display:none;">
    <div class="card-title">✍️ 寫下你的心願</div>
    <label class="field-label" for="w-nick">想用什麼名字（可留空＝匿名朋友）</label>
    <input class="text-input" id="w-nick" type="text" maxlength="20" placeholder="匿名朋友">
    <label class="field-label" for="w-content" style="margin-top:0.8rem;">你的心願</label>
    <textarea class="text-area" id="w-content" maxlength="200" placeholder="例如：希望家裡的長輩平安健康，每天都有好胃口。"></textarea>
    <div class="char-count"><span id="char-now">0</span> / 200</div>
    <div class="pii-warn">
      <span>⚠️</span>
      <span>為了你的安全，<b>請勿留電話、地址、身分證、LINE ID 等個人資料</b>。心願會公開顯示給所有人看，系統會自動擋掉像電話的內容。</span>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitWish()">掛上心願樹 🌱</button>
    <div class="form-note" id="limit-note">每人每天可以掛 1 個心願</div>
    <div class="form-msg" id="form-msg"></div>
  </div>

  <!-- 登入提示(未登入時) -->
  <div class="card" id="login-card" style="display:none;">
    <div class="card-title">✍️ 寫下你的心願</div>
    <p style="font-size:0.92rem;color:var(--ink-soft);line-height:1.8;">想掛上心願、或為別人的心願祝福，請先登入。</p>
    <button class="submit-btn" onclick="location.href='13_login.html'">前往登入</button>
  </div>

  <!-- 每日精選 -->
  <div class="feat" id="feat-card" style="display:none;">
    <div class="feat-tag">🌟 今日精選心願</div>
    <div class="feat-content" id="feat-content"></div>
    <div class="feat-by" id="feat-by"></div>
  </div>

  <!-- 心願牆 -->
  <div class="card">
    <div class="card-title">🌿 大家的心願</div>
    <div id="wish-list"><div class="empty">載入中…</div></div>
    <button class="more-btn" id="more-btn" style="display:none;" onclick="loadMore()">看更多心願</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
<script src="qyx-load-guard.js"></script>
<script>
/* 心願樹
   一棵全站共用的樹:案家、順咖都能把心願掛上來,路過的人按「祝福」累積。
   樹的茂盛度(開幾朵花)= 全站累積祝福數,呼應種子成長的精神。
   寫心願要登入、每人每天 1 則(後台 wish_daily_limit 可調);看樹不需登入。
   個資自動擋在後台 post_wish(電話/身分證/LINE ID 等),搭配檢舉+管理員下架(先發後檢舉)。
   主題色:從順咖端(?as=suncar)進來走綠色,其餘走金色,跟全站一致。 */
var POOL = (new URLSearchParams(location.search).get('as') === 'suncar') ? 'suncar' : 'client';
var _uid = null;          // 登入者 id,null=未登入(可看不可寫)
var _offset = 0;          // 心願牆分頁
var _pageSize = 20;
var _busy = false;

function setupTheme(){
  if(POOL === 'suncar'){
    document.body.classList.add('suncar');
    document.getElementById('home-fab').setAttribute('href','12_staff_home.html');
  } else {
    document.getElementById('home-fab').setAttribute('href','11_client_home.html');
  }
}

/* 樹的茂盛度:每 2 份祝福開 1 朵花,最多 24 朵,散布在樹冠範圍 */
function renderTree(wishes, bless){
  document.getElementById('stat-wishes').textContent = wishes;
  document.getElementById('stat-bless').textContent = bless;
  var n = Math.min(24, Math.floor(bless / 2));
  var box = document.getElementById('blossoms');
  var flowers = ['🌸','🌼','🌺','💮'];
  var html = '';
  for(var i=0;i<n;i++){
    var left = 18 + Math.round((Math.sin(i*1.7)*0.5+0.5) * 64);   // 18%~82%
    var top  = 8  + Math.round((Math.cos(i*2.3)*0.5+0.5) * 48);   // 8%~56%
    var f = flowers[i % flowers.length];
    var delay = (i % 6) * 0.3;
    html += '<span style="left:'+left+'%;top:'+top+'%;animation-delay:'+delay+'s;">'+f+'</span>';
  }
  box.innerHTML = html;
}

function esc(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function init(){
  if(typeof window.sb === 'undefined'){ console.error('supabase-init.js 未載入'); return; }
  setupTheme();

  // 先確認活動有沒有開(後台 wish_tree_on),關了就只顯示休息橫幅
  var on = true;
  try{ var r = await sb.rpc('wish_tree_on'); on = (r && r.data === true); }catch(e){ on = false; }

  // 讀登入狀態(可選,未登入也能看樹)
  var s = await sb.auth.getSession();
  var user = s && s.data && s.data.session ? s.data.session.user : null;
  _uid = user ? user.id : null;

  if(!on){
    document.getElementById('closed-banner').style.display = 'block';
  } else {
    if(_uid){ document.getElementById('write-card').style.display = 'block'; await prefillNick(); }
    else { document.getElementById('login-card').style.display = 'block'; }
  }

  await loadStats();
  await loadFeatured();
  _offset = 0;
  await loadWishes(true);
}

/* 寫心願表單預填暱稱:帶入帳號暱稱,使用者可改或清空(清空=匿名朋友) */
async function prefillNick(){
  try{
    var u = await sb.from('users').select('display_name').eq('id', _uid).maybeSingle();
    var nm = u && u.data ? u.data.display_name : '';
    if(nm && nm !== '未命名') document.getElementById('w-nick').value = nm;
  }catch(e){}
}

async function loadStats(){
  try{
    var r = await sb.rpc('get_wish_stats');
    var d = r && r.data ? r.data : {};
    renderTree(d.wishes || 0, d.blessings || 0);
  }catch(e){ renderTree(0,0); }
}

async function loadFeatured(){
  try{
    var r = await sb.rpc('get_featured_wish');
    var d = r && r.data ? r.data : null;
    if(d && d.id){
      document.getElementById('feat-content').textContent = d.content;
      document.getElementById('feat-by').textContent = '— ' + (d.nickname || '匿名朋友');
      document.getElementById('feat-card').style.display = 'block';
    }
  }catch(e){}
}

/* 心願牆:reset=true 從頭載入,false=接在後面(看更多) */
async function loadWishes(reset){
  var box = document.getElementById('wish-list');
  if(reset){ _offset = 0; box.innerHTML = '<div class="empty">載入中…</div>'; }
  var r = await sb.rpc('list_wishes', { p_limit: _pageSize, p_offset: _offset });
  var rows = (r && r.data) ? r.data : [];
  if(reset) box.innerHTML = '';
  if(reset && rows.length === 0){
    box.innerHTML = '<div class="empty">還沒有人掛心願，來當第一個吧 🌱</div>';
    document.getElementById('more-btn').style.display = 'none';
    return;
  }
  rows.forEach(function(w){ box.appendChild(buildWishEl(w)); });
  _offset += rows.length;
  document.getElementById('more-btn').style.display = (rows.length === _pageSize) ? 'block' : 'none';
}

function buildWishEl(w){
  var el = document.createElement('div');
  el.className = 'wish-item';
  var blessed = w.blessed === true;
  el.innerHTML =
    '<div class="wish-by">' + esc(w.nickname || '匿名朋友') + '</div>' +
    '<div class="wish-text">' + esc(w.content) + '</div>' +
    '<div class="wish-actions">' +
      '<button class="bless-btn' + (blessed?' done':'') + '" data-id="' + w.id + '" ' +
        (blessed?'disabled':'') + '>🙏 祝福 <b class="bc">' + (w.blessings||0) + '</b></button>' +
      '<button class="report-btn" data-id="' + w.id + '">檢舉</button>' +
    '</div>';
  el.querySelector('.bless-btn').addEventListener('click', function(){ blessWish(this); });
  el.querySelector('.report-btn').addEventListener('click', function(){ reportWish(this); });
  return el;
}

async function blessWish(btn){
  if(!_uid){ location.href = '13_login.html'; return; }
  if(btn.classList.contains('done') || _busy) return;
  _busy = true;
  var id = parseInt(btn.getAttribute('data-id'), 10);
  var r = await sb.rpc('bless_wish', { p_wish_id: id });
  _busy = false;
  var d = r && r.data ? r.data : {};
  if(d.ok){
    btn.classList.add('done'); btn.disabled = true;
    var bc = btn.querySelector('.bc'); if(bc) bc.textContent = d.blessings;
    // 樹同步長大:祝福總數 +1(已祝福過的 already 不加)
    if(!d.already){
      var sb_ = document.getElementById('stat-bless');
      var total = (parseInt(sb_.textContent,10)||0) + 1;
      renderTree(parseInt(document.getElementById('stat-wishes').textContent,10)||0, total);
    }
  }
}

async function reportWish(btn){
  if(!_uid){ location.href = '13_login.html'; return; }
  if(!confirm('確定要檢舉這則心願嗎？\n（內容不當或疑似留個資，平台會盡快查核）')) return;
  var id = parseInt(btn.getAttribute('data-id'), 10);
  var r = await sb.rpc('report_wish', { p_wish_id: id, p_reason: '使用者檢舉' });
  var d = r && r.data ? r.data : {};
  if(d.ok){
    btn.textContent = '已檢舉';
    btn.disabled = true;
    btn.style.color = 'var(--ink-light)';
    btn.style.textDecoration = 'none';
  }
}

function loadMore(){ loadWishes(false); }

var _wcInput = null;
function bindCharCount(){
  _wcInput = document.getElementById('w-content');
  if(!_wcInput) return;
  _wcInput.addEventListener('input', function(){
    document.getElementById('char-now').textContent = _wcInput.value.length;
  });
}

async function submitWish(){
  var btn = document.getElementById('submit-btn');
  var msg = document.getElementById('form-msg');
  msg.className = 'form-msg';
  var content = (document.getElementById('w-content').value || '').trim();
  var nick = (document.getElementById('w-nick').value || '').trim();
  if(content.length < 2){ msg.className='form-msg err'; msg.textContent='心願至少寫 2 個字喔'; return; }
  btn.disabled = true;
  var r = await sb.rpc('post_wish', { p_content: content, p_nickname: nick });
  btn.disabled = false;
  var d = r && r.data ? r.data : {};
  if(r && r.error){ msg.className='form-msg err'; msg.textContent='送出失敗，請稍後再試'; return; }
  if(d.ok){
    msg.className='form-msg ok'; msg.textContent='心願已掛上樹，謝謝你 🌱';
    document.getElementById('w-content').value = '';
    document.getElementById('char-now').textContent = '0';
    await loadStats();
    await loadWishes(true);
  } else {
    var map = {
      not_logged_in: '請先登入再掛心願',
      closed: '心願樹目前休息中',
      empty: '心願不能空白喔',
      too_long: '心願太長了，請縮短一點（最多 200 字）',
      pii: '內容裡好像有電話、身分證或聯絡方式，為了你的安全請拿掉再送出',
      daily_limit: '今天已經掛過心願囉，明天再來 🌙'
    };
    msg.className='form-msg err';
    msg.textContent = map[d.reason] || '送出失敗，請稍後再試';
  }
}

bindCharCount();
qyxGuard(init, { color: (POOL === 'suncar' ? '#5FB58E' : '#EF9F27') });
</script>
</body>
</html>
