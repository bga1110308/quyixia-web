<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點數加值 · 去一下</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --honey:#FFB84D;
  --amber:#EF9F27;
  --amber-deep:#BA7517;
  --amber-darker:#8B5A0F;
  --champagne:#FFF4DD;
  --champagne-soft:#FFFCF5;
  --forest:#2F6048;
  --mint:#5FB58E;
  --mint-pale:#E8F5EE;
  --ink:#3D2914;
  --ink-soft:#8B7355;
  --ink-light:#B8A485;
  --border:#FFE9B8;
  --border-soft:#F5EBD8;
  --border-mint:rgba(95,181,142,0.3);
}
body{font-family:'Noto Sans TC','Source Han Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Segoe UI',sans-serif;background:linear-gradient(135deg,var(--champagne) 0%,var(--champagne-soft) 50%,var(--mint-pale) 100%);color:var(--ink);min-height:100vh;padding:1.25rem;line-height:1.6;}

.brand{font-weight:500;line-height:1;display:inline-flex;align-items:baseline;letter-spacing:-0.02em;}
.brand .qu,.brand .xia{color:var(--amber-darker);}
.brand .yi{color:var(--forest);}

.home-fab{position:fixed;top:14px;left:14px;width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid var(--border);color:var(--amber-deep);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;box-shadow:0 4px 14px rgba(186,117,23,0.15);transition:all 0.2s;text-decoration:none;}
.home-fab:hover{background:var(--champagne);transform:scale(1.05);border-color:var(--amber);}
.home-fab svg{width:18px;height:18px;fill:currentColor;}

.wrap{max-width:480px;margin:1.5rem auto 0;}

/* === 目前點數卡 === */
.balance-card{position:relative;background:linear-gradient(135deg,var(--honey) 0%,var(--amber) 50%,var(--amber-deep) 100%);color:#fff;border-radius:20px;padding:1.85rem 1.65rem 1.5rem;box-shadow:0 14px 40px rgba(186,117,23,0.3);margin-bottom:1.25rem;overflow:hidden;}
.balance-card::before{content:'';position:absolute;top:-40%;right:-15%;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.12);}
.balance-card::after{content:'';position:absolute;bottom:-50%;left:-15%;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.08);}
.balance-card > *{position:relative;}
.balance-label{font-size:0.8rem;opacity:0.92;letter-spacing:1.5px;margin-bottom:8px;font-weight:500;display:flex;align-items:center;gap:6px;}
.balance-label svg{width:1em;height:1em;fill:currentColor;}
.balance-num{font-size:3rem;font-weight:700;letter-spacing:-2px;display:flex;align-items:baseline;gap:8px;}
.balance-num .unit{font-size:1.1rem;opacity:0.85;font-weight:500;}
.balance-tip{font-size:0.76rem;opacity:0.9;margin-top:10px;line-height:1.65;}

/* === 成功提示 === */
.success-banner{background:linear-gradient(135deg,var(--mint-pale),#fff 100%);border:1.5px solid var(--mint);border-radius:14px;padding:0.95rem 1.1rem;margin-bottom:1.25rem;align-items:center;gap:10px;font-size:0.9rem;color:var(--forest);font-weight:600;display:none;}
.success-banner.show{display:flex;animation:slideIn 0.4s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.success-banner svg{width:22px;height:22px;fill:var(--mint);flex-shrink:0;}

/* === 方案標題 === */
.section-title{font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:0.95rem;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';display:block;width:4px;height:18px;background:linear-gradient(180deg,var(--honey),var(--amber));border-radius:2px;}

/* === 方案卡 === */
.plans{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:1.25rem;}
.plan{position:relative;background:#fff;border:1.5px solid var(--border-soft);border-radius:18px;padding:1.25rem 1rem;cursor:pointer;transition:all 0.25s;overflow:hidden;text-align:center;}
.plan:hover{border-color:var(--amber);transform:translateY(-4px);box-shadow:0 12px 28px rgba(239,159,39,0.18);}
.plan.popular{border-color:var(--amber);background:linear-gradient(135deg,var(--champagne),#fff 70%);box-shadow:0 8px 24px rgba(239,159,39,0.15);}
.plan-badge{position:absolute;top:0;right:0;background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;font-size:0.66rem;padding:4px 12px;border-bottom-left-radius:12px;font-weight:700;letter-spacing:0.5px;box-shadow:0 3px 8px rgba(239,159,39,0.35);}
.plan-pts{font-size:1.8rem;font-weight:700;color:var(--ink);line-height:1;margin-bottom:5px;letter-spacing:-1px;}
.plan-pts .pts-unit{font-size:0.74rem;color:var(--ink-light);margin-left:3px;font-weight:500;}
.plan-bonus{font-size:0.72rem;color:var(--forest);font-weight:600;background:var(--mint-pale);border:1px solid var(--border-mint);padding:2px 10px;border-radius:99px;display:inline-block;margin-bottom:9px;}
.plan-bonus.empty{visibility:hidden;}
.plan-price{font-size:1.2rem;font-weight:700;color:var(--amber-deep);margin-bottom:3px;letter-spacing:-0.3px;}
.plan-price .tw{font-size:0.72rem;color:var(--ink-light);font-weight:500;margin-right:2px;}
.plan-unit-price{font-size:0.68rem;color:var(--ink-light);}

/* === 使用說明 === */
.info-list{background:#fff;border:1.5px solid var(--border-soft);border-radius:14px;padding:1.15rem 1.25rem;margin-bottom:1.25rem;box-shadow:0 2px 8px rgba(186,117,23,0.04);}
.info-list-title{font-size:0.88rem;color:var(--ink);font-weight:600;margin-bottom:0.75rem;display:flex;align-items:center;gap:6px;}
.info-list-title svg{width:16px;height:16px;fill:var(--amber);}
.info-item{font-size:0.82rem;color:var(--ink);line-height:1.85;display:flex;gap:9px;}
.info-item .num{color:var(--amber-deep);font-weight:700;flex-shrink:0;width:20px;}
.info-item strong{color:var(--amber-deep);font-weight:700;}

/* === 返回按鈕 === */
.back-btn{display:flex;width:100%;background:#fff;color:var(--ink);border:1.5px solid var(--border);padding:1rem;border-radius:14px;font-size:0.92rem;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;align-items:center;justify-content:center;gap:7px;transition:all 0.2s;}
.back-btn:hover{background:var(--champagne);border-color:var(--amber);transform:translateY(-1px);}
.back-btn svg{width:14px;height:14px;fill:currentColor;}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<defs>
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
  <symbol id="i-coin" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.31 16.13v1.32h-1.06v-1.31c-1.71-.22-2.54-1.21-2.6-2.41h1.27c.06.65.51 1.16 1.86 1.16 1.45 0 1.77-.72 1.77-1.18 0-.62-.33-1.21-2-1.61-1.86-.45-3.13-1.21-3.13-2.74 0-1.29.99-2.13 2.43-2.4v-1.32h1.06v1.32c1.55.25 2.41 1.16 2.46 2.34h-1.27c-.04-.69-.41-1.18-1.66-1.18-1.16 0-1.85.51-1.85 1.21 0 .68.43 1.17 2.04 1.6 1.65.45 3.09 1.21 3.09 2.79 0 1.39-1.07 2.18-2.41 2.41z"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></symbol>
  <symbol id="i-info" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></symbol>
  <symbol id="i-arrow-left" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20z"/></symbol>
</defs>
</svg>

<a href="index.html" class="home-fab" title="回首頁"><svg><use href="#i-home"/></svg></a>

<div class="wrap">

  <!-- 儲值成功提示 -->
  <div class="success-banner" id="success-banner">
    <svg><use href="#i-check"/></svg>
    <span id="success-text">儲值成功!</span>
  </div>

  <!-- 目前點數 -->
  <div class="balance-card">
    <div class="balance-label"><svg><use href="#i-coin"/></svg>目前點數</div>
    <div class="balance-num">
      <span id="balance-num">0</span>
      <span class="unit">點</span>
    </div>
    <div class="balance-tip">每張額外證件 50 點 · 點下方方案儲值</div>
  </div>

  <!-- 加值方案 -->
  <div class="section-title">選擇加值方案</div>
  <div class="plans">
    <div class="plan" onclick="goPay(100, 100, 0)">
      <div class="plan-pts">100<span class="pts-unit">點</span></div>
      <div class="plan-bonus empty">送 0 點</div>
      <div class="plan-price"><span class="tw">NT$</span>100</div>
      <div class="plan-unit-price">每點 $1.00</div>
    </div>
    <div class="plan" onclick="goPay(300, 280, 20)">
      <div class="plan-pts">300<span class="pts-unit">點</span></div>
      <div class="plan-bonus">送 20 點</div>
      <div class="plan-price"><span class="tw">NT$</span>280</div>
      <div class="plan-unit-price">每點 $0.93</div>
    </div>
    <div class="plan popular" onclick="goPay(500, 450, 50)">
      <div class="plan-badge">熱門</div>
      <div class="plan-pts">500<span class="pts-unit">點</span></div>
      <div class="plan-bonus">送 50 點</div>
      <div class="plan-price"><span class="tw">NT$</span>450</div>
      <div class="plan-unit-price">每點 $0.90</div>
    </div>
    <div class="plan" onclick="goPay(1000, 850, 150)">
      <div class="plan-pts">1000<span class="pts-unit">點</span></div>
      <div class="plan-bonus">送 150 點</div>
      <div class="plan-price"><span class="tw">NT$</span>850</div>
      <div class="plan-unit-price">每點 $0.85</div>
    </div>
  </div>

  <!-- 使用說明 -->
  <div class="info-list">
    <div class="info-list-title"><svg><use href="#i-info"/></svg>使用說明</div>
    <div class="info-item"><span class="num">1.</span><span>新增第 1 張其他證件免費</span></div>
    <div class="info-item"><span class="num">2.</span><span>第 2 張起每張需扣 <strong>50 點</strong></span></div>
    <div class="info-item"><span class="num">3.</span><span>每帳號最多 <strong id="max-cert-num">5</strong> 張(後台可調整)</span></div>
    <div class="info-item"><span class="num">4.</span><span>付款方式:Apple Pay、LINE Pay、信用卡、街口、Google Pay</span></div>
  </div>

  <a href="07_verification.html" class="back-btn">
    <svg><use href="#i-arrow-left"/></svg>返回證件上傳
  </a>

</div>

<script>
/* 從 sessionStorage 讀取目前點數 */
function refreshBalance() {
  var pts = 0;
  try {
    pts = parseInt(sessionStorage.getItem('userPoints') || '0', 10);
    if (isNaN(pts)) pts = 0;
  } catch(e) { pts = 0; }
  document.getElementById('balance-num').textContent = pts;
}

/* 跳到刷卡頁 */
function goPay(pts, price, bonus) {
  try {
    sessionStorage.setItem('pendingPlan', JSON.stringify({pts:pts, price:price, bonus:bonus}));
  } catch(e){}
  window.location.href = '17_payment.html';
}

/* URL ?success=1 顯示成功提示 */
function checkSuccess() {
  var p = new URLSearchParams(window.location.search);
  if (p.get('success') === '1') {
    var addPts = parseInt(p.get('add') || '0', 10);
    var banner = document.getElementById('success-banner');
    var txt = document.getElementById('success-text');
    if (addPts > 0) txt.textContent = '儲值成功!本次共獲得 ' + addPts + ' 點';
    else txt.textContent = '儲值成功!';
    banner.classList.add('show');
    setTimeout(function(){
      window.history.replaceState({}, '', '16_buy_credits.html');
    }, 100);
  }
}

refreshBalance();
checkSuccess();
</script>
</body>
</html>
