<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>補完基本資料 · 去一下</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --honey:#FFB84D;--amber:#EF9F27;--amber-deep:#BA7517;--amber-darker:#8B5A0F;
  --champagne:#FFF4DD;--champagne-soft:#FFFCF5;--forest:#2F6048;--mint:#5FB58E;
  --mint-pale:#E8F5EE;--ink:#3D2914;--ink-soft:#8B7355;--ink-light:#B8A485;--border:#FFE9B8;
}
body{font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Segoe UI',sans-serif;background:linear-gradient(135deg,var(--champagne) 0%,var(--champagne-soft) 50%,var(--mint-pale) 100%);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;line-height:1.55;}
.cp-card{visibility:hidden;background:#fff;border-radius:24px;padding:2.25rem 1.85rem 1.85rem;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(186,117,23,0.15);border:1.5px solid var(--border);}
.brand{font-weight:500;display:inline-flex;align-items:baseline;letter-spacing:-0.02em;font-size:2rem;}
.brand .qu,.brand .xia{color:var(--amber-darker);}.brand .yi{color:var(--forest);}
.brand-wrap{text-align:center;margin-bottom:1.25rem;}
.cp-title{font-size:1.1rem;font-weight:600;color:var(--ink);text-align:center;margin-bottom:6px;}
.cp-sub{font-size:0.84rem;color:var(--ink-soft);text-align:center;margin-bottom:1.5rem;line-height:1.6;}
.field{margin-bottom:1.1rem;}
.field-label{display:block;font-size:0.84rem;color:var(--ink);margin-bottom:8px;font-weight:600;}
.field-label .req{color:#d9534f;margin-left:3px;}
.field-input{width:100%;border:2px solid var(--border);border-radius:14px;padding:0.85rem 1rem;font-size:0.95rem;font-family:inherit;color:var(--ink);background:var(--champagne-soft);transition:all 0.2s;}
.field-input:focus{outline:none;border-color:var(--amber);background:#fff;box-shadow:0 0 0 4px rgba(239,159,39,0.12);}
.field-hint{font-size:0.74rem;color:var(--ink-light);margin-top:6px;}
.save-btn{width:100%;background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;border:none;padding:0.95rem;border-radius:14px;font-size:0.98rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:0.5rem;box-shadow:0 6px 20px rgba(239,159,39,0.3);transition:all 0.2s;}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(239,159,39,0.4);}
.save-btn:disabled{opacity:0.6;cursor:default;transform:none;}
</style>
</head>
<body>
<div class="cp-card">
  <div class="brand-wrap"><span class="brand"><span class="qu">去</span><span class="yi">一</span><span class="xia">下</span></span></div>
  <div class="cp-title">再填兩個資料就好</div>
  <div class="cp-sub">為了讓順咖能聯絡你、訂單能正常運作,<br>請填寫你的暱稱和電話。</div>
  <div class="field">
    <label class="field-label">暱稱<span class="req">*</span></label>
    <input type="text" class="field-input" id="cp-name" placeholder="順咖會這樣稱呼你,例:王小姐">
    <div class="field-hint">會顯示給順咖看,不用真名也可以</div>
  </div>
  <div class="field">
    <label class="field-label">聯絡電話<span class="req">*</span></label>
    <input type="tel" class="field-input" id="cp-phone" placeholder="0912-345-678">
    <div class="field-hint">訂單成立後才會給接單的順咖,平台不會公開</div>
  </div>
  <button class="save-btn" id="cp-save" onclick="saveProfile()">完成,開始使用</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
<script>
/* 補基本資料頁。任何登入方式(LINE/Google/Email)第一次進來若缺暱稱或電話,
   13/11/12 會把人導到這裡,填好才放行。管理員與已填齊者直接進首頁。
   display_name / phone 不在 protect_sensitive_user_cols 鎖定清單,本人可改。 */

async function routeHome(uid){
  // 有「登入後要回去的頁」就回那頁(例:未登入在 04 下單→登入→補資料完,回去把單送出),不進預設首頁
  var _ret = null;
  try { _ret = sessionStorage.getItem('post_login_return'); } catch(e){}
  if (_ret) { try { sessionStorage.removeItem('post_login_return'); } catch(e){} location.href = _ret; return; }
  var rr = await sb.from('user_roles').select('role').eq('user_id', uid);
  var rl = (rr && rr.data) ? rr.data : [];
  if(rl.some(function(r){ return r.role === 'client'; })){ location.href = '11_client_home.html'; return; }
  if(rl.some(function(r){ return r.role === 'suncar'; })){ location.href = '12_staff_home.html'; return; }
  location.href = '11_client_home.html'; // 還沒有角色的新會員,預設進案家首頁
}

window.addEventListener('DOMContentLoaded', async function(){
  if(typeof window.sb === 'undefined'){ return; }
  var s = await sb.auth.getSession();
  var user = (s.data && s.data.session) ? s.data.session.user : null;
  if(!user){ location.href = '13_login.html'; return; }
  var p = await sb.from('users').select('display_name,phone,is_admin,is_super_admin').eq('id', user.id).maybeSingle();
  var u = (p && p.data) ? p.data : {};
  var hasName = u.display_name && String(u.display_name).trim();
  var hasPhone = u.phone && String(u.phone).trim();
  // 管理員或已填齊,不用補,直接進首頁
  if(u.is_admin || u.is_super_admin || (hasName && hasPhone)){ await routeHome(user.id); return; }
  if(hasName){ document.getElementById('cp-name').value = u.display_name; } // Google 會帶名字,先填好
  document.querySelector('.cp-card').style.visibility = 'visible';
});

async function saveProfile(){
  var s = await sb.auth.getSession();
  var user = (s.data && s.data.session) ? s.data.session.user : null;
  if(!user){ location.href = '13_login.html'; return; }
  var name = (document.getElementById('cp-name').value || '').trim();
  var phone = (document.getElementById('cp-phone').value || '').replace(/[^\d]/g, '');
  if(!name){ alert('請填暱稱'); return; }
  if(phone.length < 8){ alert('請填正確的電話號碼'); return; }
  var btn = document.getElementById('cp-save'); btn.disabled = true; btn.textContent = '儲存中…';
  // 為什麼用 upsert 不用 update:信箱/Google 第一次登入若 handle_new_user 沒建到 users 主檔,
  // update 會 0 筆默默失敗。upsert(帶 id)有就更新、沒有就當場建,跟標準流程一致。
  var up = await sb.from('users').upsert({ id: user.id, display_name: name, phone: phone });
  if(up.error){
    btn.disabled = false; btn.textContent = '完成,開始使用';
    // 撞號:這支電話(或信箱)已屬於別的帳號。通常是同一個人之前用 LINE/Google/信箱其中一種註冊過,
    // 這次又用另一種方式進來而開了新空帳號。不把資料庫錯誤丟給使用者,改成指引他回去用原本方式登入。
    // (這個新開的空帳號之後會被「每週自動清空殼」排程清掉,不會留髒)
    if(up.error.code === '23505' || /duplicate key|users_phone_key|users_email_key/i.test(up.error.message || '')){
      alert('這支電話已經有帳號在用了。你可能之前用 LINE、Google 或信箱其中一種註冊過。\n\n幫你回到登入頁,請用你「第一次註冊時用的那種方式」登入,就會回到原本的帳號。');
      sb.auth.signOut().then(function(){ location.href = '13_login.html'; }).catch(function(){ location.href = '13_login.html'; });
      return;
    }
    alert('儲存失敗:' + up.error.message); return;
  }
  // 為什麼補建角色:後台帳號管理(08)是用 user_roles 撈會員。信箱/Google 走 13→18 這條路
  // 原本只寫 users、不建角色,人就只在 11 出現、後台卻看不到,下次來又像新帳號。
  // 這裡補預設「案家」角色(active),跟 14 註冊頁、跟 routeHome 預設進案家首頁的行為一致。
  // onConflict user_id,role:已經有這個角色就不重複建,不會弄壞日後另外申請順咖的人。
  var roleUp = await sb.from('user_roles').upsert(
    { user_id: user.id, role: 'client', status: 'active' },
    { onConflict: 'user_id,role', ignoreDuplicates: true }
  );
  // 角色沒建成不擋使用者進站(主檔已存),只記 log 方便日後查
  if(roleUp.error){ console.error('建立案家角色失敗', roleUp.error); }
  await routeHome(user.id);
}
</script>
</body>
</html>
