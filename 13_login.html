<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 · 去一下</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --honey:#FFB84D;
  --amber:#EF9F27;
  --amber-deep:#BA7517;
  --amber-darker:#8B5A0F;
  --champagne:#FFF4DD;
  --champagne-soft:#FFFCF5;
  --forest:#2F6048;
  --mint:#5FB58E;
  --mint-pale:#E8F5EE;
  --ink:#3D2914;
  --ink-soft:#8B7355;
  --ink-light:#B8A485;
  --border:#FFE9B8;
  --line-green:#06C755;
}
body{font-family:'Noto Sans TC','Source Han Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Segoe UI',sans-serif;background:linear-gradient(135deg,var(--champagne) 0%,var(--champagne-soft) 50%,var(--mint-pale) 100%);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;line-height:1.55;position:relative;overflow-x:hidden;}

body::before{content:'';position:absolute;top:-100px;right:-100px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(239,159,39,0.15) 0%,transparent 70%);pointer-events:none;}
body::after{content:'';position:absolute;bottom:-120px;left:-100px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(95,181,142,0.15) 0%,transparent 70%);pointer-events:none;}

.home-fab{position:fixed;top:14px;left:14px;width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid var(--border);color:var(--amber-deep);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;box-shadow:0 4px 14px rgba(186,117,23,0.15);transition:all 0.2s;text-decoration:none;}
.home-fab:hover{background:var(--champagne);transform:scale(1.05);border-color:var(--amber);}
.home-fab svg{width:18px;height:18px;fill:currentColor;}

/* 品牌字 */
.brand{font-weight:500;line-height:1;display:inline-flex;align-items:baseline;letter-spacing:-0.02em;}
.brand .qu,.brand .xia{color:var(--amber-darker);}
.brand .yi{color:var(--forest);}

.login-card{position:relative;background:#fff;border-radius:24px;padding:2.25rem 1.85rem 1.65rem;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(186,117,23,0.15);border:1.5px solid var(--border);}

.brand-wrap{text-align:center;margin-bottom:1.5rem;}
.brand-wrap .brand{font-size:2.2rem;}
.brand-en{font-size:0.7rem;color:var(--amber-deep);letter-spacing:0.45em;margin-top:8px;font-weight:500;}

.welcome{text-align:center;margin-bottom:1.5rem;}
.welcome-title{font-size:1.05rem;font-weight:500;color:var(--ink);margin-bottom:6px;}
.welcome-title a{color:var(--amber-deep);text-decoration:none;font-weight:600;border-bottom:1.5px dashed var(--amber);padding-bottom:1px;transition:all 0.2s;}
.welcome-title a:hover{color:var(--amber-darker);border-bottom-color:var(--amber-darker);border-bottom-style:solid;}
.welcome-title .sep{color:var(--ink-light);margin:0 6px;font-weight:300;}
.welcome-sub{font-size:0.82rem;color:var(--ink-soft);}

/* 提示橫幅 */
.hint-banner{background:var(--mint-pale);border:1px solid rgba(95,181,142,0.3);border-radius:14px;padding:0.85rem 1rem;margin-bottom:1.25rem;font-size:0.78rem;color:var(--forest);line-height:1.65;display:flex;gap:9px;align-items:flex-start;}
.hint-banner svg{width:16px;height:16px;flex-shrink:0;margin-top:2px;fill:currentColor;}
.hint-banner strong{font-weight:600;}

/* 主要登入按鈕 */
.social-row{display:flex;flex-direction:column;gap:10px;margin-bottom:1.25rem;}
.social-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:0.95rem 1rem;border-radius:14px;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;border:none;transition:all 0.2s;}
.social-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,0.08);}
.social-btn svg{width:1.3em;height:1.3em;}

.btn-line{background:var(--line-green);color:#fff;box-shadow:0 4px 14px rgba(6,199,85,0.25);}
.btn-line:hover{background:#05a847;box-shadow:0 8px 22px rgba(6,199,85,0.35);}

.btn-google{background:#fff;color:#3c4043;border:1.5px solid #e0e0e0;}
.btn-google:hover{background:#fafafa;border-color:var(--amber);}

.btn-email{background:#fff;color:var(--amber-deep);border:1.5px solid var(--amber);}
.btn-email:hover{background:var(--champagne);}

.btn-disabled{background:#FBF5E7;color:var(--ink-light);border:1.5px dashed var(--border);cursor:not-allowed;position:relative;}
.btn-disabled:hover{transform:none;box-shadow:none;}
.btn-disabled .lock-tag{position:absolute;right:14px;font-size:0.66rem;background:var(--ink-light);color:#fff;padding:3px 8px;border-radius:99px;font-weight:600;}

.divider{display:flex;align-items:center;gap:10px;margin:1rem 0;color:var(--ink-light);font-size:0.75rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* Email 登入區 */
.email-section{display:none;border-top:1px dashed var(--border);padding-top:1.25rem;margin-top:0.5rem;}
.email-section.show{display:block;}
.field{margin-bottom:1rem;}
.field-label{display:block;font-size:0.82rem;color:var(--ink);margin-bottom:8px;font-weight:600;}
.field-input{width:100%;border:2px solid var(--border);border-radius:14px;padding:0.85rem 1rem;font-size:0.95rem;font-family:inherit;color:var(--ink);background:var(--champagne-soft);transition:all 0.2s;}
.field-input:focus{outline:none;border-color:var(--amber);background:#fff;box-shadow:0 0 0 4px rgba(239,159,39,0.12);}
.field-hint{font-size:0.74rem;color:var(--ink-light);margin-top:6px;}

.email-send-btn{width:100%;background:linear-gradient(135deg,var(--honey),var(--amber));color:#fff;border:none;padding:0.95rem;border-radius:14px;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:0.25rem;box-shadow:0 6px 20px rgba(239,159,39,0.3);transition:all 0.2s;}
.email-send-btn:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(239,159,39,0.4);}

.back-link-row{text-align:center;font-size:0.82rem;color:var(--ink-soft);margin-top:1rem;}
.back-link-row a{color:var(--amber-deep);cursor:pointer;text-decoration:underline;font-weight:500;}

.signup-row{text-align:center;font-size:0.88rem;color:var(--ink-soft);padding-top:1rem;border-top:1px dashed var(--border);margin-top:1rem;}
.signup-row a{color:var(--amber-deep);text-decoration:none;font-weight:600;margin-left:6px;}

@media (max-width:480px){
  .login-card{padding:2rem 1.5rem 1.5rem;}
  .brand-wrap .brand{font-size:1.85rem;}
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<defs>
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
  <symbol id="i-info" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></symbol>
  <symbol id="i-mail" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></symbol>
  <symbol id="i-phone" viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></symbol>
</defs>
</svg>

<a href="index.html" class="home-fab" title="回首頁"><svg><use href="#i-home"/></svg></a>

<div class="login-card">
  <div class="brand-wrap">
    <span class="brand"><span class="qu">去</span><span class="yi">一</span><span class="xia">下</span></span>
    <div class="brand-en">QU YI XIA</div>
  </div>

  <div class="welcome">
    <div class="welcome-title">登入<span class="sep">/</span><a href="14_signup.html">註冊</a>你的帳號</div>
    <div class="welcome-sub">繼續預約服務或查看訂單</div>
  </div>

  <div class="hint-banner">
    <svg><use href="#i-info"/></svg>
    <div><strong>建議用 LINE 登入</strong>方便客服聯繫你、追蹤訂單,也最快</div>
  </div>

  <div class="social-row" id="social-row">
    <button class="social-btn btn-line" onclick="loginWith('LINE')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 10.304c0-5.369-5.383-9.738-12-9.738S0 4.935 0 10.304c0 4.81 4.27 8.84 10.035 9.608.391.084.923.258 1.058.592.122.303.08.778.039 1.085 0 0-.141.846-.171 1.027-.053.303-.242 1.186 1.039.647 1.281-.54 6.911-4.069 9.428-6.967h-.001c1.739-1.907 2.572-3.843 2.572-5.992zM7.66 13.4H5.3c-.32 0-.58-.26-.58-.58V8.14c0-.32.26-.58.58-.58.32 0 .58.26.58.58v4.16h1.78c.32 0 .58.26.58.58 0 .32-.26.58-.58.58zm2.4-.58c0 .32-.26.58-.58.58s-.58-.26-.58-.58V8.14c0-.32.26-.58.58-.58.32 0 .58.26.58.58v4.68zm5.16 0c0 .32-.26.58-.58.58-.19 0-.36-.09-.46-.23l-2.2-2.99v2.64c0 .32-.26.58-.58.58s-.58-.26-.58-.58V8.14c0-.32.26-.58.58-.58.18 0 .36.09.46.23l2.2 2.99V8.14c0-.32.26-.58.58-.58.32 0 .58.26.58.58v4.68zm3.66-2.97h-1.6v.81h1.6c.32 0 .58.26.58.58s-.26.58-.58.58h-1.6v.81h1.6c.32 0 .58.26.58.58 0 .32-.26.58-.58.58h-2.18c-.32 0-.58-.26-.58-.58V8.14c0-.32.26-.58.58-.58h2.18c.32 0 .58.26.58.58s-.26.58-.58.58h-1.6v.81h1.6c.32 0 .58.26.58.58s-.26.58-.58.58z"/></svg>
      用 LINE 登入
    </button>

    <button class="social-btn btn-google" onclick="loginWith('Google')">
      <svg viewBox="0 0 24 24"><path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      用 Google 登入
    </button>

    <button class="social-btn btn-email" onclick="toggleEmail()">
      <svg viewBox="0 0 24 24" fill="currentColor"><use href="#i-mail"/></svg>
      用 Email 登入
    </button>

    <!-- 手機驗證:後台暫關 -->
    <button class="social-btn btn-disabled" disabled title="此功能尚未開放">
      <svg viewBox="0 0 24 24" fill="currentColor"><use href="#i-phone"/></svg>
      用手機號碼登入
      <span class="lock-tag">未開放</span>
    </button>
  </div>

  <!-- Email 登入區 -->
  <div class="email-section" id="email-section">
    <div class="field">
      <label class="field-label">Email</label>
      <input type="email" class="field-input" id="email-input" placeholder="your@email.com">
      <div class="field-hint">我們會寄送登入連結到你的信箱</div>
    </div>
    <button class="email-send-btn" onclick="sendEmailLink()">寄送登入連結</button>
    <div class="back-link-row">
      <a onclick="toggleEmail()">← 改用其他方式登入</a>
    </div>
  </div>

  <div class="signup-row">
    第一次來?<a href="14_signup.html">直接註冊新帳號</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
<script>
// 登入頁。LINE 已串接 Supabase Auth。
// Google 與 Email 待 Supabase 設定好供應商後再開放。

var card = document.querySelector('.login-card');

// 進頁先檢查：是不是剛從 LINE 授權跳回來、或本來就已登入
window.addEventListener('DOMContentLoaded', async function () {
  if (card) card.style.visibility = 'hidden';
  var res = await sb.auth.getSession();
  if (res.data && res.data.session) {
    await handlePostLogin();
    return; // 已導向首頁，不顯示登入卡
  }
  if (card) card.style.visibility = 'visible';
});

// 登入成功後：補 line_user_id，再依角色進對應首頁
async function handlePostLogin() {
  // 先讀本機 session(webview 較可靠),getUser 只當備援
  var user = null;
  var sres = await sb.auth.getSession();
  if (sres.data && sres.data.session && sres.data.session.user) {
    user = sres.data.session.user;
  } else {
    var ures = await sb.auth.getUser();
    user = ures.data ? ures.data.user : null;
  }
  if (user) {
    // 帳號狀態守門:被刪除/停用的帳號擋住,不補資料也不導首頁(同一支 LINE 再登入會回到原帳號,也擋在這)
    var acc = await sb.from('users').select('deleted_at,is_active').eq('id', user.id).maybeSingle();
    var ad = acc && acc.data ? acc.data : null;
    if (ad && ad.deleted_at) { await sb.auth.signOut(); alert('此帳號已刪除，無法再使用。'); window.location.href = 'index.html'; return; }
    if (ad && ad.is_active === false) { await sb.auth.signOut(); alert('此帳號已停用，如有疑問請聯繫平台。'); window.location.href = 'index.html'; return; }
    var lineId = extractLineId(user);
    if (lineId) {
      // 只在目前為空時補寫，避免覆蓋
      await sb.from('users')
        .update({ line_user_id: lineId })
        .eq('id', user.id)
        .is('line_user_id', null);
    }
    // 依角色決定首頁：有案家(或兩者都有)→案家首頁 11；只有順咖→順咖首頁 12
    var roleRes = await sb.from('user_roles').select('role').eq('user_id', user.id);
    var rlist = roleRes.data || [];
    var hasClient = rlist.some(function(r){ return r.role === 'client'; });
    var hasSuncar = rlist.some(function(r){ return r.role === 'suncar'; });
    if (hasClient) { window.location.href = '11_client_home.html'; return; }
    if (hasSuncar) { window.location.href = '12_staff_home.html'; return; }
  }
  // 沒有任何角色或讀不到使用者：預設進案家首頁
  window.location.href = '11_client_home.html';
}

// 從 LINE 身分資料取出 LINE user id（userinfo 的 sub）
function extractLineId(user) {
  if (user.identities) {
    for (var i = 0; i < user.identities.length; i++) {
      var idt = user.identities[i];
      if ((idt.provider || '').indexOf('line') !== -1 &&
          idt.identity_data && idt.identity_data.sub) {
        return idt.identity_data.sub;
      }
    }
  }
  if (user.user_metadata && user.user_metadata.sub) return user.user_metadata.sub;
  return null;
}

async function loginWith(provider) {
  if (provider === 'LINE') {
    var r = await sb.auth.signInWithOAuth({
      provider: 'custom:line',
      options: {
        redirectTo: window.location.origin + '/13_login.html',
        scopes: 'openid profile'
      }
    });
    if (r.error) alert('LINE 登入啟動失敗:' + r.error.message);
    return;
  }
  alert(provider + ' 登入尚未開放,目前請先用 LINE 登入。');
}

function toggleEmail() {
  alert('Email 登入尚未開放,目前請先用 LINE 登入。');
}

function sendEmailLink() {
  alert('Email 登入尚未開放,目前請先用 LINE 登入。');
}
</script>
</body>
</html>
